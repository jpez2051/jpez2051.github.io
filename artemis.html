<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTEMIS II | RE-ENTRY v1.3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #010204; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        #map { height: 350px; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(80%); }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .reentry-glow { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="p-4 lg:p-6" x-data="missionControl()" x-init="initApp()">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-3 space-y-6">
            <header>
                <h1 class="text-xl font-orbitron font-bold text-blue-500">ARTEMIS II <span class="text-white">LIVE</span></h1>
                <p class="text-[9px] text-slate-500 uppercase tracking-[0.3em]">Build v1.3.1 | RE-ENTRY PHASE</p>
            </header>

            <div class="glass p-5 rounded-lg reentry-glow">
                <h3 class="text-[10px] font-bold text-red-400 uppercase mb-4 tracking-widest">Entry Telemetry</h3>
                <div class="space-y-4 font-mono">
                    <div class="flex justify-between">
                        <span class="text-xs">VELOCITY</span>
                        <span class="text-white" x-text="velocity.toLocaleString() + ' MPH'"></span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-xs">ALTITUDE</span>
                        <span class="text-white" x-text="altitude.toLocaleString() + ' MI'"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-9 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass rounded-lg overflow-hidden border border-slate-800">
                    <div class="p-2 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                        <span class="text-[10px] font-bold uppercase text-slate-400">Primary Feed: NASA TV</span>
                        <span class="text-[9px] text-red-500 font-bold animate-pulse">● LIVE FROM JSC</span>
                    </div>
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/21X5lGlDOfg?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                    </div>
                </div>

                <div class="glass rounded-lg overflow-hidden border border-slate-800">
                    <div id="map"></div>
                </div>
            </div>

            <div class="glass p-4 rounded-lg flex items-center justify-between border-t-4 border-blue-600">
                <div class="flex items-center gap-4">
                    <div class="text-3xl">⚓</div>
                    <div>
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Recovery Ship</p>
                        <p class="text-sm font-orbitron text-white">USS JOHN P. MURTHA (LPD-26)</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 uppercase font-bold">Sea State</p>
                    <p class="text-sm text-emerald-400 font-mono">NOMINAL - 2FT SWELL</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-10 pt-4 border-t border-slate-900 flex justify-between text-[10px] text-slate-600 uppercase tracking-widest font-mono">
        <div>ORION CM-002 | RECOVERY OPS</div>
        <div>BUILD_VER: <span class="text-emerald-500">1.3.1-FIXED-FEED</span></div>
    </footer>

    <script>
        function missionControl() {
            return {
                velocity: 24480,
                altitude: 38200,
                lat: 25.1,
                lng: -142.5,
                initApp() {
                    this.map = L.map('map', { center: [30, -130], zoom: 4, zoomControl: false, attributionControl: false });
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
                    const icon = L.divIcon({ className: 'c', html: "<div style='background:#3b82f6;width:8px;height:8px;border-radius:50%;box-shadow:0 0 10px #3b82f6;'></div>" });
                    this.marker = L.marker([this.lat, this.lng], {icon: icon}).addTo(this.map);

                    setInterval(() => {
                        this.velocity += 5;
                        this.altitude -= 1.2;
                        this.lat += 0.005;
                        this.lng += 0.015;
                        this.marker.setLatLng([this.lat, this.lng]);
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
