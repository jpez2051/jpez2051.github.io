<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --bg: #f8f9fa; --card: #fff; --p: #4CAF50; --s: #2196F3; --a: #FF9800; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .btn-add { background: var(--p); grid-column: span 2; }
        .btn-rep { background: var(--s); }
        .btn-del { background: #ff4444; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; gap: 5px; }
        .stat-val { font-size: 1.2em; font-weight: bold; display: block; }
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.9em; }
        .chart-legend { display: flex; justify-content: center; gap: 10px; font-size: 11px; margin-bottom: 8px; color: #666; }
        .legend-item span { width: 10px; height: 10px; display: inline-block; margin-right: 4px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <label style="font-size:12px; font-weight:bold; color:#666;">Select Workout Date:</label>
        <input type="date" id="active-date">
        <div style="display:flex; gap:8px;">
            <input id="in-p" type="number" pattern="\d*" placeholder="Pushups">
            <input id="in-s" type="number" pattern="\d*" placeholder="Squats">
            <input id="in-c" type="number" pattern="\d*" placeholder="Calves">
        </div>
        <div class="btn-row">
            <button class="btn-add" onclick="addEntry()">Add Entry</button>
            <button class="btn-rep" onclick="repeatLast()">Repeat Last</button>
            <button class="btn-del" onclick="deleteLast()">Undo Last</button>
        </div>
    </div>

    <div class="card">
        <h3 id="label-date" style="margin:0 0 10px 0; font-size: 1.1em;">Totals</h3>
        <div id="totals" class="stat-grid"></div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 1.1em;">Weekly Trends</h3>
        <div class="chart-legend">
            <div class="legend-item"><span style="background:var(--p)"></span>Pushups</div>
            <div class="legend-item"><span style="background:var(--s)"></span>Squats</div>
            <div class="legend-item"><span style="background:var(--a)"></span>Calves</div>
        </div>
        <canvas id="chart" width="400" height="200" style="width:100%; height:auto;"></canvas>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 1.1em;">History</h3>
        <div id="history"></div>
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="exportData()" style="background:#f0f0f0; color:#666; font-size:11px; flex:1;">Export</button>
            <button onclick="importData()" style="background:#f0f0f0; color:#666; font-size:11px; flex:1;">Import</button>
            <button onclick="clearAll()" style="background:none; color:#ccc; font-size:10px; border:none; width:100%;">Clear Everything</button>
        </div>
    </div>
</div>

<script>
    var workouts = {};
    try {
        var saved = localStorage.getItem("workouts");
        if(saved) workouts = JSON.parse(saved);
    } catch(e) { workouts = {}; }

    function getToday() {
        var d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function fmtDate(iso) {
        if(!iso) return "";
        var p = iso.split('-');
        return p[1] + '/' + p[2] + '/' + p[0];
    }

    // This function now handles OLD and NEW data formats
    function getTots(day) {
        var list = workouts[day] || [];
        var res = { p: 0, s: 0, c: 0 };
        for(var i=0; i<list.length; i++) {
            var e = list[i];
            // Check for new short names OR old long names
            res.p += (e.p || e.pushups || 0);
            res.s += (e.s || e.squats || 0);
            res.c += (e.c || e.calves || 0);
        }
        return res;
    }

    function update() {
        var active = document.getElementById("active-date").value;
        if(!active) return;
        var t = getTots(active);
        
        document.getElementById("label-date").innerText = "Totals for " + fmtDate(active);
        document.getElementById("totals").innerHTML = 
            '<div><span class="stat-val">'+t.p+'</span>Pushups</div>' +
            '<div><span class="stat-val">'+t.s+'</span>Squats</div>' +
            '<div><span class="stat-val">'+t.c+'</span>Calves</div>';

        var hist = "";
        var sortedDays = Object.keys(workouts).sort().reverse().slice(0,7);
        for(var i=0; i<sortedDays.length; i++) {
            var dayT = getTots(sortedDays[i]);
            hist += '<div class="history-item"><strong>'+fmtDate(sortedDays[i])+'</strong> <span>P:'+dayT.p+' S:'+dayT.s+' C:'+dayT.c+'</span></div>';
        }
        document.getElementById("history").innerHTML = hist || '<p style="color:#999;text-align:center;">No history found.</p>';
        draw();
    }

    function draw() {
        var can = document.getElementById("chart");
        var ctx = can.getContext("2d");
        ctx.clearRect(0,0,400,200);
        var days = [];
        for(var i=6; i>=0; i--) {
            var d = new Date(); d.setDate(d.getDate()-i);
            days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
        }
        var max = 10;
        for(var j=0; j<days.length; j++) {
            var t = getTots(days[j]);
            max = Math.max(max, t.p, t.s, t.c);
        }
        var sel = document.getElementById("active-date").value;
        for(var k=0; k<days.length; k++) {
            var day = days[k];
            var t = getTots(day);
            var x = k * 55 + 15;
            ctx.globalAlpha = (day === sel) ? 1.0 : 0.3;
            var bar = function(val, col, off) {
                var h = (val/max) * 150;
                ctx.fillStyle = col;
                ctx.fillRect(x+off, 170-h, 10, h);
            };
            bar(t.p, "#4CAF50", 0); bar(t.s, "#2196F3", 12); bar(t.c, "#FF9800", 24);
            ctx.globalAlpha = 1; ctx.fillStyle = "#333"; ctx.font = "10px sans-serif"; ctx.textAlign="center";
            var lbl = new Date(day.replace(/-/g,'/')).toLocaleDateString(undefined, {weekday:'narrow'});
            ctx.fillText(lbl, x+17, 190);
        }
    }

    function addEntry() {
        var d = document.getElementById("active-date").value;
        if(!workouts[d]) workouts[d] = [];
        var entry = {
            p: parseInt(document.getElementById("in-p").value) || 0,
            s: parseInt(document.getElementById("in-s").value) || 0,
            c: parseInt(document.getElementById("in-c").value) || 0
        };
        if(entry.p === 0 && entry.s === 0 && entry.c === 0) return;
        workouts[d].push(entry);
        document.getElementById("in-p").value = "";
        document.getElementById("in-s").value = "";
        document.getElementById("in-c").value = "";
        save();
    }

    function repeatLast() {
        var d = document.getElementById("active-date").value;
        if(workouts[d] && workouts[d].length > 0) {
            var l = workouts[d][workouts[d].length-1];
            workouts[d].push({p: (l.p||l.pushups||0), s: (l.s||l.squats||0), c: (l.c||l.calves||0)});
            save();
        }
    }

    function deleteLast() {
        var d = document.getElementById("active-date").value;
        if(workouts[d] && workouts[d].length > 0) {
            workouts[d].pop();
            if(workouts[d].length === 0) delete workouts[d];
            save();
        }
    }

    function save() { 
        localStorage.setItem("workouts", JSON.stringify(workouts)); 
        update(); 
    }
    
    function exportData() { navigator.clipboard.writeText(JSON.stringify(workouts)).then(function(){ alert("Data copied to clipboard!"); }); }
    function importData() { var s = prompt("Paste backup data:"); if(s){ try{workouts=JSON.parse(s);save();}catch(e){alert("Invalid data.");} } }
    function clearAll() { if(confirm("This will delete all history. Continue?")){workouts={};save();} }

    window.onload = function() {
        document.getElementById("active-date").value = getToday();
        document.getElementById("active-date").onchange = update;
        update();
    };
</script>
</body>
</html>
