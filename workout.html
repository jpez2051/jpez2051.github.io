<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #333;
            --primary: #4CAF50;
            --secondary: #2196F3;
            --accent: #FF9800;
            --danger: #ff4444;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        .refresh-container {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 5px;
        }
        .btn-refresh {
            background: #e0e0e0;
            color: #666;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2, h3 { margin-top: 0; color: #111; }
        
        .date-picker-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .date-picker-group label {
            font-size: 12px;
            font-weight: bold;
            color: #666;
        }

        #active-date {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            background: #fff;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.6; }

        .btn-add { background: var(--primary); color: white; grid-column: span 2; }
        .btn-repeat { background: var(--secondary); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; font-size: 0.9em; }
        .stat-val { font-size: 1.2em; font-weight: bold; display: block; }

        #history { max-height: 200px; overflow-y: auto; font-size: 0.85em; }
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; }

        /* SPLASH SCREEN - Now has a force-hide safeguard */
        #splash {
            position: fixed; inset: 0; background: #111; color: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        .hidden { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>

<div id="splash"><h1>TRAIN</h1></div>

<div class="container">
    <div class="refresh-container">
        <button class="btn-refresh" onclick="location.reload()">Refresh App</button>
    </div>

    <h2>Workout Tracker</h2>
    
    <div class="card">
        <div class="date-picker-group">
            <label for="active-date">Log Entry For:</label>
            <input type="date" id="active-date">
        </div>
        <div class="input-group">
            <input id="pushups" type="number" pattern="\d*" placeholder="Push-ups">
            <input id="squats" type="number" pattern="\d*" placeholder="Squats">
            <input id="calves" type="number" pattern="\d*" placeholder="Calves">
        </div>
        <div class="btn-row">
            <button class="btn-add" onclick="addEntry()">Add Entry</button>
            <button class="btn-repeat" onclick="repeatLast()">Repeat Last</button>
            <button class="btn-delete" onclick="deleteLast()">Undo Last</button>
        </div>
    </div>

    <div class="card">
        <h3 id="today-label">Daily Totals</h3>
        <div id="totals" class="stat-grid"></div>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <div id="progress" class="stat-grid"></div>
    </div>

    <div class="card">
        <h3>Personal Records</h3>
        <div id="prs" class="stat-grid"></div>
    </div>

    <div class="card">
        <h3>Weekly Trend (Pushups)</h3>
        <canvas id="chart" width="400" height="200" style="width:100%; height:auto;"></canvas>
    </div>

    <div class="card">
        <h3>History</h3>
        <div id="history"></div>
        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="exportData()" style="background:#f0f0f0; color:#444; font-size:12px; padding:8px;">Backup to Clipboard</button>
            <button onclick="importData()" style="background:#f0f0f0; color:#444; font-size:12px; padding:8px;">Restore from Clipboard</button>
            <button onclick="clearAllData()" style="background:none; color:#ccc; font-size:10px; border:none;">Clear All Data</button>
            <p id="debug-date" style="font-size: 10px; color: #ccc; margin: 0; text-align: center;"></p>
        </div>
    </div>
</div>

<script>
    // 1. Data Initialization
    let data = JSON.parse(localStorage.getItem("workouts") || "{}");

    // 2. Date Helpers
    function getLocalDate(dateObj = new Date()) {
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        const day = String(dateObj.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function formatDisplayDate(isoDate) {
        if (!isoDate || !isoDate.includes('-')) return isoDate;
        const parts = isoDate.split('-');
        return `${parts[1]}/${parts[2]}/${parts[0]}`;
    }

    // 3. Core Logic
    function save() {
        localStorage.setItem("workouts", JSON.stringify(data));
        updateUI(true);
    }

    function addEntry() {
        const dateInput = document.getElementById("active-date");
        if(!dateInput) return;
        const selectedDate = dateInput.value;
        
        if (!data[selectedDate]) data[selectedDate] = [];
        const entry = {
            pushups: +document.getElementById("pushups").value || 0,
            squats: +document.getElementById("squats").value || 0,
            calves: +document.getElementById("calves").value || 0,
        };
        
        if (Object.values(entry).every(v => v === 0)) return;
        
        data[selectedDate].push(entry);
        document.querySelectorAll('input[type="number"]').forEach(i => i.value = "");
        save();
    }

    function deleteLast() {
        const selectedDate = document.getElementById("active-date").value;
        if (data[selectedDate] && data[selectedDate].length > 0) {
            data[selectedDate].pop();
            if (data[selectedDate].length === 0) delete data[selectedDate];
            save();
        }
    }

    function repeatLast() {
        const selectedDate = document.getElementById("active-date").value;
        if (data[selectedDate]?.length > 0) {
            data[selectedDate].push({ ...data[selectedDate][data[selectedDate].length - 1] });
            save();
        }
    }

    function totalsFor(date) {
        return (data[date] || []).reduce((t, e) => ({
            pushups: t.pushups + e.pushups,
            squats: t.squats + e.squats,
            calves: t.calves + e.calves,
        }), { pushups: 0, squats: 0, calves: 0 });
    }

    // 4. UI Update Logic
    function updateUI(animate = false) {
        const dateEl = document.getElementById("active-date");
        if(!dateEl) return;
        
        const selectedDate = dateEl.value;
        
        // Calculate previous day for progress
        const parts = selectedDate.split('-');
        const d = new Date(parts[0], parts[1]-1, parts[2]);
        d.setDate(d.getDate() - 1);
        const yesterday = getLocalDate(d);
        
        const t = totalsFor(selectedDate);
        const y = totalsFor(yesterday);

        // Labels
        document.getElementById("debug-date").innerText = `System Today: ${formatDisplayDate(getLocalDate())}`;
        document.getElementById("today-label").innerText = `Totals: ${formatDisplayDate(selectedDate)}`;

        // Numbers
        document.getElementById("totals").innerHTML = `
            <div><span class="stat-val">${t.pushups}</span>Pushups</div>
            <div><span class="stat-val">${t.squats}</span>Squats</div>
            <div><span class="stat-val">${t.calves}</span>Calves</div>`;

        // PRs
        let prs = {p: 0, s: 0, c: 0};
        Object.keys(data).forEach(d => {
            const tot = totalsFor(d);
            if(tot.pushups > prs.p) prs.p = tot.pushups;
            if(tot.squats > prs.s) prs.s = tot.squats;
            if(tot.calves > prs.c) prs.c = tot.calves;
        });
        document.getElementById("prs").innerHTML = `
            <div><span class="stat-val">${prs.p}</span>Pushups</div>
            <div><span class="stat-val">${prs.s}</span>Squats</div>
            <div><span class="stat-val">${prs.c}</span>Calves</div>`;

        // Comparison
        const diff = (v1, v2) => {
            const d = v1 - v2;
            const color = d > 0 ? 'green' : (d < 0 ? 'red' : 'gray');
            return `<span style="color:${color}; font-weight:bold;">${d > 0 ? '+'+d : d}</span>`;
        };
        document.getElementById("progress").innerHTML = `
            <div>${diff(t.pushups, y.pushups)} vs Prev</div>
            <div>${diff(t.squats, y.squats)} vs Prev</div>
            <div>${diff(
