<!DOCTYPE html>
<html>
<head>
    <title>Workout Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- iPhone full-screen app mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            background: #f5f5f5;
        }
        input {
            width: 90px;
            margin: 5px;
            padding: 8px;
            font-size: 16px;
        }
        button {
            padding: 10px;
            margin: 5px 5px 5px 0;
            font-size: 16px;
        }
        .section {
            margin-top: 25px;
        }
        .entry {
            padding: 5px 0;
            border-bottom: 1px solid #add;
        }
        h2, h3 {
            margin-bottom: 8px;
        }

        /* Splash screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #222;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 999;
            opacity: 1;
            transition: opacity 0.6s ease;
        }
        #splash.splash-hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Minimal splash screen -->
<div id="splash">Workout Tracker</div>

<h2>Workout Tracker</h2>

<div>
    <input id="pushups" type="number" placeholder="Push-ups">
    <input id="squats" type="number" placeholder="Squats">
    <input id="calves" type="number" placeholder="Calf Raises">
    <br>
    <button onclick="addEntry()">Add Entry</button>
    <button onclick="repeatLast()">Repeat Last Entry</button>
    <button onclick="refreshPage()">Refresh</button>
</div>

<div class="section">
    <h3>Today's Totals</h3>
    <div id="totals"></div>
</div>

<div class="section">
    <h3>Progress vs Yesterday</h3>
    <div id="progress"></div>
</div>

<div class="section">
    <h3>This Week's Summary</h3>
    <div id="weeklySummary"></div>
</div>

<div class="section">
    <h3>Personal Records</h3>
    <div id="prs"></div>
</div>

<div class="section">
    <h3>History</h3>
    <div id="history"></div>
</div>

<div class="section">
    <h3>Weekly Chart</h3>
    <canvas id="chart" width="400" height="200"></canvas>
</div>

<script>
    const data = JSON.parse(localStorage.getItem("workouts") || "{}");

    function refreshPage() {
        location.reload();
    }

    function addEntry() {
        const today = new Date().toISOString().split("T")[0];
        if (!data[today]) data[today] = [];

        const entry = {
            pushups: +document.getElementById("pushups").value || 0,
            squats: +document.getElementById("squats").value || 0,
            calves: +document.getElementById("calves").value || 0,
        };

        if (entry.pushups === 0 && entry.squats === 0 && entry.calves === 0) return;

        data[today].push(entry);
        localStorage.setItem("workouts", JSON.stringify(data));

        document.getElementById("pushups").value = "";
        document.getElementById("squats").value = "";
        document.getElementById("calves").value = "";

        updateUI(true);
    }

    function repeatLast() {
        const today = new Date().toISOString().split("T")[0];
        const entries = data[today] || [];
        if (entries.length === 0) return;

        const last = entries[entries.length - 1];
        data[today].push({ ...last });
        localStorage.setItem("workouts", JSON.stringify(data));

        updateUI(true);
    }

        const entries = data[date] || [];
        return entries.reduce((t, e) => ({
            pushups: t.pushups + e.pushups,
            squats: t.squats + e.squats,
