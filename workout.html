<!DOCTYPE html>
<html>
<head>
    <title>Workout Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- iPhone full-screen app mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            background: #f5f5f5;
        }
        input {
            width: 90px;
            margin: 5px;
            padding: 8px;
            font-size: 16px;
        }
        button {
            padding: 10px;
            margin: 5px 5px 5px 0;
            font-size: 16px;
        }
        .section {
            margin-top: 25px;
        }
        .entry {
            padding: 5px 0;
            border-bottom: 1px solid #add;
        }
        h2, h3 {
            margin-bottom: 8px;
        }

        /* Splash screen */
        #splash {
            position: fixed;
            inset: 0;
            background: #222;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 999;
            opacity: 1;
            transition: opacity 0.6s ease;
        }
        #splash.splash-hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Minimal splash screen -->
<div id="splash">Workout Tracker</div>

<h2>Workout Tracker</h2>

<div>
    <input id="pushups" type="number" placeholder="Push-ups">
    <input id="squats" type="number" placeholder="Squats">
    <input id="calves" type="number" placeholder="Calf Raises">
    <br>
    <button onclick="addEntry()">Add Entry</button>
    <button onclick="repeatLast()">Repeat Last Entry</button>
    <button onclick="refreshPage()">Refresh</button>
</div>

<div class="section">
    <h3>Today's Totals</h3>
    <div id="totals"></div>
</div>

<div class="section">
    <h3>Progress vs Yesterday</h3>
    <div id="progress"></div>
</div>

<div class="section">
    <h3>This Week's Summary</h3>
    <div id="weeklySummary"></div>
</div>

<div class="section">
    <h3>Personal Records</h3>
    <div id="prs"></div>
</div>

<div class="section">
    <h3>History</h3>
    <div id="history"></div>
</div>

<div class="section">
    <h3>Weekly Chart</h3>
    <canvas id="chart" width="400" height="200"></canvas>
</div>

<script>
    const data = JSON.parse(localStorage.getItem("workouts") || "{}");

    function refreshPage() {
        location.reload();
    }

    function addEntry() {
        const today = new Date().toISOString().split("T")[0];
        if (!data[today]) data[today] = [];

        const entry = {
            pushups: +document.getElementById("pushups").value || 0,
            squats: +document.getElementById("squats").value || 0,
            calves: +document.getElementById("calves").value || 0,
        };

        if (entry.pushups === 0 && entry.squats === 0 && entry.calves === 0) return;

        data[today].push(entry);
        localStorage.setItem("workouts", JSON.stringify(data));

        document.getElementById("pushups").value = "";
        document.getElementById("squats").value = "";
        document.getElementById("calves").value = "";

        updateUI(true);
    }

    function repeatLast() {
        const today = new Date().toISOString().split("T")[0];
        const entries = data[today] || [];
        if (entries.length === 0) return;

        const last = entries[entries.length - 1];
        data[today].push({ ...last });
        localStorage.setItem("workouts", JSON.stringify(data));

        updateUI(true);
    }

    function totalsFor(date) {
        const entries = data[date] || [];
        return entries.reduce((t, e) => ({
            pushups: t.pushups + e.pushups,
            squats: t.squats + e.squats,
            calves: t.calves + e.calves,
        }), { pushups: 0, squats: 0, calves: 0 });
    }

    function formatDiff(value) {
        if (value > 0) return `<span style="color: green;">+${value}</span>`;
        if (value < 0) return `<span style="color: red;">${value}</span>`;
        return `<span style="color: gray;">0</span>`;
    }

    /* ALWAYS return Sunday → Saturday */
    function getLast7Dates() {
        const today = new Date();
        const day = today.getDay(); // 0 = Sunday

        const sunday = new Date(today);
        sunday.setHours(0, 0, 0, 0);
        sunday.setDate(today.getDate() - day);

        const dates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(sunday);
            d.setDate(sunday.getDate() + i);
            dates.push(d.toISOString().split("T")[0]);
        }
        return dates;
    }

    function computeWeeklyStats() {
        const dates = getLast7Dates();
        let totals = { pushups: 0, squats: 0, calves: 0 };
        let best = {
            pushups: { date: null, value: 0 },
            squats: { date: null, value: 0 },
            calves: { date: null, value: 0 }
        };

        dates.forEach(date => {
            const t = totalsFor(date);
            totals.pushups += t.pushups;
            totals.squats += t.squats;
            totals.calves += t.calves;

            if (t.pushups > best.pushups.value) best.pushups = { date, value: t.pushups };
            if (t.squats > best.squats.value) best.squats = { date, value: t.squats };
            if (t.calves > best.calves.value) best.calves = { date, value: t.calves };
        });

        const avg = {
            pushups: totals.pushups / 7,
            squats: totals.squats / 7,
            calves: totals.calves / 7
        };

        return { dates, totals, avg, best };
    }

    function computePRs() {
        let prs = { pushups: 0, squats: 0, calves: 0 };
        Object.keys(data).forEach(date => {
            const t = totalsFor(date);
            if (t.pushups > prs.pushups) prs.pushups = t.pushups;
            if (t.squats > prs.squats) prs.squats = t.squats;
            if (t.calves > prs.calves) prs.calves = t.calves;
        });
        return prs;
    }

    function formatDateShort(dateStr) {
        if (!dateStr) return "-";
        const d = new Date(dateStr);
        return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    }

    function updateUI(animateChart = false) {
        const today = new Date().toISOString().split("T")[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split("T")[0];

        const t = totalsFor(today);
        const y = totalsFor(yesterday);

        document.getElementById("totals").innerHTML = 
            `Push-ups: ${t.pushups} <br>
             Squats: ${t.squats} <br>
             Calf Raises: ${t.calves}`;

        document.getElementById("progress").innerHTML = 
            `Push-ups: ${formatDiff(t.pushups - y.pushups)} <br>
             Squats: ${formatDiff(t.squats - y.squats)} <br>
             Calf Raises: ${formatDiff(t.calves - y.calves)}`;

        const weekly = computeWeeklyStats();
        document.getElementById("weeklySummary").innerHTML =
            `Total this week:<br>
             &nbsp;&nbsp;Push-ups: ${weekly.totals.pushups}<br>
             &nbsp;&nbsp;Squats: ${weekly.totals.squats}<br>
             &nbsp;&nbsp;Calf Raises: ${weekly.totals.calves}<br><br>
             Average per day:<br>
             &nbsp;&nbsp;Push-ups: ${weekly.avg.pushups.toFixed(1)}<br>
             &nbsp;&nbsp;Squats: ${weekly.avg.squats.toFixed(1)}<br>
             &nbsp;&nbsp;Calf Raises: ${weekly.avg.calves.toFixed(1)}<br><br>
             Best day:<br>
             &nbsp;&nbsp;Push-ups: ${weekly.best.pushups.value} (${formatDateShort(weekly.best.pushups.date)})<br>
             &nbsp;&nbsp;Squats: ${weekly.best.squats.value} (${formatDateShort(weekly.best.squats.date)})<br>
             &nbsp;&nbsp;Calf Raises: ${weekly.best.calves.value} (${formatDateShort(weekly.best.calves.date)})`;

        const prs = computePRs();
        document.getElementById("prs").innerHTML =
            `Push-ups: ${prs.pushups}<br>
             Squats: ${prs.squats}<br>
             Calf Raises: ${prs.calves}`;

        let hist = "";
        Object.keys(data).sort().reverse().forEach(date => {
            const d = totalsFor(date);
            hist += `<div class="entry"><strong>${date}</strong><br>
                Push-ups: ${d.pushups}, Squats: ${d.squats}, Calves: ${d.calves}</div>`;
        });
        document.getElementById("history").innerHTML = hist;

        drawChart(animateChart);
    }

    function drawChart(animate = false) {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const dates = getLast7Dates();
        const pushups = dates.map(d => totalsFor(d).pushups);
        const squats  = dates.map(d => totalsFor(d).squats);
        const calves  = dates.map(d => totalsFor(d).calves);

        const max = Math.max(...pushups, ...squats, ...calves, 10);

        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";

        const bars = dates.map((date, i) => {
            const x = i * 50 + 30;
            const dayName = new Date(date).toLocaleDateString("en-US", { weekday: "short" });

            return {
                x,
                dayName,
                values: {
                    pushups: pushups[i],
                    squats: squats[i],
                    calves: calves[i]
                }
            };
        });

        const barWidth = 10;
        const maxHeight = 160;

        function render(progress) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bars.forEach((bar, i) => {
                const { x, dayName, values } = bar;

                ctx.fillStyle = "#000";
                ctx.fillText(dayName, x + 10, 195);

                const h1 = (values.pushups / max) * maxHeight * progress;
                const h2 = (values.squats  / max) * maxHeight * progress;
                const h3 = (values.calves  / max) * maxHeight * progress;

                ctx.fillStyle = "#4CAF50";
                ctx.fillRect(x, 180 - h1, barWidth, h1);
                if (values.pushups > 0) ctx.fillText(values.pushups, x + barWidth / 2, 175 - h1);

                ctx.fillStyle = "#2196F3";
                ctx.fillRect(x + 12, 180 - h2, barWidth, h2);
                if (values.squats > 0) ctx.fillText(values.squats, x + 12 + barWidth / 2, 175 - h2);

                ctx.fillStyle = "#FF9800";
                ctx.fillRect(x + 24, 180 - h3, barWidth, h3);
                if (values.calves > 0) ctx.fillText(values.calves, x + 24 + barWidth / 2, 175 - h3);
            });
        }

        if (!animate) {
            render(1);
            return;
        }

        let start = null;
        function step(timestamp) {
            if (!start) start = timestamp;
            const elapsed = timestamp - start;
            const duration = 500;
            const progress = Math.min(1, elapsed / duration);
            render(progress);
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }

    window.addEventListener("load", () => {
        setTimeout(() => {
            const splash = document.getElementById("splash");
            if (splash) splash.classList.add("splash-hidden");
        }, 500);
        updateUI(false);
    });
</script>

</body>
</html>
