<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #f8f9fa; --card: #fff; --p: #4CAF50; --s: #2196F3; --a: #FF9800; --other: #9c27b0; --total: #607d8b; }
        
        html, body { overscroll-behavior-y: contain; font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* SPLASH SCREEN STYLES */
        #splash-screen {
            position: fixed; inset: 0; background: #1a1a1a; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .splash-logo {
            width: 80px; height: 80px; border: 4px solid var(--p); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 40px; font-weight: 900; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }
        .splash-title { color: white; font-size: 14px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        .load-bar-container { width: 150px; height: 2px; background: #333; border-radius: 2px; overflow: hidden; }
        .load-bar-progress { height: 100%; width: 0%; background: var(--p); transition: width 0.8s cubic-bezier(0.1, 0.5, 0.5, 1); }
        .splash-hidden { opacity: 0; visibility: hidden; }

        /* PTR & CORE UI (Version 3.6 Refined) */
        #ptr-hud { position: fixed; top: 0; left: 0; width: 100%; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; pointer-events: none; opacity: 0; transform: translateY(-20px); transition: opacity 0.1s; }
        #ptr-spinner { width: 30px; height: 30px; border: 3px solid #ddd; border-top: 3px solid var(--s); border-radius: 50%; transition: transform 0.1s linear, border-color 0.2s; }
        #ptr-text { font-size: 11px; font-weight: 800; color: #aaa; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }

        .container { width: 100%; max-width: 400px; padding: 15px; box-sizing: border-box; flex: 1; transition: filter 0.2s, opacity 0.2s; }
        .pulling .container { filter: blur(2px); opacity: 0.6; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: white; }
        .row-wrap { display: flex; width: 100%; gap: 10px; }
        .row-wrap select { flex: 2; }
        .row-wrap input { flex: 1; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-add { background: var(--p); grid-column: span 2; }
        .btn-rep { background: var(--s); }
        .btn-del { background: #ff4444; }
        
        .carousel-view { padding: 20px 0; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .carousel-val { font-size: 3.5em; font-weight: 900; line-height: 1; margin: 5px 0; }
        .carousel-label { font-size: 0.8em; color: #999; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }

        .dots { display: flex; justify-content: center; gap: 6px; margin-top: 10px; padding-bottom: 10px; }
        .dot { width: 6px; height: 6px; background: #eee; border-radius: 50%; transition: background 0.3s; }
        .dot.active { background: #bbb; }

        .history-item { border-bottom: 1px solid #f0f0f0; padding: 10px 0; cursor: pointer; }
        .history-header { display: flex; justify-content: space-between; align-items: center; text-align: left; padding: 0 5px; }
        .history-date { font-size: 14px; font-weight: 600; color: #333; }
        .history-meta { color: #ccc; font-size: 11px; }
        .history-details { display: none; text-align: left; background: #fafafa; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 13px; border: 1px solid #f0f0f0; }
        .history-details.open { display: block; }
        .detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #eee; }
        .detail-total-row { margin-top: 8px; padding-top: 8px; border-top: 1px solid #ddd; font-weight: bold; display: flex; justify-content: space-between; color: #666; font-size: 11px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .refreshing #ptr-spinner { animation: spin 0.6s linear infinite; border-top-color: var(--p); }

        footer { width: 100%; padding: 20px 0; text-align: center; font-size: 10px; color: #bbb; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">W</div>
    <div class="splash-title">Workout Pro</div>
    <div class="load-bar-container">
        <div class="load-bar-progress" id="load-bar"></div>
    </div>
</div>

<div id="ptr-hud">
    <div id="ptr-spinner"></div>
    <div id="ptr-text">Pull to refresh</div>
</div>

<div class="container" id="main-content">
    <div class="card">
        <label id="date-label" style="font-size:11px; font-weight:bold; color:#aaa; text-transform:uppercase;">Workout Date</label>
        <input type="date" id="active-date">
        <div class="entry-group">
            <div class="row-wrap">
                <select id="workout-type" onchange="toggleCustomInput()">
                    <option value="" disabled selected>Select Workout</option>
                    <option value="p">Pushups</option>
                    <option value="s">Squats</option>
                    <option value="c">Calves</option>
                    <option value="mp">Modified Pushups</option>
                    <option value="bc">Band Curls</option>
                    <option value="custom">Other...</option>
                </select>
                <input id="reps-val" type="number" pattern="\d*" placeholder="Reps">
            </div>
            <input id="custom-name" type="text" placeholder="Workout Name (e.g. Plank)" style="display:none;">
        </div>
        <div class="btn-row">
            <button class="btn-add" onclick="addEntry()">Add Entry</button>
            <button class="btn-rep" onclick="repeatLast()">Repeat Last</button>
            <button class="btn-del" onclick="deleteLast()">Undo Last</button>
        </div>
    </div>

    <div class="card" id="summary-card" style="position:relative; overflow:hidden; touch-action: pan-y;">
        <div id="summary-view" class="carousel-view"></div>
        <div class="dots" id="summary-dots">
            <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div class="card" id="chart-card" style="position:relative; overflow:hidden; touch-action: pan-y;">
        <h3 id="chart-view-title" style="margin-top:10px; font-size: 0.75em; color: #bbb; text-transform:uppercase; letter-spacing:1px;">CHART</h3>
        <canvas id="chart" width="400" height="200" style="width:100%; height:auto; margin-top:5px;"></canvas>
        <div class="dots" id="chart-dots">
            <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div class="card" style="padding: 20px;">
        <h3 style="margin:0 0 15px 0; font-size: 10px; color:#aaa; text-align: left; text-transform: uppercase; letter-spacing: 1px;">History Log</h3>
        <div id="history"></div>
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:15px; display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="downloadCSV()" style="background:#f0f0f0; color:#444; font-size:11px; flex:1; border:1px solid #ddd;">CSV</button>
            <button onclick="importData()" style="background:#f0f0f0; color:#666; font-size:11px; flex:1;">Restore</button>
            <button onclick="clearAll()" style="background:none; color:#ccc; font-size:9px; border:none; width:100%;">Clear All Data</button>
        </div>
    </div>
</div>

<footer>Workout Tracker Pro — v3.6</footer>

<script>
    var workouts = {};
    var currentChartView = 0; 
    var currentSummaryView = 0; 
    var expandedDay = null; 
    const labelMap = { p: "Pushups", s: "Squats", c: "Calves", mp: "Modified Pushups", bc: "Band Curls" };

    try {
        var saved = localStorage.getItem("workouts");
        if(saved) workouts = JSON.parse(saved);
    } catch(e) { workouts = {}; }

    function getTodayLocal() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    }

    // SPLASH SCREEN LOGIC
    function initSplash() {
        const bar = document.getElementById('load-bar');
        const splash = document.getElementById('splash-screen');
        setTimeout(() => { bar.style.width = '100%'; }, 100);
        setTimeout(() => { splash.classList.add('splash-hidden'); }, 1100);
    }

    // PULL-TO-REFRESH HUD
    let touchStart = 0;
    const hud = document.getElementById('ptr-hud'), spinner = document.getElementById('ptr-spinner'), txt = document.getElementById('ptr-text'), body = document.body;

    document.addEventListener('touchstart', e => { touchStart = e.touches[0].pageY; }, {passive: true});
    document.addEventListener('touchmove', e => {
        let touchDiff = e.touches[0].pageY - touchStart;
        if (window.scrollY === 0 && touchDiff > 0) {
            body.classList.add('pulling');
            let offset = Math.min(touchDiff / 2.5, 80);
            hud.style.opacity = offset / 80;
            hud.style.transform = `translateY(${offset - 40}px)`;
            spinner.style.transform = `rotate(${touchDiff * 2}deg)`;
            if (offset >= 75) { txt.innerText = "Release to refresh"; txt.style.color = "var(--p)"; spinner.style.borderColor = "var(--p)"; }
            else { txt.innerText = "Pull to refresh"; txt.style.color = "#aaa"; spinner.style.borderColor = "#ddd"; spinner.style.borderTopColor = "var(--s)"; }
        }
    }, {passive: true});

    document.addEventListener('touchend', e => {
        let touchDiff = e.changedTouches[0].pageY - touchStart;
        if (window.scrollY === 0 && touchDiff > 180) {
            body.classList.remove('pulling'); body.classList.add('refreshing');
            txt.innerText = "Refreshing..."; setTimeout(() => location.reload(), 600);
        } else { body.classList.remove('pulling'); hud.style.opacity = 0; hud.style.transform = `translateY(-40px)`; }
    }, {passive: true});

    function toggleCustomInput() {
        var s = document.getElementById("workout-type"), c = document.getElementById("custom-name");
        c.style.display = (s.value === "custom") ? "block" : "none"; if(s.value === "custom") c.focus();
    }

    function addSwipe(elId, count, callback) {
        let start = 0, el = document.getElementById(elId);
        el.addEventListener('touchstart', e => { start = e.touches[0].pageX; }, {passive: true});
        el.addEventListener('touchend', e => { let diff = e.changedTouches[0].pageX - start; if (Math.abs(diff) > 40) callback(diff > 0 ? -1 : 1); });
    }

    addSwipe('chart-card', 3, (dir) => { currentChartView = (currentChartView + dir + 3) % 3; updateUI(); });
    addSwipe('summary-card', 5, (dir) => { currentSummaryView = (currentSummaryView + dir + 5) % 5; updateUI(); });

    function getTots(day) {
        var list = workouts[day] || [], res = { p: 0, s: 0, c: 0, total: 0, others: [], allEntries: list };
        list.forEach(e => {
            let key = Object.keys(e)[0], val = parseInt(e[key]) || 0;
            res.total += val; if(key === 'p') res.p += val; else if(key === 's') res.s += val; else if(key === 'c') res.c += val;
            else { res.others.push({name: labelMap[key] || key, val: val}); }
        });
        return res;
    }

    function handleHistoryTap(day) {
        if (expandedDay === day) { expandedDay = null; document.getElementById("active-date").value = getTodayLocal(); }
        else { expandedDay = day; document.getElementById("active-date").value = day; }
        updateUI();
    }

    function updateUI() {
        var active = document.getElementById("active-date").value, t = getTots(active);
        document.querySelectorAll('#chart-dots .dot').forEach((d, i) => d.classList.toggle('active', i === currentChartView));
        document.querySelectorAll('#summary-dots .dot').forEach((d, i) => d.classList.toggle('active', i === currentSummaryView));
        
        const summary = document.getElementById('summary-view');
        if (currentSummaryView === 0) summary.innerHTML = `<span class="carousel-label">Pushups</span><div class="carousel-val" style="color:var(--p)">${t.p}</div>`;
        else if (currentSummaryView === 1) summary.innerHTML = `<span class="carousel-label">Squats</span><div class="carousel-val" style="color:var(--s)">${t.s}</div>`;
        else if (currentSummaryView === 2) summary.innerHTML = `<span class="carousel-label">Calves</span><div class="carousel-val" style="color:var(--a)">${t.c}</div>`;
        else if (currentSummaryView === 3) {
            let list = t.others.map(o => `<b>${o.name}</b>: ${o.val}`).join("<br>");
            summary.innerHTML = `<span class="carousel-label">Others</span><div style="font-size:13px; margin-top:10px;">${list || 'None'}</div>`;
        } else summary.innerHTML = `<span class="carousel-label">Daily Total</span><div class="carousel-val" style="color:var(--total)">${t.total}</div>`;

        var label = document.getElementById("date-label");
        label.innerHTML = (workouts[active]?.length > 0) ? 'Workout Date <span style="color:var(--p); font-size:9px;">(Logged)</span>' : 'Workout Date';

        var hist = "";
        var sortedDays = Object.keys(workouts).sort().reverse().slice(0,10);
        sortedDays.forEach(day => {
            let dayT = getTots(day);
            let setsHtml = dayT.allEntries.map(e => { let k = Object.keys(e)[0]; return `<div class="detail-row"><span>${labelMap[k] || k}</span> <span>${e[k]}</span></div>`; }).join("");
            hist += `<div class="history-item" onclick="handleHistoryTap('${day}')">
                <div class="history-header"><div class="history-date">${day.split('-')[1]}/${day.split('-')[2]}/${day.split('-')[0]}</div><div class="history-meta">${dayT.allEntries.length} sets ${expandedDay === day ? '▴':'▾'}</div></div>
                <div class="history-details ${expandedDay === day ? 'open' : ''}">${setsHtml}<div class="detail-total-row"><span>TOTAL VOLUME</span> <span>${dayT.total} REPS</span></div></div>
            </div>`;
        });
        document.getElementById("history").innerHTML = hist || '<p style="color:#999;text-align:center;font-size:12px;">No logs yet.</p>';
        draw();
    }

    function draw() {
        var can = document.getElementById("chart"), ctx = can.getContext("2d"); ctx.clearRect(0,0,400,200);
        var days = []; for(var i=6; i>=0; i--) { var d = new Date(); d.setDate(d.getDate()-i); days.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')); }
        var sel = document.getElementById("active-date").value;
        if (currentChartView === 0) { 
            var max = 10; days.forEach(day => { var t = getTots(day); max = Math.max(max, t.p, t.s, t.c); });
            days.forEach((day, k) => {
                var t = getTots(day), x = k * 55 + 15; ctx.globalAlpha = (day === sel) ? 1.0 : 0.2;
                var bar = (v, c, o) => { var h = (v/max) * 140; ctx.fillStyle = c; ctx.fillRect(x+o, 170-h, 10, h); };
                bar(t.p, "#4CAF50", 0); bar(t.s, "#2196F3", 12); bar(t.c, "#FF9800", 24);
                ctx.globalAlpha = 1; ctx.fillStyle = "#333"; ctx.font = "10px sans-serif"; ctx.textAlign="center";
                ctx.fillText(new Date(day.replace(/-/g,'/')).toLocaleDateString(undefined, {weekday:'narrow'}), x+17, 190);
            });
        } else if (currentChartView === 1) { 
            var maxV = 10; days.forEach(day => { maxV = Math.max(maxV, getTots(day).total); });
            days.forEach((day, k) => {
                var t = getTots(day), x = k * 55 + 15; ctx.globalAlpha = (day === sel) ? 1.0 : 0.3;
                var h = (t.total/maxV) * 140; ctx.fillStyle = "#607d8b"; ctx.fillRect(x, 170-h, 34, h);
                ctx.globalAlpha = 1; ctx.fillStyle = "#333"; ctx.textAlign="center";
                ctx.fillText(new Date(day.replace(/-/g,'/')).toLocaleDateString(undefined, {weekday:'narrow'}), x+17, 190);
                if(t.total > 0) ctx.fillText(t.total, x+17, 165-h);
            });
        } else { 
            days.forEach((day, k) => {
                var t = getTots(day), x = k * 55 + 15, count = t.others.length + (t.p?1:0) + (t.s?1:0) + (t.c?1:0);
                ctx.globalAlpha = (day === sel) ? 1.0 : 0.3; var h = (count / 6) * 140; ctx.fillStyle = "#9c27b0"; ctx.fillRect(x, 170-h, 34, h);
                ctx.globalAlpha = 1; ctx.fillStyle = "#333"; ctx.textAlign="center";
                ctx.fillText(new Date(day.replace(/-/g,'/')).toLocaleDateString(undefined, {weekday:'narrow'}), x+17, 190); ctx.fillText(count, x+17, 165-h);
            });
        }
    }

    function addEntry() {
        var d = document.getElementById("active-date").value, type = document.getElementById("workout-type").value, custom = document.getElementById("custom-name").value.trim(), val = parseInt(document.getElementById("reps-val").value) || 0;
        if(!type || (type === "custom" && !custom) || val <= 0) { alert("Check your reps!"); return; }
        if(!workouts[d]) workouts[d] = []; var key = (type === "custom") ? custom : type; var entry = {}; entry[key] = val; workouts[d].push(entry);
        if(key === 'p') currentSummaryView = 0; else if(key === 's') currentSummaryView = 1; else if(key === 'c') currentSummaryView = 2; else currentSummaryView = 3;
        document.getElementById("workout-type").value = ""; document.getElementById("reps-val").value = ""; document.getElementById("custom-name").value = ""; toggleCustomInput(); save();
    }

    function repeatLast() { var d = document.getElementById("active-date").value; if(workouts[d]?.length > 0) { workouts[d].push({...workouts[d][workouts[d].length-1]}); save(); } }
    function deleteLast() { var d = document.getElementById("active-date").value; if(workouts[d]?.length > 0) { workouts[d].pop(); if(workouts[d].length === 0) delete workouts[d]; save(); } }
    function save() { localStorage.setItem("workouts", JSON.stringify(workouts)); updateUI(); }
    function downloadCSV() {
        let csv = "Date,Workout,Reps\n"; Object.keys(workouts).sort().forEach(day => { workouts[day].forEach(entry => { let k = Object.keys(entry)[0]; csv += `${day},${labelMap[k] || k},${entry[k]}\n`; }); });
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = 'workout_history.csv'; a.click();
    }
    function importData() { var s = prompt("Paste JSON Backup:"); if(s){ try{workouts=JSON.parse(s);save();}catch(e){alert("Error");} } }
    function clearAll() { if(confirm("Permanently delete all data?")){workouts={};save();} }

    window.onload = function() {
        initSplash();
        document.getElementById("active-date").value = getTodayLocal();
        document.getElementById("active-date").onchange = function() { expandedDay = null; updateUI(); };
        updateUI();
    };
</script>
</body>
</html>
