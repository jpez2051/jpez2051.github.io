<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #333;
            --primary: #4CAF50;
            --secondary: #2196F3;
            --accent: #FF9800;
            --danger: #ff4444;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        .refresh-container {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 5px;
        }
        .btn-refresh {
            background: #e0e0e0;
            color: #666;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2, h3 { margin-top: 0; color: #111; }
        
        .date-picker-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        #active-date {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            background: #fff;
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-add { background: var(--primary); color: white; grid-column: span 2; }
        .btn-repeat { background: var(--secondary); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; font-size: 0.9em; }
        .stat-val { font-size: 1.2em; font-weight: bold; display: block; }

        #history { max-height: 200px; overflow-y: auto; font-size: 0.85em; }
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; }

        #splash {
            position: fixed; inset: 0; background: #111; color: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        .hidden { opacity: 0 !important; pointer-events: none !important; }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 10px;
            margin-bottom: 10px;
        }
        .legend-item span { width: 10px; height: 10px; display: inline-block; border-radius: 2px; margin-right: 4px; }
    </style>
</head>
<body>

<div id="splash"><h1>TRAIN</h1></div>

<div class="container">
    <div class="refresh-container">
        <button class="btn-refresh" onclick="location.reload()">Refresh App</button>
    </div>

    <h2>Workout Tracker</h2>
    
    <div class="card">
        <div class="date-picker-group">
            <label style="font-size:12px; font-weight:bold; color:#666;">Date:</label>
            <input type="date" id="active-date">
        </div>
        <div class="input-group">
            <input id="pushups" type="number" pattern="\d*" placeholder="Push-ups">
            <input id="squats" type="number" pattern="\d*" placeholder="Squats">
            <input id="calves" type="number" pattern="\d*" placeholder="Calves">
        </div>
        <div class="btn-row">
            <button class="btn-add" onclick="addEntry()">Add Entry</button>
            <button class="btn-repeat" onclick="repeatLast()">Repeat Last</button>
            <button class="btn-delete" onclick="deleteLast()">Undo Last</button>
        </div>
    </div>

    <div class="card">
        <h3 id="today-label">Totals</h3>
        <div id="totals" class="stat-grid"></div>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <div id="progress" class="stat-grid"></div>
    </div>

    <div class="card">
        <h3>Personal Records</h3>
        <div id="prs" class="stat-grid"></div>
    </div>

    <div class="card">
        <h3>Weekly Trend</h3>
        <div class="chart-legend">
            <div class="legend-item"><span style="background:var(--primary)"></span>Pushups</div>
            <div class="legend-item"><span style="background:var(--secondary)"></span>Squats</div>
            <div class="legend-item"><span style="background:var(--accent)"></span>Calves</div>
        </div>
        <canvas id="chart" width="400" height="200" style="width:100%; height:auto;"></canvas>
    </div>

    <div class="card">
        <h3>History</h3>
        <div id="history"></div>
        <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="exportData()" style="background:#f0f0f0; color:#444; font-size:12px; padding:8px;">Backup to Clipboard</button>
            <button onclick="importData()" style="background:#f0f0f0; color:#444; font-size:12px; padding:8px;">
