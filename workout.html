<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #f8f9fa; --card: #fff; --p: #4CAF50; --s: #2196F3; --a: #FF9800; --other: #9c27b0; }
        
        html, body { 
            overscroll-behavior-y: contain; 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 400px; padding: 15px; box-sizing: border-box; flex: 1; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; 
            border: 1px solid #ddd; border-radius: 8px; 
            font-size: 16px; box-sizing: border-box; background: white;
        }
        
        .entry-group { display: flex; gap: 10px; flex-direction: column; }
        .row-wrap { display: flex; width: 100%; gap: 10px; }
        .row-wrap select { flex: 2; }
        .row-wrap input { flex: 1; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        button:active { opacity: 0.7; }
        .btn-add { background: var(--p); grid-column: span 2; }
        .btn-rep { background: var(--s); }
        .btn-del { background: #ff4444; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; gap: 5px; }
        .stat-val { font-size: 1.2em; font-weight: bold; display: block; }
        
        /* Carousel/Chart Styles */
        .chart-container { position: relative; overflow: hidden; touch-action: pan-y; }
        .chart-title { margin: 0 0 5px 0; font-size: 1.1em; text-align: center; }
        .dots { display: flex; justify-content: center; gap: 5px; margin-top: 5px; }
        .dot { width: 6px; height: 6px; background: #ddd; border-radius: 50%; }
        .dot.active { background: #999; }

        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.9em; align-items: center; }
        
        #ptr-element {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #999; transform: translateY(-50px);
            transition: transform 0.2s ease; z-index: 10;
        }

        footer { width: 100%; padding: 20px 0; text-align: center; font-size: 10px; color: #bbb; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="ptr-element">Pull to refresh...</div>

<div class="container" id="main-content">
    <div class="card">
        <label id="date-label" style="font-size:12px; font-weight:bold; color:#666;">Select Workout Date:</label>
        <input type="date" id="active-date">
        
        <div class="entry-group">
            <div class="row-wrap">
                <select id="workout-type" onchange="toggleCustomInput()">
                    <option value="" disabled selected>Select Workout</option>
                    <option value="p">Pushups</option>
                    <option value="s">Squats</option>
                    <option value="c">Calves</option>
                    <option value="mp">Modified Pushups</option>
                    <option value="bc">Band Curls</option>
                    <option value="custom">Other...</option>
                </select>
                <input id="reps-val" type="number" pattern="\d*" placeholder="Reps">
            </div>
            <input id="custom-name" type="text" placeholder="Workout Name (e.g. Plank)" style="display:none;">
        </div>

        <div class="btn-row">
            <button class="btn-add" onclick="addEntry()">Add Entry</button>
            <button class="btn-rep" onclick="repeatLast()">Repeat Last</button>
            <button class="btn-del" onclick="deleteLast()">Undo Last</button>
        </div>
    </div>

    <div class="card">
        <h3 id="label-date" style="margin:0 0 10px 0; font-size: 1.1em;">Daily Summary</h3>
        <div id="totals" class="stat-grid"></div>
        <div id="day-details" style="margin-top:10px; font-size:0.85em; color:#666; border-top:1px solid #eee; padding-top:10px;"></div>
    </div>

    <div class="card chart-container" id="chart-card">
        <h3 class="chart-title" id="chart-view-title">Weekly Comparison</h3>
        <canvas id="chart" width="400" height="200" style="width:100%; height:auto;"></canvas>
        <div class="dots" id="chart-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <p style="font-size:9px; color:#ccc; text-align:center; margin:5px 0 0 0;">Swipe to change view</p>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 1.1em;">History</h3>
        <div id="history"></div>
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px; display:flex; gap:10px; flex-wrap:wrap;">
            <button onclick="downloadCSV()" style="background:#f0f0f0; color:#444; font-size:11px; flex:1; border:1px solid #ddd;">Download CSV</button>
            <button onclick="importData()" style="background:#f0f0f0; color:#666; font-size:11px; flex:1;">Restore JSON</button>
            <button onclick="clearAll()" style="background:none; color:#ccc; font-size:10px; border:none; width:100%;">Clear Everything</button>
        </div>
    </div>
</div>

<footer>Workout Tracker Pro — v2.6</footer>

<script>
    var workouts = {};
    var currentChartView = 0; 
    const labelMap = { p: "Pushups", s: "Squats", c: "Calves", mp: "Modified Pushups", bc: "Band Curls" };

    try {
        var saved = localStorage.getItem("workouts");
        if(saved) workouts = JSON.parse(saved);
    } catch(e) { workouts = {}; }

    function toggleCustomInput() {
        var select = document.getElementById("workout-type");
        var customInput = document.getElementById("custom-name");
        customInput.style.display = (select.value === "custom") ? "block" : "none";
        if(select.value === "custom") customInput.focus();
    }

    // Chart Swipe Interaction
    var chartStart = 0;
    var chartCard = document.getElementById('chart-card');
    chartCard.addEventListener('touchstart', e => { chartStart = e.touches[0].pageX; }, {passive: true});
    chartCard.addEventListener('touchend', e => {
        var diff = e.changedTouches[0].pageX - chartStart;
        if (Math.abs(diff) > 50) {
            if (diff > 0) currentChartView = (currentChartView > 0) ? currentChartView - 1 : 2;
            else currentChartView = (currentChartView < 2) ? currentChartView + 1 : 0;
            updateDots();
            draw();
        }
    });

    function updateDots() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((d, i) => d.classList.toggle('active', i === currentChartView));
        const titles = ["Weekly Comparison", "Daily Total Volume", "Custom Exercises"];
        document.getElementById('chart-view-title').innerText = titles[currentChartView];
    }

    // PTR Logic
    var ptrStartY = 0;
    var ptr = document.getElementById('ptr-element');
    var content = document.getElementById('main-content');
    window.addEventListener('touchstart', e => { if (window.scrollY === 0) ptrStartY = e.touches[0].pageY; }, {passive: true});
    window.addEventListener('touchmove', e => {
        var y = e.touches[0].pageY;
        if (window.scrollY === 0 && y > ptrStartY) {
            var diff = y - ptrStartY;
            if (diff > 10 && diff < 80) {
                ptr.style.transform = `translateY(${diff - 50}px)`;
                content.style.transform = `translateY(${diff/2}px)`;
                ptr.innerText = diff > 60 ? "Release to refresh..." : "Pull to refresh...";
            }
        }
    }, {passive: true});
    window.addEventListener('touchend', e => {
        var y = e.changedTouches[0].pageY;
        if (window.scrollY === 0 && (y - ptrStartY) > 60) { location.reload(); } 
        else { ptr.style.transform = 'translateY(-50px)'; content.style.transform = 'translateY(0px)'; }
    });

    function getToday() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
    function fmtDate(iso) { if(!iso) return ""; var p = iso.split('-'); return p[1] + '/' + p[2] + '/' + p[0]; }
    
    function getTots(day) {
        var list = workouts[day] || [];
        var res = { p: 0, s: 0, c: 0, total: 0, others: [] };
        list.forEach(e => {
            let key = Object.keys(e)[0];
            let val = parseInt(e[key]) || 0;
            res.total += val;
            if(key === 'p') res.p += val;
            else if(key === 's') res.s += val;
            else if(key === 'c') res.c += val;
            else {
                let name = labelMap[key] || key;
                res.others.push({name: name, val: val});
            }
        });
        return res;
    }

    function update() {
        var active = document.getElementById("active-date").value;
        if(!active) return;
        var label = document.getElementById("date-label");
        label.innerHTML = (workouts[active] && workouts[active].length > 0) ? 'Select Workout Date: <span style="color:var(--p)">✅ Logged</span>' : 'Select Workout Date:';
        var t = getTots(active);
        document.getElementById("totals").innerHTML = `<div><span class="stat-val">${t.p}</span>P</div><div><span class="stat-val">${t.s}</span>S</div><div><span class="stat-val">${t.c}</span>C</div>`;
        let otherText = t.others.map(o => `<b>${o.name}</b>: ${o.val}`).join(" | ");
        document.getElementById("day-details").innerHTML = otherText || "No additional exercises.";
        var hist = "";
        var sortedDays = Object.keys(workouts).sort().reverse().slice(0,7);
        sortedDays.forEach(day => {
            let dayT = getTots(day);
            hist += `<div class="history-item"><div><strong>${fmtDate(day)}</strong><br><span style="color:#666;font-size:10px;">Vol: ${dayT.total}</span></div><div style="text-align:right; font-size:10px; color:#bbb;">${dayT.others.length} custom</div></div>`;
        });
        document.getElementById("history").innerHTML = hist || '<p style="color:#999;text-align:center;">No history.</p>';
        draw();
    }

    function draw() {
        var can = document.getElementById("chart");
        var ctx = can.getContext("2d");
        ctx.clearRect(0,0,400,200);
        var days = [];
        for(var i=6; i>=0; i--) { 
            var d = new Date(); d.setDate(d.getDate()-i); 
            days.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0')); 
        }
        var sel = document.getElementById("active-date").value;

        if (currentChartView === 0) { 
            var max = 10;
            days.forEach(day => { var t = getTots(day); max = Math.max(max, t.p, t.s, t.c); });
            days.forEach((day, k) => {
                var t = getTots(day); var x = k * 55 + 15;
                ctx.globalAlpha = (day === sel) ? 1.0 : 0.3;
                var bar = (val, col, off) => { var h = (val/max) * 140; ctx.fillStyle = col; ctx.fillRect(x+off, 170-h, 10, h); };
                bar(t.p, "#4CAF50", 0); bar(t.s, "#2196F3", 12); bar(t.c, "#FF9800", 24);
                ctx.globalAlpha = 1; ctx.fillStyle = "#333"; ctx.font = "10px sans-serif"; ctx.textAlign="center";
                ctx.fillText(new Date(day.replace(/-/g,'/')).toLocaleDateString(undefined, {weekday:'narrow'}), x+17, 190);
            });
        } else if (currentChartView === 1) { 
            var maxV = 10;
            days.forEach(day => { maxV = Math.max(maxV, getTots(day).total); });
            days.forEach((day, k) => {
                var t = getTots(day); var x = k * 55 + 15;
                ctx.globalAlpha = (day === sel) ? 1.0 : 0.4;
                var h = (t.total/maxV) * 140;
                ctx.fillStyle = "#607d8b";
                ctx.fillRect(x, 170-h, 34, h);
                ctx.globalAlpha = 1; ctx.fillStyle = "#333";
                ctx.fillText(new Date(day.replace(/-/g,'/')).toLocaleDateString(undefined, {weekday:'narrow'}), x+17, 190);
                if(t.total > 0) ctx.fillText(t.total, x+17, 165-h);
            });
        } else { 
            days.forEach((day, k) => {
                var t = getTots(day); var x = k * 55 + 15;
                var count = t.others.length;
                ctx.globalAlpha = (day === sel) ? 1.0 : 0.4;
                var h = (count / 5) * 140; 
                ctx.fillStyle = "#9c27b0";
                ctx.fillRect(x, 170-h, 34, h);
                ctx.globalAlpha = 1; ctx.fillStyle = "#333";
                ctx.fillText(new Date(day.replace(/-/g,'/')).toLocaleDateString(undefined, {weekday:'narrow'}), x+17, 190);
                ctx.fillText(count, x+17, 165-h);
            });
        }
    }

    function addEntry() {
        var d = document.getElementById("active-date").value;
        var type = document.getElementById("workout-type").value;
        var custom = document.getElementById("custom-name").value.trim();
        var val = parseInt(document.getElementById("reps-val").value) || 0;
        if(!type || (type === "custom" && !custom) || val <= 0) { alert("Invalid entry!"); return; }
        if(!workouts[d]) workouts[d] = [];
        var key = (type === "custom") ? custom : type;
        var entry = {}; entry[key] = val;
        workouts[d].push(entry);
        document.getElementById("workout-type").value = ""; 
        document.getElementById("reps-val").value = "";
        document.getElementById("custom-name").value = "";
        toggleCustomInput();
        save();
    }

    function repeatLast() {
        var d = document.getElementById("active-date").value;
        if(workouts[d] && workouts[d].length > 0) { workouts[d].push({...workouts[d][workouts[d].length-1]}); save(); }
    }

    function deleteLast() {
        var d = document.getElementById("active-date").value;
        if(workouts[d] && workouts[d].length > 0) { workouts[d].pop(); if(workouts[d].length === 0) delete workouts[d]; save(); }
    }

    function save() { localStorage.setItem("workouts", JSON.stringify(workouts)); update(); }

    function downloadCSV() {
        let csv = "Date,Workout,Reps\n";
        Object.keys(workouts).sort().forEach(day => {
            workouts[day].forEach(entry => {
                let key = Object.keys(entry)[0];
                let name = labelMap[key] || key;
                csv += `${fmtDate(day)},${name},${entry[key]}\n`;
            });
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `workout_history.csv`; a.click();
    }

    function importData() { var s = prompt("Paste JSON backup data:"); if(s){ try{workouts=JSON.parse(s);save();}catch(e){alert("Error");} } }
    function clearAll() { if(confirm("Delete everything?")){workouts={};save();} }

    window.onload = function() {
        document.getElementById("active-date").value = getToday();
        document.getElementById("active-date").onchange = update;
        update();
    };
</script>
</body>
</html>
