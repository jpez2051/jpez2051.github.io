<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #333;
            --primary: #4CAF50;
            --secondary: #2196F3;
            --accent: #FF9800;
            --danger: #ff4444;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2, h3 { margin-top: 0; color: #111; }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* Prevents iOS zoom on focus */
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-add { background: var(--primary); color: white; grid-column: span 2; }
        .btn-repeat { background: var(--secondary); color: white; }
        .btn-delete { background: var(--danger); color: white; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; font-size: 0.9em; }
        .stat-val { font-size: 1.2em; font-weight: bold; display: block; }

        #history { max-height: 200px; overflow-y: auto; font-size: 0.85em; }
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; }

        /* Splash */
        #splash {
            position: fixed; inset: 0; background: #111; color: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="splash"><h1>TRAIN</h1></div>

<div class="container">
    <h2>Workout Tracker</h2>
    
    <div class="card">
        <div class="input-group">
            <input id="pushups" type="number" pattern="\d*" placeholder="Push-ups">
            <input id="squats" type="number" pattern="\d*" placeholder="Squats">
            <input id="calves" type="number" pattern="\d*" placeholder="Calves">
        </div>
        <div class="btn-row">
            <button class="btn-add" onclick="addEntry()">Add Entry</button>
            <button class="btn-repeat" onclick="repeatLast()">Repeat Last</button>
            <button class="btn-delete" onclick="deleteLast()">Undo Last</button>
        </div>
    </div>

    <div class="card">
        <h3>Today</h3>
        <div id="totals" class="stat-grid"></div>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <div id="progress" class="stat-grid"></div>
    </div>

    <div class="card">
        <h3>Weekly Trend</h3>
        <canvas id="chart" width="400" height="200" style="width:100%; height:auto;"></canvas>
    </div>

    <div class="card">
        <h3>Stats & History</h3>
        <div id="weeklySummary" style="font-size: 0.9em; line-height: 1.6;"></div>
        <div id="history" style="margin-top:15px;"></div>
        <button onclick="clearAllData()" style="background:none; color:gray; font-size:10px; margin-top:20px;">Clear All Data</button>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem("workouts") || "{}");

    function save() {
        localStorage.setItem("workouts", JSON.stringify(data));
        updateUI(true);
    }

    function addEntry() {
        const today = new Date().toISOString().split("T")[0];
        if (!data[today]) data[today] = [];

        const entry = {
            pushups: +document.getElementById("pushups").value || 0,
            squats: +document.getElementById("squats").value || 0,
            calves: +document.getElementById("calves").value || 0,
        };

        if (Object.values(entry).every(v => v === 0)) return;

        data[today].push(entry);
        document.querySelectorAll('input').forEach(i => i.value = "");
        save();
    }

    function deleteLast() {
        const today = new Date().toISOString().split("T")[0];
        if (data[today] && data[today].length > 0) {
            data[today].pop();
            save();
        }
    }

    function repeatLast() {
        const today = new Date().toISOString().split("T")[0];
        if (data[today]?.length > 0) {
            data[today].push({ ...data[today][data[today].length - 1] });
            save();
        }
    }

    function clearAllData() {
        if(confirm("Delete everything?")) {
            data = {};
            save();
        }
    }

    function totalsFor(date) {
        return (data[date] || []).reduce((t, e) => ({
            pushups: t.pushups + e.pushups,
            squats: t.squats + e.squats,
            calves: t.calves + e.calves,
        }), { pushups: 0, squats: 0, calves: 0 });
    }

    function updateUI(animate = false) {
        const today = new Date().toISOString().split("T")[0];
        const yesterday = new Date(Date.now() - 86400000).toISOString().split("T")[0];
        
        const t = totalsFor(today);
        const y = totalsFor(yesterday);

        // Update Totals
        document.getElementById("totals").innerHTML = `
            <div><span class="stat-val">${t.pushups}</span>Pushups</div>
            <div><span class="stat-val">${t.squats}</span>Squats</div>
            <div><span class="stat-val">${t.calves}</span>Calves</div>`;

        // Update Progress
        const diff = (v1, v2) => {
            const d = v1 - v2;
            const color = d > 0 ? 'green' : (d < 0 ? 'red' : 'gray');
            return `<span style="color:${color}">${d > 0 ? '+'+d : d}</span>`;
        };
        
        document.getElementById("progress").innerHTML = `
            <div>${diff(t.pushups, y.pushups)} vs Yest.</div>
            <div>${diff(t.squats, y.squats)} vs Yest.</div>
            <div>${diff(t.calves, y.calves)} vs Yest.</div>`;

        // Update History
        document.getElementById("history").innerHTML = Object.keys(data).sort().reverse().map(date => {
            const tot = totalsFor(date);
            return `<div class="history-item"><strong>${date}</strong>: P:${tot.pushups} S:${tot.squats} C:${tot.calves}</div>`;
        }).join('');

        drawChart(animate);
    }

    function drawChart(animate) {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        const days = [];
        for(let i=6; i>=0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            days.push(d.toISOString().split("T")[0]);
        }

        const pushData = days.map(d => totalsFor(d).pushups);
        const max = Math.max(...pushData, 20);
        
        let start = null;
        function render(progress) {
            ctx.clearRect(0,0,400,200);
            days.forEach((day, i) => {
                const val = totalsFor(day).pushups;
                const h = (val / max) * 150 * progress;
                ctx.fillStyle = "#4CAF50";
                ctx.fillRect(i * 55 + 10, 180 - h, 40, h);
                ctx.fillStyle = "#333";
                ctx.fillText(new Date(day).toLocaleDateString(undefined, {weekday:'narrow'}), i * 55 + 25, 195);
            });
        }

        if(!animate) render(1);
        else {
            const step = (ts) => {
                if(!start) start = ts;
                const p = Math.min(1, (ts - start) / 400);
                render(p);
                if(p < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }
    }

    window.onload = () => {
        setTimeout(() => document.getElementById("splash").classList.add("hidden"), 800);
        updateUI();
    };
</script>
</body>
</html>
