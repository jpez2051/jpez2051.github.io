<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { --bg: #f8f9fa; --card: #fff; --p: #4CAF50; --s: #2196F3; --a: #FF9800; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-add { background: var(--p); grid-column: span 2; }
        .btn-rep { background: var(--s); }
        .btn-del { background: #ff4444; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; gap: 5px; }
        .stat-val { font-size: 1.1em; font-weight: bold; display: block; }
        .history-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.85em; }
        .chart-legend { display: flex; justify-content: center; gap: 10px; font-size: 10px; margin-bottom: 5px; }
        .legend-item span { width: 8px; height: 8px; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="location.reload()" style="background:#ccc; color:#333; margin-bottom:10px; width:100%; padding:5px; font-size:10px;">Hard Refresh App</button>
    
    <div class="card">
        <label style="font-size:12px; font-weight:bold;">Log Date:</label>
        <input type="date" id="active-date">
        <div style="display:flex; gap:5px;">
            <input id="pushups" type="number" pattern="\d*" placeholder="Pushups">
            <input id="squats" type="number" pattern="\d*" placeholder="Squats">
            <input id="calves" type="number" pattern="\d*" placeholder="Calves">
        </div>
        <div class="btn-row">
            <button class="btn-add" onclick="addEntry()">Add Entry</button>
            <button class="btn-rep" onclick="repeatLast()">Repeat Last</button>
            <button class="btn-del" onclick="deleteLast()">Undo Last</button>
        </div>
    </div>

    <div class="card">
        <h3 id="label-date" style="margin-top:0;">Totals</h3>
        <div id="totals" class="stat-grid"></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0;">Trend</h3>
        <div class="chart-legend">
            <div class="legend-item"><span style="background:var(--p)"></span>P</div>
            <div class="legend-item"><span style="background:var(--s)"></span>S</div>
            <div class="legend-item"><span style="background:var(--a)"></span>C</div>
        </div>
        <canvas id="chart" width="400" height="200" style="width:100%; height:auto;"></canvas>
    </div>

    <div class="card">
        <h3 style="margin-top:0;">History</h3>
        <div id="history"></div>
        <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px; display:flex; gap:5px; flex-wrap:wrap;">
            <button onclick="exportData()" style="background:#eee; color:#444; font-size:10px; flex:1;">Backup</button>
            <button onclick="importData()" style="background:#eee; color:#444; font-size:10px; flex:1;">Restore</button>
            <button onclick="clearAll()" style="background:none; color:#ccc; font-size:10px; border:none; width:100%;">Clear All</button>
        </div>
    </div>
</div>

<script>
    var workouts = {};
    try {
        var saved = localStorage.getItem("workouts");
        if(saved) workouts = JSON.parse(saved);
    } catch(e) { workouts = {}; }

    function getToday() {
        var d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function fmtDate(iso) {
        if(!iso) return "";
        var p = iso.split('-');
        return p[1] + '/' + p[2] + '/' + p[0];
    }

    function getTots(day) {
        var list = workouts[day] || [];
        var res = { p: 0, s: 0, c: 0 };
        for(var i=0; i<list.length; i++) {
            res.p += (list[i].p || 0);
            res.s += (list[i].s || 0);
            res.c += (list[i].c || 0);
        }
        return res;
    }

    function update() {
        var active = document.getElementById("active-date").value;
        if(!active) return;
        var t = getTots(active);
        
        document.getElementById("label-date").innerText = "Totals: " + fmtDate(active);
        document.getElementById("totals").innerHTML = 
            '<div><span class="stat-val">'+t.p+'</span>P</div>' +
            '<div><span class="stat-val">'+t.s+'</span>S</div>' +
            '<div><span class="stat-val">'+t.c+'</span>C</div>';

        var hist = "";
        var sortedDays = Object.keys(workouts).sort().reverse().slice(0,5);
        for(var i=0; i<sortedDays.length; i++) {
            var dayT = getTots(sortedDays[i]);
            hist += '<div class="history-item"><strong>'+fmtDate(sortedDays[i])+'</strong> <span>P:'+dayT.p+' S:'+dayT.s+' C:'+dayT.c+'</span></div>';
        }
        document.getElementById("history").innerHTML = hist || "No data.";
        draw();
    }

    function draw() {
        var can = document.getElementById("chart");
        var ctx = can.getContext("2d");
        ctx.clearRect(0,0,400,200);
        var days = [];
        for(var i=6; i>=0; i--) {
            var d = new Date(); d.setDate(d.getDate()-i);
            days.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
        }
        var max = 10;
        for(var j=0; j<days.length; j++) {
            var t = getTots(days[j]);
            max = Math.max(max, t.p, t.s, t.c);
        }
        var sel = document.getElementById("active-date").value;
        for(var k=0; k<days.length; k++) {
            var day = days[k];
            var t = getTots(day);
            var x = k * 55 + 15;
            ctx.globalAlpha = (day === sel) ? 1.0 : 0.4;
            var bar = function(val, col, off) {
                var h = (val/max) * 150;
                ctx.fillStyle = col;
                ctx.fillRect(x+off, 170-h, 10, h);
            };
            bar(t.p, "#4CAF50", 0); bar(t.s, "#2196F3", 12); bar(t.c, "#FF9800", 24);
            ctx.globalAlpha = 1; ctx.fillStyle
