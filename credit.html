<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Snowball v2.2.9</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1e272e; --primary: #2ecc71; --accent: #3498db; --danger: #ff4757; --text: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 120px; color: var(--text); overflow-x: hidden; }
        .dashboard { background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(30,39,46,0) 100%); padding: 25px 12px; text-align: center; }
        .main-total { font-size: 32px; font-weight: 800; }
        .card-container { margin-bottom: 15px; perspective: 1200px; height: 260px; position: relative; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-container.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 20px; padding: 18px; background: #2f3640; box-sizing: border-box; }
        .card-back { transform: rotateY(180deg); }
        input { width: 100%; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.2); color: #fff; border: 1px solid #444; margin: 5px 0; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 15px 0; font-size: 10px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-total" id="main-debt">$0.00</div>
    <div id="main-freedom" style="color: var(--primary); font-size: 11px; font-weight: 800; margin-top: 8px;">SCANNING DATA...</div>
</div>

<div id="card-list"></div>
<button onclick="addCard()" style="background:var(--primary); margin-top: 20px;">+ ADD NEW DEBT</button>

<div class="footer">
    <span onclick="exportCSV()" style="color:var(--accent)">Backup</span>
    <span>v2.2.9</span>
    <span onclick="nuke()" style="color:var(--danger)">Reset</span>
</div>

<script>
const KEY = 'debt_v125'; 
const LEGACY_KEYS = ['debt_v125', 'v1.4.18', 'debt_data'];
let cards = [];

// 1. DATA MIGRATION ENGINE
function migrateData() {
    let recoveredData = null;
    for (let oldKey of LEGACY_KEYS) {
        let raw = localStorage.getItem(oldKey);
        if (raw) {
            recoveredData = JSON.parse(raw);
            console.log("Recovered data from:", oldKey);
            break;
        }
    }
    cards = recoveredData || [];
    localStorage.setItem(KEY, JSON.stringify(cards));
    initUI();
}

function initUI() {
    const list = document.getElementById('card-list');
    list.innerHTML = '';
    cards.sort((a, b) => (parseFloat(b.apr) || 0) - (parseFloat(a.apr) || 0)); // Avalanche Sort

    cards.forEach((c, i) => {
        list.innerHTML += `
            <div class="card-container" id="card-${i}">
                <div class="card-inner">
                    <div class="card-front" onclick="toggleFlip(this)">
                        <input type="text" value="${c.name}" onchange="updateData(${i}, 'name', this.value)" onclick="event.stopPropagation()">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div><label style="font-size:9px">Balance</label><input type="number" value="${c.bal}" onchange="updateData(${i}, 'bal', this.value)" onclick="event.stopPropagation()"></div>
                            <div><label style="font-size:9px">APR %</label><input type="number" value="${c.apr}" onchange="updateData(${i}, 'apr', this.value)" onclick="event.stopPropagation()"></div>
                        </div>
                    </div>
                    <div class="card-back" onclick="toggleFlip(this)">
                        <div style="text-align:center; padding-top:40px;">
                            <div style="font-size:24px; font-weight:900;">$${(parseFloat(c.bal) || 0).toLocaleString()}</div>
                            <div style="font-size:10px; opacity:0.6;">CURRENT BALANCE</div>
                        </div>
                    </div>
                </div>
            </div>`;
    });
    calculateTotals();
}

function updateData(i, field, val) {
    cards[i][field] = (field === 'name') ? val : parseFloat(val) || 0;
    localStorage.setItem(KEY, JSON.stringify(cards));
    calculateTotals();
    // Soft refresh of back-card labels without rebuilding the whole list
    initUI(); 
}

function calculateTotals() {
    let total = cards.reduce((sum, c) => sum + (parseFloat(c.bal) || 0), 0);
    document.getElementById('main-debt').innerText = '$' + total.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById('main-freedom').innerText = total > 0 ? "AVALANCHE MODE ACTIVE" : "DEBT FREE!";
}

function toggleFlip(el) { el.closest('.card-container').classList.toggle('flipped'); }
function addCard() { cards.push({name: "New Card", bal: 0, apr: 0}); localStorage.setItem(KEY, JSON.stringify(cards)); initUI(); }
function nuke() { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } }
function exportCSV() { 
    let csv = "Name,Balance,APR\n" + cards.map(c => `${c.name},${c.bal},${c.apr}`).join('\n');
    window.open('data:text/csv;charset=utf-8,' + encodeURI(csv));
}

// Start with migration check
migrateData();
</script>
</body>
</html>
