<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debt Avalanche Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --p: #4CAF50; 
            --s: #2196F3; 
            --danger: #ff4444;
        }

        html, body {
            overscroll-behavior-y: contain;
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .splash-logo {
            width: 80px; height: 80px; border: 4px solid var(--s); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 40px; font-weight: 900; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(33, 150, 243, 0.4);
        }
        .splash-title { color: white; font-size: 14px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        .load-bar-container { width: 150px; height: 2px; background: #333; overflow: hidden; }
        .load-bar-progress { height: 100%; width: 0%; background: var(--s); transition: width 0.8s ease; }
        .splash-hidden { opacity: 0; visibility: hidden; }

        /* PULL TO REFRESH HUD */
        #ptr-hud { position: fixed; top: 0; left: 0; width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; z-index: 1000; }
        #ptr-spinner { width: 20px; height: 20px; border: 2px solid #444; border-top-color: var(--s); border-radius: 50%; }

        /* PROGRESS BARS */
        .progress-container {
            width: 100%; height: 8px; background: #333; border-radius: 4px;
            margin: 12px 0; overflow: hidden; position: relative;
        }
        .progress-fill {
            height: 100%; background: var(--s); border-radius: 4px;
            transition: width 1s ease-in-out;
        }
        .target-debt .progress-fill {
            background: var(--p);
            box-shadow: 0 0 8px var(--p);
        }

        /* CONTAINER & CARDS */
        .container { width: 100%; max-width: 400px; padding: 15px; box-sizing: border-box; transition: filter 0.2s, opacity 0.2s; }
        .pulling .container { filter: blur(2px); opacity: 0.6; }
        
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-left: 4px solid #333; position: relative; }
        .target-debt { border-left-color: var(--p); }

        .debt-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .debt-name { font-size: 18px; font-weight: bold; }
        .debt-apr-tag { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 4px; color: #aaa; }

        .debt-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; font-size: 13px; text-align: left; }
        .stat-label { color: #888; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 2px; }

        /* INPUTS & BUTTONS */
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #333; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #252525; color: white; }
        .row-wrap { display: flex; gap: 10px; }
        .btn-add { background: var(--s); width: 100%; margin-top: 10px; font-weight: bold; padding: 14px; border: none; border-radius: 8px; color: white; cursor: pointer; }
        .btn-paid { background: #333; font-size: 12px; padding: 10px; border-radius: 6px; border: 1px solid #444; color: #fff; width: 100%; margin-top: 10px; cursor: pointer; }
        .paid-true { background: var(--p); border-color: var(--p); }

        /* UTILITY SECTION */
        .utility-row { margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-util { background: #2a2a2a; color: #ccc; font-size: 11px; flex: 1; border: 1px solid #444; padding: 10px; border-radius: 6px; }
        .btn-clear { background: none; color: #555; font-size: 9px; border: none; width: 100%; margin-top: 10px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .refreshing #ptr-spinner { animation: spin 0.6s linear infinite; border-top-color: var(--p); }

        footer { padding: 20px; font-size: 10px; color: #444; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">$</div>
    <div class="splash-title">Avalanche Pro</div>
    <div class="load-bar-container">
        <div class="load-bar-progress" id="load-bar"></div>
    </div>
</div>

<div id="ptr-hud">
    <div id="ptr-spinner"></div>
</div>

<div class="container" id="main-content">
    <div class="card">
        <span class="stat-label">System</span>
        <h3 style="margin: 5px 0 15px 0;">Add New Debt</h3>
        <input type="text" id="debt-name" placeholder="Debt Name (e.g. Visa)">
        <div class="row-wrap">
            <input type="number" id="debt-balance" placeholder="Balance ($)">
            <input type="number" id="debt-limit" placeholder="Original/Limit ($)">
        </div>
        <div class="row-wrap">
            <input type="number" id="debt-apr" placeholder="APR (%)" step="0.1">
            <input type="number" id="debt-min" placeholder="Min Pay ($)">
        </div>
        <input type="date" id="debt-due">
        <button class="btn-add" onclick="addDebt()">Add to Avalanche</button>
    </div>

    <div id="debt-list"></div>

    <div class="utility-row">
        <button onclick="downloadCSV()" class="btn-util">Export CSV</button>
        <button onclick="importData()" class="btn-util">Restore Backup</button>
        <button onclick="clearAll()" class="btn-clear">Clear All Data</button>
    </div>
</div>

<footer>Avalanche Debt Manager — v1.5.0</footer>

<script>
    let debts = [];

    window.onload = function() {
        initSplash();
        loadDebts();
        renderDebts();
    };

    function initSplash() {
        const bar = document.getElementById('load-bar');
        const splash = document.getElementById('splash-screen');
        setTimeout(() => { bar.style.width = '100%'; }, 100);
        setTimeout(() => { splash.classList.add('splash-hidden'); }, 1100);
    }

    function loadDebts() {
        const saved = localStorage.getItem('avalanche_debts');
        if (saved) debts = JSON.parse(saved);
    }

    function saveDebts() {
        localStorage.setItem('avalanche_debts', JSON.stringify(debts));
        renderDebts();
    }

    function addDebt() {
        const name = document.getElementById('debt-name').value;
        const balance = parseFloat(document.getElementById('debt-balance').value);
        const limit = parseFloat(document.getElementById('debt-limit').value) || balance;
        const apr = parseFloat(document.getElementById('debt-apr').value);
        const min = parseFloat(document.getElementById('debt-min').value);
        const due = document.getElementById('debt-due').value;

        if (!name || isNaN(balance)) { alert("Balance is required"); return; }

        debts.push({
            id: Date.now(),
            name, balance, limit, apr, min, due,
            paidThisMonth: false
        });

        document.querySelectorAll('input').forEach(i => i.value = '');
        saveDebts();
    }

    function togglePaid(id) {
        const debt = debts.find(d => d.id === id);
        if (debt) debt.paidThisMonth = !debt.paidThisMonth;
        saveDebts();
    }

    function renderDebts() {
        const list = document.getElementById('debt-list');
        list.innerHTML = '';

        debts.sort((a, b) => b.apr - a.apr);

        debts.forEach((debt, index) => {
            const isTarget = index === 0 && debt.balance > 0;
            const percentPaid = Math.max(0, Math.min(100, 100 - ((debt.balance / debt.limit) * 100)));

            const card = document.createElement('div');
            card.className = `card ${isTarget ? 'target-debt' : ''}`;
            card.innerHTML = `
                <div class="debt-header">
                    <div>
                        <span class="stat-label">${isTarget ? '🔥 AVALANCHE TARGET' : 'ACTIVE DEBT'}</span>
                        <div class="debt-name">${debt.name}</div>
                    </div>
                    <div class="debt-apr-tag">${debt.apr}% APR</div>
                </div>

                <div class="progress-container">
                    <div class="progress-fill" style="width: ${percentPaid}%"></div>
                </div>

                <div class="debt-stats">
                    <div>
                        <span class="stat-label">Balance</span>
                        $${debt.balance.toLocaleString()}
                    </div>
                    <div>
                        <span class="stat-label">Paid Progress</span>
                        ${percentPaid.toFixed(1)}%
                    </div>
                    <div>
                        <span class="stat-label">Min Pay</span>
                        $${debt.min}
                    </div>
                    <div>
                        <span class="stat-label">Due Date</span>
                        ${debt.due || 'N/A'}
                    </div>
                </div>

                <button class="btn-paid ${debt.paidThisMonth ? 'paid-true' : ''}" onclick="togglePaid(${debt.id})">
                    ${debt.paidThisMonth ? '✓ PAID THIS MONTH' : 'MARK AS PAID'}
                </button>
            `;
            list.appendChild(card);
        });
    }

    let tStart = 0;
    document.addEventListener('touchstart', e => tStart = e.touches[0].pageY, {passive: true});
    document.addEventListener('touchend', e => {
        if (window.scrollY === 0 && e.changedTouches[0].pageY - tStart > 180) {
            document.body.classList.add('refreshing');
            document.getElementById('ptr-hud').style.opacity = 1;
            setTimeout(() => location.reload(), 600);
        }
    }, {passive: true});

    function downloadCSV() {
        let csv = "Name,Balance,Limit,APR,Min,Due\n";
        debts.forEach(d => csv += `${d.name},${d.balance},${d.limit},${d.apr},${d.min},${d.due}\n`);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = 'avalanche_data.csv';
        a.click();
    }

    function importData() {
        let s = prompt("Paste your JSON backup data here:");
        if (s) { try { debts = JSON.parse(s); saveDebts(); } catch(e) { alert("Invalid data"); } }
    }

    function clearAll() {
        if (confirm("Delete everything?")) { debts = []; saveDebts(); }
    }
</script>
</body>
</html>
