<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Debt Tracker v3.0.4</title>
    <style>
        :root {
            --bg: #1e272e; --primary: #2ecc71; --accent: #3498db; --danger: #ff4757;
            --text: #f4f7f6; --card-bg: #2f3640; --muted: #a4b0be;
            --input-bg: rgba(0,0,0,0.2); --border: rgba(255,255,255,0.08);
            --footer-bg: rgba(0,0,0,0.95); --chart-grid: rgba(255,255,255,0.05);
        }
        body.light-theme {
            --bg: #eef1f5; --text: #1e272e; --card-bg: #ffffff; --muted: #636e72;
            --input-bg: rgba(0,0,0,0.04); --border: rgba(0,0,0,0.08);
            --footer-bg: rgba(255,255,255,0.95); --chart-grid: rgba(0,0,0,0.05);
        }
        html, body { background: var(--bg); overscroll-behavior-y: contain; -webkit-overflow-scrolling: touch; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 10px; padding-bottom: 140px; color: var(--text); overflow-x: hidden; transition: background 0.3s; }
        * { box-sizing: border-box; }

        /* Pull to refresh */
        #pull-indicator { position: fixed; top: 0; left: 0; right: 0; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--primary); opacity: 0; transform: translateY(0); transition: opacity 0.2s; z-index: 50; pointer-events: none; }

        /* Reminder banner */
        #reminder-banner { background: rgba(255,71,87,0.15); border: 1px solid var(--danger); border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 700; color: var(--danger); }
        #reminder-banner .dismiss { cursor: pointer; font-size: 16px; }

        /* Dashboard */
        .dashboard { background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(30,39,46,0) 100%); padding: 25px 12px 15px 12px; text-align: center; }
        body.light-theme .dashboard { background: linear-gradient(180deg, rgba(0,0,0,0.03) 0%, rgba(255,255,255,0) 100%); }
        .main-total-container { display: flex; align-items: baseline; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .main-total { font-size: 32px; font-weight: 800; }
        .delta-badge { font-size: 14px; font-weight: 800; padding: 2px 8px; border-radius: 6px; background: rgba(0,0,0,0.2); }
        body.light-theme .delta-badge { background: rgba(0,0,0,0.06); }
        .delta-down { color: var(--primary); }
        .delta-up { color: var(--danger); }
        .main-freedom { background: rgba(46,204,113,0.1); color: var(--primary); font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-top: 8px; text-transform: uppercase; }

        /* Toggle controls */
        .toggle-row { display: flex; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .seg-toggle { display: inline-flex; background: var(--input-bg); border-radius: 10px; padding: 3px; gap: 2px; }
        .seg-btn { background: none; border: none; color: var(--muted); font-size: 10px; font-weight: 800; padding: 6px 14px; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .seg-btn.active { background: var(--primary); color: #fff; }
        .icon-btn { background: var(--input-bg); border: none; color: var(--text); width: 34px; height: 34px; border-radius: 10px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

        /* Charts */
        .chart-section { margin-top: 15px; }
        .chart-title { font-size: 8px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; text-align: left; }
        canvas.chart-canvas { width: 100%; border-radius: 10px; background: var(--input-bg); }
        .stack-chart { display: flex; height: 12px; border-radius: 6px; overflow: hidden; background: rgba(255,255,255,0.05); margin: 15px 0; width: 100%; }
        .stack-segment { height: 100%; transition: width 0.5s ease; }
        .debt-free { margin: 15px 0; font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: 2px; }

        /* Stats */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 12px; }
        .stat-val { font-size: 15px; font-weight: 800; display: block; }
        .stat-lab { font-size: 7px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;}

        /* Milestones */
        .milestones { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .milestone { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .milestone-badge { font-size: 20px; filter: grayscale(1); opacity: 0.3; transition: all 0.3s; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--input-bg); }
        .milestone.unlocked .milestone-badge { filter: none; opacity: 1; background: rgba(46,204,113,0.15); }
        .milestone-lab { font-size: 7px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
        .milestone.unlocked .milestone-lab { color: var(--primary); }

        /* What-if button */
        .whatif-btn { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 11px; cursor: pointer; margin-top: 12px; text-transform: uppercase; }

        /* Card flip */
        .card-container { margin-bottom: 15px; border-radius: 20px; padding: 0; background: transparent; position: relative; }
        .card-flipper { position: relative; width: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-container.flipped .card-flipper { transform: rotateY(180deg); }
        .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 20px; }
        .card-front { background: var(--card-bg); border: 1px solid var(--border); padding: 18px 18px 18px 12px; display: flex; flex-direction: column; gap: 12px; position: relative; }
        .card-back { position: absolute; top: 0; left: 0; right: 0; background: var(--card-bg); border: 1px solid var(--border); padding: 18px; transform: rotateY(180deg); display: flex; flex-direction: column; gap: 10px; }
        .card-target { border: 1px solid var(--accent) !important; box-shadow: 0 0 20px rgba(52,152,219,0.15); }
        .target-tag { background: var(--accent); color: #fff; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
        .completed-tag { font-size: 8px; font-weight: 900; color: var(--primary); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .card-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .progress-ring { position: relative; width: 54px; height: 54px; flex-shrink: 0; }
        .progress-ring svg { transform: rotate(-90deg); }
        .ring-circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .ring-bg { stroke: rgba(255,255,255,0.05); }
        .ring-bar { stroke-dasharray: 151; transition: stroke-dashoffset 0.6s ease; }
        .prog-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
        .paid-btn { background: #353b48; color: var(--muted); font-size: 9px; padding: 6px 12px; border-radius: 8px; font-weight: 800; border: none; text-transform: uppercase; cursor: pointer; }
        .paid-btn.active { background: var(--primary); color: #fff; }
        .name-input { font-weight: 800; border: none; background: none; font-size: 16px; width: 100%; color: var(--text); padding: 0; outline: none; }
        .due-label { font-size: 9px; font-weight: 800; margin-top: 4px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .input-grid label { font-size: 8px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .input-grid input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--input-bg); color: var(--text); outline: none; }
        .input-grid input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        body.light-theme .input-grid input[type="date"]::-webkit-calendar-picker-indicator { filter: none; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; }
        .reset-link, .delete-link, .flip-link { font-size: 9px; font-weight: 700; cursor: pointer; opacity: 0.4; }
        .reset-link, .delete-link { color: var(--danger); }
        .flip-link { color: var(--accent); }
        .reset-link:hover, .delete-link:hover, .flip-link:hover { opacity: 1; }
        .tap-hint { text-align: center; font-size: 7px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

        /* Card back content */
        .back-title { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .back-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--border); }
        .back-row .lab { color: var(--muted); font-weight: 700; }
        .back-row .val { font-weight: 800; }
        .history-item { display: flex; justify-content: space-between; font-size: 10px; padding: 3px 0; color: var(--muted); }
        .history-item .amt { color: var(--primary); font-weight: 700; }

        /* Buttons */
        .toggle-completed { background: var(--input-bg); color: var(--muted); font-size: 9px; padding: 8px 16px; border-radius: 8px; font-weight: 800; border: none; text-transform: uppercase; cursor: pointer; display: block; margin: 10px auto; width: 100%; }
        .add-btn { background: var(--primary); color: #fff; padding: 16px; border-radius: 14px; width: 100%; margin-top: 10px; font-weight: 800; border: none; cursor: pointer; font-size: 14px; }
        .secondary-btns { display: flex; gap: 6px; margin-top: 8px; }
        .sec-btn { flex: 1; background: var(--input-bg); color: var(--accent); border: none; padding: 10px; border-radius: 10px; font-size: 9px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .version-tag { text-align: center; font-size: 8px; color: #57606f; margin-top: 30px; letter-spacing: 2px; text-transform: uppercase; }

        /* Footer */
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--footer-bg); padding: 18px 0; font-size: 11px; display: flex; justify-content: space-around; z-index: 100; border-top: 1px solid var(--border); backdrop-filter: blur(10px); }
        .footer span { font-weight: 800; cursor: pointer; }
        .footer-reset { color: var(--primary); }
        .footer-export { color: var(--accent); }
        .footer-wipe { color: var(--danger); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card-bg); border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; border: 1px solid var(--border); }
        .modal h3 { margin: 0 0 16px; font-size: 16px; font-weight: 800; color: var(--text); }
        .modal label { font-size: 8px; font-weight: 800; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .modal input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; background: var(--input-bg); color: var(--text); outline: none; margin-bottom: 16px; }
        .modal-result { background: var(--input-bg); border-radius: 12px; padding: 14px; margin-bottom: 14px; }
        .modal-result-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; }
        .modal-result-row .lab { color: var(--muted); font-weight: 700; }
        .modal-result-row .val { font-weight: 800; }
        .modal-result-row.highlight .val { color: var(--primary); }
        .modal-close { background: var(--input-bg); color: var(--text); border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

<div id="pull-indicator">↓ Pull to refresh</div>
<div id="app-root"></div>
<div class="modal-overlay" id="whatif-modal" onclick="if(event.target===this)closeWhatIf()">
    <div class="modal">
        <h3>🎯 What If Calculator</h3>
        <label>Extra Monthly Payment ($)</label>
        <input type="number" id="whatif-extra" value="100" min="0" step="10" oninput="calculateWhatIf()">
        <div class="modal-result" id="whatif-result"></div>
        <button class="modal-close" onclick="closeWhatIf()">Close</button>
    </div>
</div>
<div class="modal-overlay" id="pay-modal" onclick="if(event.target===this)closePayModal()">
    <div class="modal">
        <h3>💳 Make a Payment</h3>
        <label id="pay-card-name" style="font-size:12px; color:var(--text); margin-bottom:12px; text-transform:none; font-weight:800;">Debt Name</label>
        <label>Payment Amount ($)</label>
        <input type="number" id="pay-amount" value="0" min="0" step="0.01" oninput="updatePayPreview()">
        <div class="modal-result" id="pay-preview"></div>
        <div style="display:flex; gap:8px;">
            <button class="modal-close" style="flex:1;" onclick="closePayModal()">Cancel</button>
            <button class="modal-close" style="flex:1; background:var(--primary); color:#fff;" onclick="confirmPay()">Confirm</button>
        </div>
    </div>
</div>
<input type="file" id="json-import" accept=".json" style="display:none">

<script>
const KEY = 'debt_v126';
const BASE_KEY = 'debt_global_baseline';
const HISTORY_KEY = 'debt_history_v3';
const THEME_KEY = 'debt_theme';
const STRATEGY_KEY = 'debt_strategy';
const COLORS = ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#1abc9c', '#e74c3c'];
let cards = [];
let baseline = 0;
let history = [];
let hideCompleted = false;
let flippedCards = new Set();
let theme = 'dark';
let strategy = 'snowball';
let idCounter = 0;
let reminderDismissed = false;
let payCardId = null;

function generateId() { return 'card_' + Date.now() + '_' + (idCounter++); }
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
function formatCurrency(val, opts) { const dec = (opts && opts.decimals !== undefined) ? opts.decimals : 2; return '$' + (val || 0).toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec }); }
function getMonthKey() { return (new Date().getMonth() + 1) + '-' + new Date().getFullYear(); }
function daysUntilDue(dueDate) { if (!dueDate) return null; const t = new Date(); t.setHours(0,0,0,0); const d = new Date(dueDate); d.setHours(0,0,0,0); return Math.round((d - t) / 86400000); }
function getCssVar(name) { return getComputedStyle(document.body).getPropertyValue(name).trim(); }

function loadCards() {
    try {
        const raw = localStorage.getItem(KEY);
        const loaded = raw ? JSON.parse(raw) : [];
        return loaded.map(c => ({ ...c, id: c.id || generateId(), highestBal: c.highestBal !== undefined ? c.highestBal : (parseFloat(c.bal) || 0), history: c.history || [] }));
    } catch (e) { return []; }
}
function loadBaseline(fallbackTotal) { if (localStorage.getItem(BASE_KEY) === null) localStorage.setItem(BASE_KEY, String(fallbackTotal)); return parseFloat(localStorage.getItem(BASE_KEY)) || fallbackTotal; }
function loadHistory() { try { const raw = localStorage.getItem(HISTORY_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; } }
function saveCards() { localStorage.setItem(KEY, JSON.stringify(cards)); }
function saveHistory() { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

function recordGlobalSnapshot() {
    const total = cards.reduce((s, c) => s + (parseFloat(c.bal) || 0), 0);
    const today = new Date().toISOString().split('T')[0];
    history = history.filter(h => !h.date.startsWith(today));
    history.push({ date: today, total: total });
    if (history.length > 365) history = history.slice(-365);
    saveHistory();
}

function recordPayment(cardId, amount, type) {
    const card = cards.find(c => c.id === cardId);
    if (!card) return;
    const prevBal = parseFloat(card.bal) || 0;
    const newBal = parseFloat(card.bal) || 0;
    card.history = card.history || [];
    card.history.push({ date: new Date().toISOString().split('T')[0], amount: Math.round(amount * 100) / 100, type, prevBal, newBal });
    if (card.history.length > 50) card.history = card.history.slice(-50);
}

function sortCards(arr) {
    const strat = strategy;
    return arr.slice().sort((a, b) => {
        const balA = parseFloat(a.bal) || 0, balB = parseFloat(b.bal) || 0;
        if (balA > 0 && balB <= 0) return -1;
        if (balA <= 0 && balB > 0) return 1;
        if (balA === 0 && balB === 0) return 0;
        if (strat === 'avalanche') { const aprA = parseFloat(a.apr) || 0, aprB = parseFloat(b.apr) || 0; if (aprA !== aprB) return aprB - aprA; }
        return balA - balB;
    });
}

function calculateStats(cards) {
    let currentTotal = 0, totalMin = 0, aprSum = 0, count = 0, monthlyInterest = 0;
    cards.forEach(c => {
        const b = parseFloat(c.bal) || 0, r = parseFloat(c.apr) || 0;
        currentTotal += b;
        if (b > 0) { totalMin += parseFloat(c.min) || 0; aprSum += r; monthlyInterest += (b * (r / 100) / 12); count++; }
    });
    return { currentTotal, totalMin, monthlyInterest, avgApr: count > 0 ? Math.round(aprSum / count) : 0, delta: currentTotal - baseline };
}

function calculateAmortization(bal, apr, min) {
    const mir = apr / 100 / 12;
    const monthlyInterest = bal * mir;
    if (min <= 0) return { monthlyInterest, monthlyPrincipal: 0, monthsToPayoff: -1, totalInterest: 0, interestPct: 100 };
    const monthlyPrincipal = Math.max(0, min - monthlyInterest);
    if (monthlyPrincipal <= 0) return { monthlyInterest, monthlyPrincipal: 0, monthsToPayoff: -1, totalInterest: -1, interestPct: 100 };
    let balance = bal, totalInterest = 0, months = 0;
    while (balance > 0 && months < 600) {
        const interest = balance * mir;
        const principal = Math.min(min - interest, balance);
        balance -= principal; totalInterest += interest; months++;
    }
    return { monthlyInterest, monthlyPrincipal, monthsToPayoff: months, totalInterest, interestPct: Math.round((monthlyInterest / min) * 100) };
}

function projectTimelineAdvanced(sortedCards, extraMonthly) {
    let temp = sortedCards.filter(c => (parseFloat(c.bal) || 0) > 0)
        .map(c => ({ bal: parseFloat(c.bal) || 0, apr: parseFloat(c.apr) || 0, min: parseFloat(c.min) || 0 }))
        .sort((a, b) => strategy === 'avalanche' ? b.apr - a.apr : a.bal - b.bal);
    if (temp.length === 0) return { months: 0, totalInterest: 0 };
    const totalMin = temp.reduce((s, c) => s + c.min, 0);
    if (totalMin <= 0) return { months: 0, totalInterest: 0 };
    let months = 0, freedPool = 0, totalInterest = 0;
    let prevTotal = temp.reduce((s, c) => s + c.bal, 0), stagnantCount = 0;
    while (months < 600) {
        months++;
        let snowballExtra = (extraMonthly || 0) + freedPool;
        freedPool = 0;
        for (let i = 0; i < temp.length; i++) {
            const c = temp[i];
            const interest = c.bal * ((c.apr / 100) / 12);
            totalInterest += interest; c.bal += interest;
            const payment = c.min + snowballExtra;
            snowballExtra = 0;
            if (c.bal <= payment) { snowballExtra = payment - c.bal; freedPool += c.min; temp.splice(i, 1); i--; }
            else { c.bal -= payment; }
        }
        if (temp.length === 0) break;
        const curTotal = temp.reduce((s, c) => s + c.bal, 0);
        if (curTotal >= prevTotal) { stagnantCount++; if (stagnantCount >= 3) return { months: -1, totalInterest: -1 }; }
        else stagnantCount = 0;
        prevTotal = curTotal;
    }
    return { months: months >= 600 ? -1 : months, totalInterest };
}

function exportCSV() {
    const headers = ['Name', 'Balance', 'APR %', 'Min Payment', 'Due Date', 'Paid This Month'];
    const rows = cards.map(c => ['"' + (c.name || '').replace(/"/g, '""') + '"', parseFloat(c.bal) || 0, parseFloat(c.apr) || 0, parseFloat(c.min) || 0, c.due || '', c.lastPaidMonth || ''].join(','));
    downloadFile([headers.join(','), ...rows].join('\n'), 'debt-export.csv', 'text/csv');
}
function exportJSON() {
    const data = { cards, baseline, history,     exportDate: new Date().toISOString(), version: '3.0.4' };
    downloadFile(JSON.stringify(data, null, 2), 'debt-backup.json', 'application/json');
}
function downloadFile(content, filename, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}
function importJSON(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.cards) throw new Error('Invalid file');
            cards = data.cards.map(c => ({ ...c, id: c.id || generateId(), history: c.history || [] }));
            baseline = data.baseline || cards.reduce((s, c) => s + (parseFloat(c.bal) || 0), 0);
            history = data.history || [];
            saveCards(); saveHistory(); localStorage.setItem(BASE_KEY, String(baseline));
            recordGlobalSnapshot(); renderUI(); alert('Data restored successfully!');
        } catch (err) { alert('Invalid backup file: ' + err.message); }
    };
    reader.readAsText(file);
}

function shareCard() {
    const stats = calculateStats(cards);
    const sorted = sortCards(cards);
    const proj = projectTimelineAdvanced(sorted, 0);
    const progress = baseline > 0 ? Math.max(0, Math.min(100, Math.round((1 - stats.currentTotal / baseline) * 100))) : 0;
    const canvas = document.createElement('canvas');
    canvas.width = 600; canvas.height = 400;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 400);
    grad.addColorStop(0, '#1e272e'); grad.addColorStop(1, '#2f3640');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#a4b0be'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('DEBT TRACKER', 300, 50);
    ctx.fillStyle = '#f4f7f6'; ctx.font = 'bold 44px sans-serif';
    ctx.fillText(formatCurrency(stats.currentTotal), 300, 110);
    ctx.fillStyle = '#2ecc71'; ctx.font = 'bold 22px sans-serif';
    ctx.fillText(progress + '% Debt Free', 300, 155);
    if (proj.months > 0) {
        const d = new Date(); d.setMonth(d.getMonth() + proj.months);
        ctx.fillStyle = '#3498db'; ctx.font = 'bold 18px sans-serif';
        ctx.fillText('Freedom: ' + d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }), 300, 195);
    }
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(50, 230, 500, 24);
    ctx.fillStyle = '#2ecc71'; ctx.fillRect(50, 230, 500 * (progress / 100), 24);
    ctx.fillStyle = '#57606f'; ctx.font = '12px sans-serif';
    ctx.fillText('Tracked with Debt Tracker v3.0.0', 300, 290);
    ctx.fillText(new Date().toLocaleDateString(), 300, 310);
    ctx.fillStyle = '#a4b0be'; ctx.font = 'bold 13px sans-serif';
    ctx.fillText('Total Min: ' + formatCurrency(stats.totalMin, { decimals: 0 }) + '  |  Interest/mo: ' + formatCurrency(stats.monthlyInterest, { decimals: 0 }), 300, 345);
    const a = document.createElement('a'); a.download = 'debt-progress.png'; a.href = canvas.toDataURL(); a.click();
}

function triggerConfetti() {
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    const particles = [];
    for (let i = 0; i < 150; i++) {
        particles.push({ x: Math.random() * canvas.width, y: -20 - Math.random() * 200, vx: (Math.random() - 0.5) * 6, vy: Math.random() * 3 + 2, size: Math.random() * 8 + 4, color: COLORS[Math.floor(Math.random() * COLORS.length)], rotation: Math.random() * 360, vr: (Math.random() - 0.5) * 12 });
    }
    let frame = 0;
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rotation += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color; ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
        });
        frame++;
        if (frame < 200) requestAnimationFrame(animate);
        else canvas.remove();
    }
    animate();
}

function drawLineChart(canvas, dataPoints) {
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.offsetWidth, h = canvas.offsetHeight || 120;
    canvas.width = w * dpr; canvas.height = h * dpr;
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
    const textColor = getCssVar('--muted'), gridColor = getCssVar('--chart-grid');
    if (dataPoints.length < 2) {
        ctx.fillStyle = textColor; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('Make payments to see your progress', w / 2, h / 2);
        return;
    }
    const pad = 28;
    const cw = w - pad * 2, ch = h - pad * 2;
    const values = dataPoints.map(d => d.total);
    const minVal = Math.min(...values, 0), maxVal = Math.max(...values, 1), range = maxVal - minVal || 1;
    ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) { const y = pad + (ch / 4) * i; ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w - pad, y); ctx.stroke(); }
    ctx.fillStyle = textColor; ctx.font = '8px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('$' + Math.round(maxVal), pad - 3, pad + 3); ctx.fillText('$' + Math.round(minVal), pad - 3, h - pad + 3);
    ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2; ctx.beginPath();
    dataPoints.forEach((d, i) => { const x = pad + (cw / (dataPoints.length - 1 || 1)) * i; const y = pad + ch - ((d.total - minVal) / range) * ch; if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });
    ctx.stroke();
    ctx.lineTo(pad + cw, pad + ch); ctx.lineTo(pad, pad + ch); ctx.closePath();
    ctx.fillStyle = 'rgba(46,204,113,0.1)'; ctx.fill();
    ctx.fillStyle = '#2ecc71';
    dataPoints.forEach((d, i) => { const x = pad + (cw / (dataPoints.length - 1 || 1)) * i; const y = pad + ch - ((d.total - minVal) / range) * ch; ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill(); });
}

function drawDonutChart(canvas, segments, centerText) {
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const size = canvas.offsetWidth || 140;
    canvas.width = size * dpr; canvas.height = size * dpr;
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
    const cx = size / 2, cy = size / 2, r = size / 2 - 8, ir = r * 0.62;
    if (segments.length === 0 || centerText === 0) {
        ctx.fillStyle = getCssVar('--chart-grid'); ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.arc(cx, cy, ir, 0, Math.PI * 2, true); ctx.fill();
        ctx.fillStyle = getCssVar('--muted'); ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('No Debt', cx, cy);
        return;
    }
    let startAngle = -Math.PI / 2;
    segments.forEach(seg => {
        const angle = (seg.value / centerText) * Math.PI * 2;
        ctx.beginPath(); ctx.arc(cx, cy, r, startAngle, startAngle + angle); ctx.arc(cx, cy, ir, startAngle + angle, startAngle, true); ctx.closePath();
        ctx.fillStyle = seg.color; ctx.fill(); startAngle += angle;
    });
    ctx.fillStyle = getCssVar('--text'); ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(formatCurrency(centerText, { decimals: 0 }), cx, cy);
}

function drawMiniChart(canvas, cardHistory, color) {
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.offsetWidth || 200, h = 50;
    canvas.width = w * dpr; canvas.height = h * dpr;
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
    if (!cardHistory || cardHistory.length < 2) {
        ctx.fillStyle = getCssVar('--muted'); ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('No history yet', w / 2, h / 2); return;
    }
    const points = [{ total: cardHistory[0].prevBal }, ...cardHistory.map(h => ({ total: h.newBal }))];
    const values = points.map(p => p.total);
    const minVal = Math.min(...values, 0), maxVal = Math.max(...values, 1), range = maxVal - minVal || 1;
    const pad = 4;
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
    points.forEach((p, i) => { const x = pad + ((w - pad * 2) / (points.length - 1 || 1)) * i; const y = pad + (h - pad * 2) - ((p.total - minVal) / range) * (h - pad * 2); if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });
    ctx.stroke();
    ctx.lineTo(w - pad, h - pad); ctx.lineTo(pad, h - pad); ctx.closePath();
    ctx.fillStyle = color + '20'; ctx.fill();
}

function loadData() {
    cards = loadCards();
    const total = cards.reduce((s, c) => s + (parseFloat(c.bal) || 0), 0);
    baseline = loadBaseline(total);
    history = loadHistory();
    theme = localStorage.getItem(THEME_KEY) || 'dark';
    strategy = localStorage.getItem(STRATEGY_KEY) || 'snowball';
    if (history.length === 0) recordGlobalSnapshot();
    applyTheme();
    renderUI();
}

function applyTheme() {
    document.body.className = theme === 'light' ? 'light-theme' : '';
}

}

function update(id, field, val) {
    const card = cards.find(c => c.id === id);
    if (!card) return;
    const oldBal = parseFloat(card.bal) || 0;
    card[field] = (field === 'name' || field === 'due') ? val : (parseFloat(val) || 0);
    if (field === 'bal') {
        const newBal = card.bal;
        if (newBal > (parseFloat(card.highestBal) || 0)) card.highestBal = newBal;
        if (Math.abs(newBal - oldBal) > 0.01) {
            recordPayment(id, Math.abs(newBal - oldBal), 'manual');
            recordGlobalSnapshot();
            // Confetti if balance hit 0
            if (newBal === 0 && oldBal > 0) triggerConfetti();
        }
    }
    saveCards(); renderUI();
}

function markPaid(id) {
    const key = getMonthKey();
    const card = cards.find(c => c.id === id);
    if (!card) return;
    card.lastPaidMonth = (card.lastPaidMonth === key) ? '' : key;
    saveCards(); renderUI();
}

function payMin(id) {
    const card = cards.find(c => c.id === id);
    if (!card) return;
    const bal = parseFloat(card.bal) || 0, min = parseFloat(card.min) || 0;
    if (min <= 0) return;
    const newBal = Math.max(0, Math.round((bal - min) * 100) / 100);
    card.bal = newBal;
    recordPayment(id, min, 'min');
    recordGlobalSnapshot();
    if (newBal === 0 && bal > 0) triggerConfetti();
    saveCards(); renderUI();
}

function resetHighest(id) { const card = cards.find(c => c.id === id); if (card) { card.highestBal = parseFloat(card.bal) || 0; saveCards(); renderUI(); } }
function deleteCard(id) { if (!confirm('Delete this debt? This cannot be undone.')) return; cards = cards.filter(c => c.id !== id); flippedCards.delete(id); saveCards(); renderUI(); }
function addCard() { cards.push({ id: generateId(), name: 'New Debt', bal: 0, apr: 0, min: 0, highestBal: 0, due: '', lastPaidMonth: '', history: [], limit: 0 }); saveCards(); renderUI(); }
function toggleCompleted() { hideCompleted = !hideCompleted; renderUI(); }
function flipCard(id) { if (flippedCards.has(id)) flippedCards.delete(id); else flippedCards.add(id); renderUI(); }
function dismissReminder() { reminderDismissed = true; renderUI(); }

function setStrategy(s) { strategy = s; localStorage.setItem(STRATEGY_KEY, s); renderUI(); }
function toggleTheme() { theme = theme === 'dark' ? 'light' : 'dark'; localStorage.setItem(THEME_KEY, theme); applyTheme(); renderUI(); }

function resetBaseline() {
    if (!confirm('Reset snowball baseline to current total?')) return;
    const total = cards.reduce((s, c) => s + (parseFloat(c.bal) || 0), 0);
    localStorage.setItem(BASE_KEY, String(total)); baseline = total; recordGlobalSnapshot();
    alert('Snowball baseline set: $' + total.toLocaleString()); renderUI();
}

function wipeAll() {
    if (!confirm('Wipe all debt data? This cannot be undone.')) return;
    localStorage.removeItem(KEY); localStorage.removeItem(BASE_KEY); localStorage.removeItem(HISTORY_KEY);
    cards = []; baseline = 0; history = []; flippedCards.clear(); renderUI();
}

function openPayModal(cardId) {
    payCardId = cardId;
    const card = cards.find(c => c.id === cardId);
    if (!card) return;
    const min = parseFloat(card.min) || 0;
    document.getElementById('pay-card-name').textContent = card.name || 'Debt';
    document.getElementById('pay-amount').value = min;
    document.getElementById('pay-modal').classList.add('show');
    updatePayPreview();
}
function closePayModal() { document.getElementById('pay-modal').classList.remove('show'); payCardId = null; }
function updatePayPreview() {
    if (!payCardId) return;
    const card = cards.find(c => c.id === payCardId);
    if (!card) return;
    const amount = parseFloat(document.getElementById('pay-amount').value) || 0;
    const bal = parseFloat(card.bal) || 0;
    const newBal = Math.max(0, bal - amount);
    document.getElementById('pay-preview').innerHTML = '<div class="modal-result-row"><span class="lab">Current Balance</span><span class="val">' + formatCurrency(bal) + '</span></div><div class="modal-result-row"><span class="lab">After Payment</span><span class="val" style="color:var(--primary)">' + formatCurrency(newBal) + '</span></div>';
}
function advanceDueDate(card) {
    if (!card.due) return;
    const parts = card.due.split('-');
    if (parts.length !== 3) return;
    const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    const day = d.getDate();
    d.setMonth(d.getMonth() + 1);
    if (d.getDate() !== day) d.setDate(0);
    card.due = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function confirmPay() {
    const card = cards.find(c => c.id === payCardId);
    if (!card) return;
    const amount = parseFloat(document.getElementById('pay-amount').value) || 0;
    if (amount <= 0) return;
    const bal = parseFloat(card.bal) || 0;
    const actualPayment = Math.min(amount, bal);
    card.bal = Math.max(0, Math.round((bal - amount) * 100) / 100);
    recordPayment(payCardId, actualPayment, 'payment');
    recordGlobalSnapshot();
    card.lastPaidMonth = getMonthKey();
    advanceDueDate(card);
    if (card.bal === 0 && bal > 0) triggerConfetti();
    saveCards(); closePayModal(); renderUI();
}
function openWhatIf() { document.getElementById('whatif-modal').classList.add('show'); calculateWhatIf(); }
function closeWhatIf() { document.getElementById('whatif-modal').classList.remove('show'); }
function calculateWhatIf() {
    const extra = parseFloat(document.getElementById('whatif-extra').value) || 0;
    const sorted = sortCards(cards);
    const current = projectTimelineAdvanced(sorted, 0);
    const withExtra = projectTimelineAdvanced(sorted, extra);
    const el = document.getElementById('whatif-result');
    let html = '';
    function fmt(months) {
        if (months > 0) { const d = new Date(); d.setMonth(d.getMonth() + months); return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }) + ' (' + months + ' mo)'; }
        if (months === -1) return '\u26A0 Never (interest > payments)';
        return 'Add payments';
    }
    html += '<div class="modal-result-row"><span class="lab">Current Freedom</span><span class="val">' + fmt(current.months) + '</span></div>';
    html += '<div class="modal-result-row"><span class="lab">Current Total Interest</span><span class="val">' + (current.totalInterest >= 0 ? formatCurrency(current.totalInterest) : 'N/A') + '</span></div>';
    html += '<div class="modal-result-row" style="border-top:1px solid var(--border); margin-top:8px; padding-top:8px;"><span class="lab">With +$' + extra + '/mo</span><span class="val">' + fmt(withExtra.months) + '</span></div>';
    html += '<div class="modal-result-row"><span class="lab">New Total Interest</span><span class="val">' + (withExtra.totalInterest >= 0 ? formatCurrency(withExtra.totalInterest) : 'N/A') + '</span></div>';
    if (current.months > 0 && withExtra.months > 0) {
        const monthsSaved = current.months - withExtra.months;
        const interestSaved = (current.totalInterest >= 0 && withExtra.totalInterest >= 0) ? current.totalInterest - withExtra.totalInterest : 0;
        html += '<div class="modal-result-row highlight" style="border-top:1px solid var(--border); margin-top:8px; padding-top:8px;"><span class="lab">Months Saved</span><span class="val">' + monthsSaved + ' months</span></div>';
        if (interestSaved > 0) html += '<div class="modal-result-row highlight"><span class="lab">Interest Saved</span><span class="val">' + formatCurrency(interestSaved) + '</span></div>';
    }
    el.innerHTML = html;
}

// Pull to refresh
let touchStartY = 0, pullDistance = 0, isPulling = false;
const PULL_THRESHOLD = 80;
document.addEventListener('touchstart', (e) => { if (window.scrollY === 0) { touchStartY = e.touches[0].clientY; isPulling = true; } }, { passive: true });
document.addEventListener('touchmove', (e) => {
    if (!isPulling) return;
    pullDistance = e.touches[0].clientY - touchStartY;
    if (pullDistance > 0) {
        const ind = document.getElementById('pull-indicator');
        ind.style.opacity = Math.min(pullDistance / PULL_THRESHOLD, 1);
        ind.style.transform = 'translateY(' + Math.min(pullDistance, 100) + 'px)';
        ind.innerHTML = pullDistance > PULL_THRESHOLD ? '\u2705 Release to refresh' : '\u2193 Pull to refresh';
    }
}, { passive: true });
document.addEventListener('touchend', () => {
    if (!isPulling) return;
    const ind = document.getElementById('pull-indicator');
    if (pullDistance > PULL_THRESHOLD) {
        ind.innerHTML = '\uD83D\uDD04 Refreshing...';
        setTimeout(() => { loadData(); ind.style.opacity = '0'; ind.style.transform = 'translateY(0)'; }, 500);
    } else { ind.style.opacity = '0'; ind.style.transform = 'translateY(0)'; }
    isPulling = false; pullDistance = 0;
});

// JSON import handler
document.getElementById('json-import').addEventListener('change', (e) => { if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ''; });

loadData();
</script>
