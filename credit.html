<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Debt Destroyer v1.3.6</title>
    <script id="chart-js" src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #2ecc71; --accent: #3498db; --danger: #ff4757; --text: #2f3542; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 100px; color: var(--text); }
        
        /* Compact Dashboard */
        .dashboard { 
            background: linear-gradient(135deg, #1e272e, #000); 
            color: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .main-total { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s; }

        /* Compact Chart Section */
        .chart-viewport { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 8px; margin-bottom: 15px; scrollbar-width: none; }
        .chart-viewport::-webkit-scrollbar { display: none; }
        .chart-slide { 
            flex: 0 0 100%; scroll-snap-align: start; background: white; 
            border-radius: 15px; padding: 10px; box-sizing: border-box; 
            display: none; height: 140px; /* Force smaller height */
        }
        canvas { max-height: 110px !important; }

        /* Compact Cards */
        .card-box { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 10px; border: 1px solid #e1e8ed; position: relative; }
        .input-row { display: grid; grid-template-columns: 1.2fr 0.8fr 1fr; gap: 8px; margin: 10px 0; }
        label { font-size: 9px; font-weight: 800; color: #a4b0be; text-transform: uppercase; margin-bottom: 3px; display: block; }
        input { width: 100%; padding: 10px; border: 1px solid #eceff1; border-radius: 8px; font-size: 15px; background: #fbfcfc; }
        
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 13px; width: 100%; }
        .badge { font-size: 9px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .int-red { color: var(--danger); background: #fff5f5; }
        .priority-tag { position: absolute; top: -8px; right: 15px; background: #f1c40f; color: #000; font-size: 8px; font-weight: 800; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; z-index: 10; }
        
        .history-row { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #f1f2f6; font-size: 9px; color: #95a5a6; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); text-align: center; padding: 12px 0; font-size: 9px; color: #bdc3c7; border-top: 1px solid #eee; z-index: 100; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-total" id="main-debt">$0.00</div>
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div id="main-freedom" style="font-size: 10px; color: var(--primary); font-weight: 700; letter-spacing: 0.5px;">DASHBOARD</div>
    <div style="display: flex; justify-content: space-around; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
        <div style="text-align: center;"><span id="stat-interest" style="font-size: 18px; font-weight: 800;">$0</span><br><span style="font-size: 8px; opacity: 0.6; text-transform: uppercase;">Interest</span></div>
        <div style="text-align: center;"><span id="stat-apr" style="font-size: 18px; font-weight: 800;">0%</span><br><span style="font-size: 8px; opacity: 0.6; text-transform: uppercase;">Avg APR</span></div>
    </div>
</div>

<div class="chart-viewport">
    <div id="slide-1" class="chart-slide"><canvas id="debtChart"></canvas></div>
    <div id="slide-2" class="chart-slide"><canvas id="ratioChart"></canvas></div>
</div>

<div id="card-list"></div>
<div class="footer">BUILD v1.3.6 • <span onclick="nuke()" style="color:var(--danger)">Clear All Data</span></div>

<script>
    const KEY = 'debt_v125';
    let debtChart, ratioChart;
    let cards = JSON.parse(localStorage.getItem(KEY)) || [
        { name: "Card 1", bal: 0, apr: 24, lastPay: 0, lastDate: "--" },
        { name: "Card 2", bal: 0, apr: 18, lastPay: 0, lastDate: "--" }
    ];

    function initUI() {
        const list = document.getElementById('card-list');
        list.innerHTML = '';
        cards.forEach((c, i) => {
            list.innerHTML += `
                <div class="card-box">
                    <div class="priority-tag" id="tag-${i}">High Interest</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <input type="text" id="n-${i}" oninput="updateData(${i})" value="${c.name}" style="border:none; font-weight:800; font-size:18px; background:none; width:60%; color:var(--text);">
                        <span class="badge int-red" id="badge-${i}">$0 Int</span>
                    </div>
                    <div class="input-row">
                        <div><label>Balance</label><input type="number" inputmode="decimal" id="b-${i}" oninput="updateData(${i})" value="${c.bal || ''}"></div>
                        <div><label>APR %</label><input type="number" inputmode="decimal" id="a-${i}" oninput="updateData(${i})" value="${c.apr || ''}"></div>
                        <div><label>Pay</label><input type="number" inputmode="decimal" id="p-${i}" oninput="updateData(${i})"></div>
                    </div>
                    <button id="btn-${i}" onclick="applyPayment(${i})">Log Update</button>
                    <div class="history-row">
                        <span id="history-${i}">Last: $${c.lastPay || 0} (${c.lastDate || '--'})</span>
                        <span id="freedom-label-${i}" style="color:var(--text); font-weight:700;">--</span>
                    </div>
                </div>`;
        });
        calculate();
    }

    function updateData(i) {
        cards[i].name = document.getElementById(`n-${i}`).value;
        cards[i].bal = parseFloat(document.getElementById(`b-${i}`).value) || 0;
        cards[i].apr = parseFloat(document.getElementById(`a-${i}`).value) || 0;
        localStorage.setItem(KEY, JSON.stringify(cards));
        calculate();
    }

    function calculate() {
        let totalDebt = 0, totalInt = 0, maxMonths = 0, aprSum = 0, highestMonthlyInt = -1, highIntIndex = -1;
        let bData = [], labels = [];

        cards.forEach((c, i) => {
            let bal = c.bal; totalDebt += bal; aprSum += c.apr;
            let mRate = (c.apr / 100) / 12;
            let currentMonthlyInt = bal * mRate;
            if (currentMonthlyInt > highestMonthlyInt) { highestMonthlyInt = currentMonthlyInt; highIntIndex = i; }

            let pInput = document.getElementById(`p-${i}`).value;
            let calcPay = (pInput !== "") ? parseFloat(pInput) : (c.lastPay || 0);

            let months = 0, interest = 0, tempBal = bal;
            if (bal > 0 && calcPay > currentMonthlyInt) {
                while (tempBal > 0 && months < 600) {
                    let mInt = tempBal * mRate;
                    interest += mInt;
                    tempBal = (tempBal + mInt) - calcPay;
                    months++;
                }
                if (months > maxMonths) maxMonths = months;
                totalInt += interest;
            }

            document.getElementById(`badge-${i}`).innerText = `+$${Math.round(interest)} Int`;
            document.getElementById(`freedom-label-${i}`).innerText = months > 0 ? `${months} mo` : (bal > 0 ? "Infinite" : "Paid");
            document.getElementById(`tag-${i}`).style.display = (i === highIntIndex && bal > 0) ? "block" : "none";
            bData.push(bal); labels.push(c.name);
        });

        document.getElementById('main-debt').innerText = '$' + totalDebt.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('stat-interest').innerText = '$' + Math.round(totalInt).toLocaleString();
        document.getElementById('stat-apr').innerText = cards.length ? Math.round(aprSum / cards.length) + '%' : '0%';
        
        const progress = totalDebt > 0 ? Math.max(5, 100 - (totalInt / (totalDebt + totalInt) * 100)) : 100;
        document.getElementById('progress-bar').style.width = progress + '%';

        if (maxMonths > 0) {
            let d = new Date(); d.setMonth(d.getMonth() + maxMonths);
            document.getElementById('main-freedom').innerText = "FREEDOM: " + d.toLocaleDateString('en-US', {month:'short', year:'numeric'}).toUpperCase();
        }
        updateCharts(labels, bData, totalDebt, totalInt);
    }

    function applyPayment(i) {
        let pInput = document.getElementById(`p-${i}`);
        let amt = parseFloat(pInput.value) || 0;
        if (amt > 0) {
            cards[i].bal = Math.max(0, cards[i].bal - amt);
            cards[i].lastPay = amt;
            const now = new Date();
            const dateStr = (now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0')+'/'+now.getFullYear();
            cards[i].lastDate = dateStr;
            document.getElementById(`b-${i}`).value = cards[i].bal;
            document.getElementById(`history-${i}`).innerText = `Last: $${amt} (${dateStr})`;
            pInput.value = '';
            localStorage.setItem(KEY, JSON.stringify(cards));
            calculate();
        }
        const b = document.getElementById(`btn-${i}`);
        b.innerText = "UPDATED ✓"; b.style.background = "var(--primary)";
        setTimeout(() => { b.innerText = "Log Update"; b.style.background = "var(--accent)"; }, 1500);
    }

    function updateCharts(labels, bData, totalDebt, totalInt) {
        if (typeof Chart === 'undefined') return;
        document.getElementById('slide-1').style.display = 'block';
        document.getElementById('slide-2').style.display = 'block';
        const opt = { cutout: '80%', animation: false, plugins: { legend: { display: false } }, maintainAspectRatio: false };
        
        const ctx1 = document.getElementById('debtChart').getContext('2d');
        if (debtChart) debtChart.destroy();
        debtChart = new Chart(ctx1, { type: 'doughnut', data: { labels: labels, datasets: [{ data: bData, backgroundColor: ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22'], borderWidth: 0 }] }, options: opt });
        
        const ctx2 = document.getElementById('ratioChart').getContext('2d');
        if (ratioChart) ratioChart.destroy();
        ratioChart = new Chart(ctx2, { type: 'pie', data: { labels: ['Principal', 'Interest'], datasets: [{ data: [totalDebt, totalInt], backgroundColor: ['#2f3542', '#ff4757'], borderWidth: 0 }] }, options: opt });
    }

    function nuke() { if(confirm("Wipe all?")) { localStorage.clear(); location.reload(); } }
    initUI();
</script>
</body>
</html>
