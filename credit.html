<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Dashboard v1.2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2ecc71; --accent: #3498db; --danger: #e74c3c; --text: #1a1a1a; --gray: #95a5a6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 80px; }
        
        /* Dashboard Header */
        .dashboard { background: linear-gradient(135deg, #2c3e50, #000); color: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-lbl { font-size: 11px; opacity: 0.7; text-transform: uppercase; }

        /* Card Styling */
        .card-entry { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 12px; border: 1px solid #e0e0e0; position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        input { border: 1px solid #ddd; padding: 10px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; background: #f9f9f9; }
        .input-row { display: grid; grid-template-columns: 1.5fr 1fr 1.2fr; gap: 8px; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 700; color: var(--gray); margin-bottom: 4px; display: block; }
        
        /* Individual Action Button */
        .update-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; width: 100%; margin-top: 5px; }
        .update-btn:active { background: #2980b9; transform: translateY(1px); }

        /* Analytics */
        .analytics-pane { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .interest-badge { background: #fff5f5; color: var(--danger); padding: 5px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        
        /* Version Footer */
        .version-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); text-align: center; padding: 10px 0; font-size: 10px; color: var(--gray); border-top: 1px solid #ddd; }
        canvas { max-width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div style="text-align: center;">
        <span class="stat-lbl">Total Outstanding</span>
        <div id="total-debt" style="font-size: 36px; font-weight: 800;">$0</div>
        <div id="freedom-date" style="font-size: 13px; color: var(--primary); margin-top: 5px; font-weight: 600;">UPDATING...</div>
    </div>
    <div class="stat-grid">
        <div class="stat-item">
            <span class="stat-val" id="total-interest" style="color: #ff7675;">$0</span>
            <span class="stat-lbl">Projected Int.</span>
        </div>
        <div class="stat-item">
            <span class="stat-val" id="avg-apr">0%</span>
            <span class="stat-lbl">Weighted APR</span>
        </div>
    </div>
</div>

<div class="analytics-pane">
    <canvas id="interestChart" height="180"></canvas>
</div>

<div id="cards-container"></div>

<div class="version-footer">
    DEBT DESTROYER DASHBOARD • v1.2.0 • Last Sync: <span id="sync-time">--</span>
</div>

<script>
    let interestChart;
    // Load from LocalStorage or use defaults
    let cards = JSON.parse(localStorage.getItem('cc_ledger_v1')) || [
        { name: "Sapphire", balance: 1200, apr: 24, payment: 100 },
        { name: "Freedom", balance: 500, apr: 18, payment: 50 },
        { name: "Apple Card", balance: 2000, apr: 22, payment: 150 },
        { name: "Discover", balance: 300, apr: 27, payment: 40 }
    ];

    function renderCards() {
        const container = document.getElementById('cards-container');
        container.innerHTML = '';
        cards.forEach((card, index) => {
            container.innerHTML += `
                <div class="card-entry">
                    <div class="card-header">
                        <input type="text" id="name-${index}" value="${card.name}" style="border:none; width: 60%; font-weight: bold; font-size: 18px; background:none;">
                        <span id="int-label-${index}" class="interest-badge">$0 Int.</span>
                    </div>
                    <div class="input-row">
                        <div><label>BALANCE ($)</label><input type="number" id="bal-${index}" value="${card.balance}"></div>
                        <div><label>APR (%)</label><input type="number" id="apr-${index}" value="${card.apr}"></div>
                        <div><label>PAYMENT ($)</label><input type="number" id="pay-${index}" value="${card.payment}"></div>
                    </div>
                    <button class="update-btn" onclick="updateSingleCard(${index})">LOG PAYMENT / UPDATE CARD</button>
                    <div id="months-${index}" style="font-size: 11px; color: #7f8c8d; text-align: right; margin-top:8px;">--</div>
                </div>
            `;
        });
    }

    // New logic: Update only one card at a time
    function updateSingleCard(index) {
        cards[index].name = document.getElementById(`name-${index}`).value;
        cards[index].balance = parseFloat(document.getElementById(`bal-${index}`).value) || 0;
        cards[index].apr = parseFloat(document.getElementById(`apr-${index}`).value) || 0;
        cards[index].payment = parseFloat(document.getElementById(`pay-${index}`).value) || 0;
        
        processDashboard();
        
        // Visual feedback for iPhone
        const btn = document.querySelectorAll('.update-btn')[index];
        const originalText = btn.innerText;
        btn.innerText = "SAVED ✓";
        btn.style.background = "var(--primary)";
        setTimeout(() => { 
            btn.innerText = originalText; 
            btn.style.background = "var(--accent)";
        }, 1500);
    }

    function processDashboard() {
        localStorage.setItem('cc_ledger_v1', JSON.stringify(cards));
        let totalDebt = 0, totalInterestVal = 0, maxMonths = 0, aprSum = 0;
        let interestData = [], cardNames = [];

        cards.forEach((card, index) => {
            totalDebt += card.balance;
            aprSum += card.apr;
            
            let monthlyRate = (card.apr / 100) / 12;
            let months = 0, interestPaid = 0;

            if (card.balance > 0 && card.payment > (card.balance * monthlyRate)) {
                months = Math.ceil(-Math.log(1 - (monthlyRate * card.balance) / card.payment) / Math.log(1 + monthlyRate));
                interestPaid = (card.payment * months) - card.balance;
            } else if (card.balance > 0) {
                months = Infinity;
            }

            totalInterestVal += interestPaid;
            interestData.push(interestPaid.toFixed(0));
            cardNames.push(card.name);

            document.getElementById(`int-label-${index}`).innerText = `+$${Math.round(interestPaid)} Int.`;
            document.getElementById(`months-${index}`).innerText = months === Infinity ? "⚠️ Interest Trap" : `${months} payments left`;
            if (months !== Infinity && months > maxMonths) maxMonths = months;
        });

        document.getElementById('total-debt').innerText = `$${totalDebt.toLocaleString()}`;
        document.getElementById('total-interest').innerText = `$${totalInterestVal.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
        document.getElementById('avg-apr').innerText = `${(aprSum / cards.length).toFixed(1)}%`;
        document.getElementById('sync-time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        if (maxMonths > 0) {
            const d = new Date();
            d.setMonth(d.getMonth() + maxMonths);
            document.getElementById('freedom-date').innerText = `DEBT FREE BY ${d.toLocaleDateString('en-US', {month: 'long', year: 'numeric'}).toUpperCase()}`;
        }
        updateChart(cardNames, interestData);
    }

    function updateChart(labels, data) {
        const ctx = document.getElementById('interestChart').getContext('2d');
        if (interestChart) interestChart.destroy();
        interestChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7'],
                    hoverOffset: 4,
                    borderWidth: 0
                }]
            },
            options: { cutout: '70%', plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    renderCards();
    processDashboard();
</script>
</body>
</html>
