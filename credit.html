<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Debt Tracker v2.3.7</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1e272e; --primary: #2ecc71; --accent: #3498db; --danger: #ff4757; --text: #f4f7f6; --card-bg: #2f3640; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 100px; color: var(--text); overflow-x: hidden; }
        .dashboard { background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(30,39,46,0) 100%); padding: 25px 12px 15px 12px; text-align: center; margin-bottom: 5px; }
        .main-total { font-size: 32px; font-weight: 800; }
        .main-freedom { background: rgba(46, 204, 113, 0.1); color: var(--primary); font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-top: 8px; text-transform: uppercase; }
        .stat-grid { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; }
        .stat-val { font-size: 16px; font-weight: 800; display: block; }
        .stat-lab { font-size: 8px; font-weight: 800; color: #a4b0be; text-transform: uppercase; }
        .chart-carousel { background: rgba(255,255,255,0.03); border-radius: 18px; padding: 15px; margin-bottom: 20px; height: 190px; position: relative; }
        .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); display: inline-block; margin: 0 3px; }
        .nav-dot.active { background: var(--accent); width: 12px; border-radius: 3px; }
        .card-container { margin-bottom: 15px; perspective: 1200px; height: 280px; position: relative; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card-container.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; padding: 18px; border: 1px solid rgba(255,255,255,0.08); background: var(--card-bg); box-sizing: border-box; display: flex; flex-direction: column; }
        .card-back { transform: rotateY(180deg); }
        .target-tag { background: var(--accent); color: white; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
        .paid-btn { background: #353b48; color: #a4b0be; font-size: 9px; padding: 5px 10px; border-radius: 6px; font-weight: 800; border: none; }
        .paid-btn.active { background: var(--primary); color: white; }
        label { font-size: 8px; font-weight: 800; color: #a4b0be; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 13px; background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box; }
        .btn-apply { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 700; flex: 1; }
        .progress-ring { position: relative; width: 70px; height: 70px; margin: 0 auto; }
        .progress-ring svg { transform: rotate(-90deg); }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 18px 0; font-size: 11px; display: flex; justify-content: space-around; z-index: 100; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-total" id="main-debt">$0.00</div>
    <div id="main-freedom" class="main-freedom">Ready</div>
    <div class="stat-grid">
        <div class="stat-item"><span class="stat-val" id="stat-min">$0</span><span class="stat-lab">Min Due</span></div>
        <div class="stat-item"><span class="stat-val" id="stat-apr">0%</span><span class="stat-lab">Avg APR</span></div>
    </div>
</div>

<div class="chart-carousel" id="chart-zone">
    <canvas id="mainChart"></canvas>
    <div style="text-align:center; margin-top:5px;">
        <div class="nav-dot active"></div><div class="nav-dot"></div><div class="nav-dot"></div>
    </div>
</div>

<div id="card-list"></div>
<button onclick="addCard()" style="background:var(--primary); color:white; padding:16px; border-radius:14px; width:100%; margin-bottom:30px; font-weight: 800; border:none;">+ ADD NEW DEBT</button>

<div class="footer">
    <span onclick="exportCSV()" style="color:var(--accent); font-weight: 800;">EXPORT CSV</span>
    <span style="opacity: 0.4;">v2.3.7</span>
    <span onclick="nuke()" style="color:var(--danger); font-weight: 800;">RESET ALL</span>
</div>

<script>
const KEY = 'debt_v125';
const ALT_KEYS = ['debt_v124', 'v1.4.18'];
const COLORS = ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#1abc9c', '#e74c3c'];
let activeChart, currentView = 0;
let cards = [];

function loadData() {
    let raw = localStorage.getItem(KEY);
    if (!raw) {
        for (let k of ALT_KEYS) {
            raw = localStorage.getItem(k);
            if (raw) break;
        }
    }
    cards = raw ? JSON.parse(raw) : [];
    initUI();
}

function initUI() {
    const list = document.getElementById('card-list');
    list.innerHTML = '';
    const now = new Date();
    const curMonthKey = (now.getMonth() + 1) + '-' + now.getFullYear();
    
    cards.sort((a, b) => (a.bal <= 0) - (b.bal <= 0) || b.apr - a.apr);
    const targetIdx = cards.findIndex(c => c.bal > 0);

    cards.forEach((c, i) => {
        const color = COLORS[i % COLORS.length];
        const isTarget = (i === targetIdx && c.bal > 0);
        const prog = c.highestBal > 0 ? ((c.highestBal - c.bal) / c.highestBal) * 100 : 0;
        const ringOffset = 195 - (prog / 100) * 195;

        list.innerHTML += `
            <div class="card-container">
                <div class="card-inner">
                    <div class="card-front" onclick="toggleFlip(this)" style="border-left: 6px solid ${color}; opacity: ${c.bal <= 0 ? 0.6 : 1}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <div>${isTarget ? '<span class="target-tag">TARGET</span>' : ''}</div>
                            <button class="paid-btn ${c.lastPaidMonth === curMonthKey ? 'active' : ''}" onclick="event.stopPropagation(); markPaid(${i})">${c.lastPaidMonth === curMonthKey ? 'PAID ✓' : 'MARK PAID'}</button>
                        </div>
                        <input type="text" value="${c.name}" onchange="updateData(${i}, 'name', this.value)" onclick="event.stopPropagation()" style="font-weight:800; background:none; border:none; font-size:17px; margin-bottom:10px; color:#fff;">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                            <div><label>Balance</label><input type="number" step="0.01" value="${c.bal}" onchange="updateData(${i}, 'bal', this.value)"></div>
                            <div><label>APR %</label><input type="number" step="0.1" value="${c.apr}" onchange="updateData(${i}, 'apr', this.value)"></div>
                            <div style="grid-column:span 2"><label>Due Date</label><input type="date" value="${c.due || ''}" onchange="updateData(${i}, 'due', this.value)"></div>
                        </div>
                        <div style="display:flex; gap:8px; margin-top:auto; padding-top:10px; border-top:1px solid rgba(255,255,255,0.05);">
                            <input type="number" id="p-${i}" placeholder="Pay $" onclick="event.stopPropagation()">
                            <button class="btn-apply" onclick="event.stopPropagation(); applyPayment(${i})">Apply</button>
                        </div>
                    </div>
                    <div class="card-back" onclick="toggleFlip(this)" style="border-left: 6px solid ${color}">
                        <div style="display:flex; align-items:center; height:100%; gap:20px;">
                            <div class="progress-ring"><svg width="70" height="70"><circle cx="35" cy="35" r="31" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/><circle cx="35" cy="35" r="31" fill="none" stroke="${color}" stroke-width="8" stroke-dasharray="195" stroke-dashoffset="${ringOffset}"/></svg><div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px;">${Math.round(prog)}%</div></div>
                            <div><label>REMAINING</label><div style="font-size:20px; font-weight:900;">$${(c.bal || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</div>
                            <div style="margin-top:10px;"><label>MIN PAYMENT</label><input type="number" value="${c.min || 0}" onchange="updateData(${i}, 'min', this.value)" onclick="event.stopPropagation()" style="width:80px;"></div></div>
                        </div>
                    </div>
                </div>
            </div>`;
    });
    calculate();
}

function updateData(i, f, v) {
    cards[i][f] = (['name','due','lastPaidMonth'].includes(f)) ? v : parseFloat(v) || 0;
    if (f === 'bal' && cards[i].bal > (cards[i].highestBal || 0)) cards[i].highestBal = cards[i].bal;
    localStorage.setItem(KEY, JSON.stringify(cards));
    if (f === 'apr' || f === 'bal') initUI();
    else calculate();
}

function calculate() {
    let total = 0, totalMin = 0, aprSum = 0, count = 0;
    cards.forEach(c => { total += (c.bal || 0); if (c.bal > 0) { totalMin += (c.min || 0); aprSum += (c.apr || 0); count++; }});
    document.getElementById('main-debt').innerText = '$' + total.toLocaleString(undefined, {minimumFractionDigits:2});
    document.getElementById('stat-min').innerText = '$' + Math.round(totalMin);
    document.getElementById('stat-apr').innerText = count > 0 ? Math.round(aprSum / count) + '%' : '0%';
    renderChart();
}

function applyPayment(i) {
    const input = document.getElementById(`p-${i}`);
    const amt = parseFloat(input.value) || 0;
    if (amt > 0) { 
        cards[i].bal = Math.max(0, cards[i].bal - amt); 
        input.value = ''; 
        updateData(i, 'bal', cards[i].bal); 
    }
}

function markPaid(i) {
    const now = new Date(); const monthKey = (now.getMonth() + 1) + '-' + now.getFullYear();
    updateData(i, 'lastPaidMonth', monthKey);
}

function toggleFlip(el) { el.closest('.card-container').classList.toggle('flipped'); }
function addCard() { cards.push({name: "New Debt", bal: 0, apr: 0, min: 0, highestBal: 0, due: ""}); localStorage.setItem(KEY, JSON.stringify(cards)); initUI(); }
function nuke() { if(confirm("This will wipe ALL data. Continue?")) { localStorage.clear(); location.reload(); } }
function exportCSV() { 
    let csv = "Name,Balance,APR,Min,Due\n" + cards.map(c => `${c.name},${c.bal},${c.apr},${c.min},${c.due}`).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'debt_backup.csv'; a.click();
}

function renderChart() {
    const ctx = document.getElementById('mainChart');
    if (activeChart) activeChart.destroy();
    activeChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: cards.map(c => c.name), datasets: [{ data: cards.map(c => c.bal), backgroundColor: COLORS, borderWidth: 0 }] },
        options: { maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false } } }
    });
}

loadData();
</script>
</body>
</html>
