<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; overscroll-behavior-y: contain; }
        .box { background: #fff; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        .header { background: #2c3e50; color: white; text-align: center; }
        .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        label { font-size: 10px; font-weight: bold; color: #777; }
        button { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        .int-tag { font-size: 10px; background: #eee; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="box header">
    <div style="font-size: 10px; opacity: 0.7;">TOTAL DEBT</div>
    <div id="total-val" style="font-size: 32px; font-weight: bold;">$0.00</div>
    <div id="freedom-val" style="font-size: 12px; margin-top: 5px; color: #2ecc71;">--</div>
</div>

<div id="card-list">
    </div>

<div style="text-align: center; font-size: 10px; color: #aaa; margin-top: 20px;">
    VERSION 1.2.4 • <span onclick="clearEverything()">Nuke Data & Restart</span>
</div>

<script>
    const STORAGE_NAME = 'debt_final_v1';

    // 1. CLEAR OLD KEYS (to prevent the "nothing loading" bug)
    if (!localStorage.getItem('v1_fix')) {
        localStorage.removeItem('cc_ledger_v1');
        localStorage.removeItem('cc_ledger_v121');
        localStorage.removeItem('cc_dashboard_data');
        localStorage.setItem('v1_fix', 'true');
    }

    let myCards = JSON.parse(localStorage.getItem(STORAGE_NAME)) || [
        { n: "Card 1", b: 0, a: 24, p: 0 },
        { n: "Card 2", b: 0, a: 18, p: 0 },
        { n: "Card 3", b: 0, a: 22, p: 0 },
        { n: "Card 4", b: 0, a: 27, p: 0 }
    ];

    function draw() {
        const list = document.getElementById('card-list');
        list.innerHTML = '';
        let totalDebt = 0;
        let maxMonths = 0;

        myCards.forEach((c, i) => {
            totalDebt += parseFloat(c.b || 0);
            
            // Calc logic
            let mRate = (c.a / 100) / 12;
            let months = 0;
            if (c.b > 0 && c.p > (c.b * mRate)) {
                months = Math.ceil(-Math.log(1 - (mRate * c.b) / c.p) / Math.log(1 + mRate));
                if (months > maxMonths) maxMonths = months;
            }

            list.innerHTML += `
                <div class="box">
                    <div style="display:flex; justify-content:space-between;">
                        <input type="text" value="${c.n}" onchange="upd(${i},'n',this.value)" style="border:none; font-weight:bold; width:60%;">
                        <span class="int-tag">${months > 0 ? months + ' mo' : '--'}</span>
                    </div>
                    <div class="row">
                        <div><label>BAL</label><input type="number" value="${c.b}" onchange="upd(${i},'b',this.value)"></div>
                        <div><label>APR</label><input type="number" value="${c.a}" onchange="upd(${i},'a',this.value)"></div>
                        <div><label>PAY</label><input type="number" value="${c.p}" onchange="upd(${i},'p',this.value)"></div>
                    </div>
                    <button onclick="save()">SAVE CARD</button>
                </div>`;
        });

        document.getElementById('total-val').innerText = '$' + totalDebt.toLocaleString();
        
        if (maxMonths > 0) {
            let d = new Date();
            d.setMonth(d.getMonth() + maxMonths);
            document.getElementById('freedom-val').innerText = "FREEDOM: " + d.toLocaleDateString();
        }
    }

    function upd(index, key, val) {
        myCards[index][key] = key === 'n' ? val : parseFloat(val || 0);
    }

    function save() {
        localStorage.setItem(STORAGE_NAME, JSON.stringify(myCards));
        draw();
    }

    function clearEverything() {
        if(confirm("Wipe all data?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Initial Start
    draw();
</script>

</body>
</html>
