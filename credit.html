<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Debt Snowball v2.2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #1e272e; --card: #ffffff; --primary: #2ecc71; --accent: #3498db; 
            --danger: #ff4757; --text: #f4f7f6; --text-dark: #2f3542; 
        }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: 10px; padding-bottom: 120px; color: var(--text); overflow-x: hidden; 
        }

        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .splash-hidden { opacity: 0; visibility: hidden; }

        .dashboard { 
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(30,39,46,0) 100%); 
            padding: 15px 12px; text-align: center; margin-bottom: 5px;
        }
        .main-total { font-size: 32px; font-weight: 800; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .main-freedom { background: rgba(46, 204, 113, 0.1); color: var(--primary); font-size: 11px; font-weight: 800; letter-spacing: 1.5px; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-top: 8px; }

        .chart-carousel { background: rgba(255,255,255,0.03); border-radius: 18px; padding: 15px; margin-bottom: 20px; height: 200px; position: relative; overflow: hidden; touch-action: pan-y; }
        .chart-nav { display: flex; justify-content: center; gap: 6px; margin-top: 8px; }
        .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background 0.3s; }
        .nav-dot.active { background: var(--accent); width: 12px; border-radius: 3px; }

        /* Fix 3: Enhanced 3D Stability */
        .card-container { margin-bottom: 15px; perspective: 1200px; position: relative; height: 260px; }
        .card-inner { 
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
        }
        .card-container.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; 
            backface-visibility: hidden; 
            border-radius: 20px; padding: 18px;
            border: 1px solid rgba(255,255,255,0.08); background: #2f3640; box-sizing: border-box; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column;
            top: 0; left: 0;
        }
        
        .card-back { transform: rotateY(180deg); }
        .target-tag { background: var(--accent); color: white; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; min-height: 24px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
        label { font-size: 8px; font-weight: 800; color: #a4b0be; text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        /* Fix 2: Decimal Support via Step */
        input { width: 100%; padding: 10px 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 13px; background: rgba(0,0,0,0.2); box-sizing: border-box; color: #fff; -webkit-appearance: none; }
        
        .pay-row { display: flex; gap: 8px; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px; padding-bottom: 5px; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; }
        .paid-btn { background: #353b48; color: #a4b0be; font-size: 9px; padding: 5px 10px; border-radius: 6px; width: auto; font-weight: 800; border: none; }
        .paid-btn.active { background: var(--primary); color: white; }

        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); text-align: center; padding: 15px 0; font-size: 10px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; z-index: 100; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div style="color:white; font-size:40px; font-weight:900; border:4px solid var(--primary); padding:12px; border-radius:18px;">$</div>
</div>

<div class="dashboard">
    <div class="main-total" id="main-debt">$0.00</div>
    <div id="main-freedom" class="main-freedom">CALCULATING...</div>
    <div style="display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px;">
        <div style="text-align: center;"><span id="stat-min" style="font-size: 16px; font-weight: 800; color: #fff;">$0</span><br><span style="font-size: 8px; opacity: 0.6;">MIN DUE</span></div>
        <div style="text-align: center;"><span id="stat-apr" style="font-size: 16px; font-weight: 800; color: #fff;">0%</span><br><span style="font-size: 8px; opacity: 0.6;">AVG APR</span></div>
    </div>
</div>

<div class="chart-carousel" id="chart-zone">
    <canvas id="mainChart"></canvas>
    <div class="chart-nav" id="chart-nav">
        <div class="nav-dot active"></div><div class="nav-dot"></div><div class="nav-dot"></div>
    </div>
</div>

<div id="card-list"></div>
<button onclick="addCard()" style="background:#2ecc71; color:white; padding:16px; border-radius:14px; width:100%; margin-bottom:30px; font-weight: 800; border:none;">+ ADD NEW DEBT</button>

<div class="footer">
    <span onclick="exportCSV()" style="color:var(--accent); font-weight:bold;">Backup</span>
    <span>v2.2.1</span>
    <span onclick="nuke()" style="color:var(--danger)">Reset</span>
</div>

<script>
const KEY = 'debt_v125';
const COLORS = ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#1abc9c', '#e74c3c'];
let activeChart, currentView = 0;
let cards = JSON.parse(localStorage.getItem(KEY)) || [];

// Swipe Logic
let touchStartX = 0;
const chartZone = document.getElementById('chart-zone');
chartZone.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
chartZone.addEventListener('touchend', e => {
    let diff = touchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 50) {
        currentView = diff > 0 ? (currentView + 1) % 3 : (currentView - 1 + 3) % 3;
        calculate(); // Refresh chart without rebuilding whole list
    }
});

function toggleFlip(el) { el.closest('.card-container').classList.toggle('flipped'); }

function initUI() {
    const list = document.getElementById('card-list');
    list.innerHTML = '';
    const now = new Date();
    const curMonthKey = `${now.getMonth()}-${now.getFullYear()}`;

    cards.sort((a, b) => (a.bal <= 0) - (b.bal <= 0) || b.apr - a.apr);
    const targetIdx = cards.findIndex(c => c.bal > 0);

    cards.forEach((c, i) => {
        const color = COLORS[i % COLORS.length];
        const isTarget = (i === targetIdx && c.bal > 0);
        const isPaidThisMonth = c.lastPaidMonth === curMonthKey;

        list.innerHTML += `
            <div class="card-container">
                <div class="card-inner">
                    <div class="card-front" onclick="toggleFlip(this)" style="border-left: 6px solid ${color}; opacity: ${c.bal <= 0 ? 0.6 : 1}">
                        <div class="card-header">
                            <div>${isTarget ? '<span class="target-tag">TARGET</span>' : ''}</div>
                            <button class="paid-btn ${isPaidThisMonth ? 'active' : ''}" onclick="event.stopPropagation(); markPaid(${i})">
                                ${isPaidThisMonth ? 'PAID ✓' : 'MARK PAID'}
                            </button>
                        </div>
                        <input type="text" onchange="updateData(${i}, 'name', this.value)" value="${c.name}" onclick="event.stopPropagation()" style="border:none; font-weight:800; background:none; font-size:17px; width:100%; color:#fff;">
                        <div class="input-row" onclick="event.stopPropagation()">
                            <div><label>Balance</label><input type="number" step="0.01" onchange="updateData(${i}, 'bal', this.value)" value="${c.bal}"></div>
                            <div><label>Min $</label><input type="number" step="0.01" onchange="updateData(${i}, 'min', this.value)" value="${c.min}"></div>
                            <div><label>Due</label><input type="date" onchange="updateData(${i}, 'due', this.value)" value="${c.due || ''}"></div>
                        </div>
                        <div class="pay-row" onclick="event.stopPropagation()">
                            <input type="number" step="0.01" id="p-${i}" placeholder="Pay $">
                            <button onclick="applyPayment(${i})" style="flex: 0 0 100px;">Apply</button>
                        </div>
                    </div>
                    <div class="card-back" onclick="toggleFlip(this)" style="border-left: 6px solid ${color}">
                        <div style="text-align:center; height:100%; display:flex; flex-direction:column; justify-content:center;">
                            <label>APR Rate</label>
                            <input type="number" step="0.1" onchange="updateData(${i}, 'apr', this.value)" value="${c.apr}" style="font-size:30px; font-weight:900; text-align:center; background:none; border:none;" onclick="event.stopPropagation()">
                            <div style="font-size:10px; color:#ced6e0; margin-top:20px;">Tap to Flip Back</div>
                        </div>
                    </div>
                </div>
            </div>`;
    });
    calculate();
}

// Fix 1: Using onchange instead of oninput prevents focus jumping
function updateData(i, f, v) {
    cards[i][f] = (f === 'name' || f === 'due') ? v : parseFloat(v) || 0;
    saveSilently(); 
}

function saveSilently() {
    localStorage.setItem(KEY, JSON.stringify(cards));
    calculate(); // Updates totals/charts without redrawing the input list
}

function calculate() {
    let total = 0, totalMin = 0, aprSum = 0;
    cards.forEach(c => { total += c.bal; totalMin += c.min; aprSum += c.apr; });
    document.getElementById('main-debt').innerText = '$' + total.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById('stat-min').innerText = '$' + Math.round(totalMin);
    document.getElementById('stat-apr').innerText = cards.length ? Math.round(aprSum / cards.length) + '%' : '0%';
    
    const projection = projectAvalanche(cards);
    if (projection.months > 0) {
        let d = new Date(); d.setMonth(d.getMonth() + projection.months);
        document.getElementById('main-freedom').innerText = "FREEDOM: " + d.toLocaleDateString('en-US', {month:'short', year:'numeric'}).toUpperCase();
    } else {
        document.getElementById('main-freedom').innerText = total > 0 ? "ADD MIN PAYMENTS" : "DEBT FREE!";
    }
    renderCurrentChart(projection);
}

function renderCurrentChart(projection) {
    const ctx = document.getElementById('mainChart');
    if (activeChart) activeChart.destroy();
    document.querySelectorAll('.nav-dot').forEach((d, i) => d.className = i === currentView ? 'nav-dot active' : 'nav-dot');

    const config = {
        type: 'line',
        data: {},
        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#747d8c', font: { size: 9 } } } } }
    };

    if (currentView === 0) {
        config.data = { labels: projection.timeline.map((_, i) => i), datasets: [{ data: projection.timeline, borderColor: '#2ecc71', backgroundColor: 'rgba(46, 204, 113, 0.1)', fill: true, pointRadius: 0 }] };
    } else if (currentView === 1) {
        config.type = 'doughnut';
        config.data = { labels: cards.map(c => c.name), datasets: [{ data: cards.map(c => c.bal), backgroundColor: COLORS, borderWidth: 0 }] };
        config.options.cutout = '70%'; config.options.scales = { x: { display: false }, y: { display: false } };
    } else {
        config.type = 'bar';
        config.data = { labels: cards.map(c => c.name), datasets: [{ data: cards.map(c => c.apr), backgroundColor: '#3498db', borderRadius: 5 }] };
    }
    activeChart = new Chart(ctx, config);
}

function projectAvalanche(cards) {
    let tempCards = cards.filter(c => c.bal > 0).map(c => ({...c}));
    if (tempCards.length === 0) return { months: 0, timeline: [] };
    let totalPay = tempCards.reduce((s, c) => s + c.min, 0);
    let months = 0, timeline = [];
    while (months < 360) {
        months++;
        let currentTotal = 0;
        let pill = totalPay;
        tempCards.forEach(c => {
            let i = (c.bal * ((c.apr/100)/12));
            c.bal = (c.bal + i) - c.min;
            pill -= c.min;
            currentTotal += c.bal;
        });
        if (tempCards[0]) { tempCards[0].bal -= pill; currentTotal -= pill; if (tempCards[0].bal <= 0) tempCards.shift(); }
        timeline.push(Math.max(0, currentTotal));
        if (currentTotal <= 0) break;
    }
    return { months, timeline };
}

function addCard() { cards.push({name: "New Card", bal: 0, min: 0, apr: 0, due: ""}); localStorage.setItem(KEY, JSON.stringify(cards)); initUI(); }
function markPaid(i) { const now = new Date(); cards[i].lastPaidMonth = `${now.getMonth()}-${now.getFullYear()}`; saveSilently(); }
function applyPayment(i) {
    const input = document.getElementById(`p-${i}`);
    const amt = parseFloat(input.value) || 0;
    if (amt > 0) { cards[i].bal = Math.max(0, cards[i].bal - amt); input.value = ''; localStorage.setItem(KEY, JSON.stringify(cards)); initUI(); }
}
function nuke() { if(confirm("Clear data?")) { localStorage.clear(); location.reload(); } }
function exportCSV() { 
    let csv = "Name,Balance,Min,APR,Due\n" + cards.map(c => `${c.name},${c.bal},${c.min},${c.apr},${c.due}`).join('\n');
    window.open('data:text/csv;charset=utf-8,' + encodeURI(csv));
}

setTimeout(() => document.getElementById('splash-screen').classList.add('splash-hidden'), 1000);
initUI();
</script>
</body>
</html>
