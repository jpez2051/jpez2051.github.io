<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Debt Tracker v2.5.1</title>
    <style>
        :root { --bg: #1e272e; --primary: #2ecc71; --accent: #3498db; --danger: #ff4757; --text: #f4f7f6; --card-bg: #2f3640; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; padding-bottom: 100px; color: var(--text); overflow-x: hidden; }
        
        .dashboard { background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(30,39,46,0) 100%); padding: 25px 12px 15px 12px; text-align: center; }
        .main-total-container { display: flex; align-items: baseline; justify-content: center; gap: 8px; }
        .main-total { font-size: 32px; font-weight: 800; }
        .delta-badge { font-size: 14px; font-weight: 800; padding: 2px 8px; border-radius: 6px; }
        .delta-down { color: var(--primary); }
        .delta-up { color: var(--danger); }
        
        .main-freedom { background: rgba(46, 204, 113, 0.1); color: var(--primary); font-size: 11px; font-weight: 800; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-top: 8px; text-transform: uppercase; }
        .stack-chart { display: flex; height: 12px; border-radius: 6px; overflow: hidden; background: rgba(255,255,255,0.05); margin: 20px 0; width: 100%; }
        .stack-segment { height: 100%; transition: width 0.5s ease; }
        .stat-grid { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px; }
        .stat-val { font-size: 16px; font-weight: 800; display: block; }
        .stat-lab { font-size: 8px; font-weight: 800; color: #a4b0be; text-transform: uppercase; }
        .card-container { margin-bottom: 15px; border-radius: 20px; padding: 18px 18px 18px 12px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); position: relative; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 12px;}
        .card-target { border: 1px solid var(--danger) !important; box-shadow: 0 0 20px rgba(255, 71, 87, 0.15); }
        .target-tag { background: var(--danger); color: white; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 5px; text-transform: uppercase;}
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .progress-ring { position: relative; width: 54px; height: 54px; }
        .progress-ring svg { transform: rotate(-90deg); }
        .ring-circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .ring-bg { stroke: rgba(255,255,255,0.05); }
        .ring-bar { stroke-dasharray: 151; transition: stroke-dashoffset 0.6s ease; }
        .prog-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
        .paid-btn { background: #353b48; color: #a4b0be; font-size: 9px; padding: 6px 12px; border-radius: 8px; font-weight: 800; border: none; text-transform: uppercase; cursor: pointer;}
        .paid-btn.active { background: var(--primary); color: white; }
        label { font-size: 8px; font-weight: 800; color: #a4b0be; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 13px; background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box; }
        .reset-link { font-size: 9px; color: var(--danger); opacity: 0.3; text-decoration: none; text-align: right; display: block; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.95); padding: 18px 0; font-size: 11px; display: flex; justify-content: space-around; z-index: 100; border-top: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

<div id="app-root">
    <div class="dashboard">
        <div class="main-total-container">
            <div class="main-total" id="main-debt">$0.00</div>
            <div id="delta-badge" class="delta-badge"></div>
        </div>
        <div id="main-freedom" class="main-freedom">Calculating...</div>
        <div id="stack-chart" class="stack-chart"></div>
        <div class="stat-grid">
            <div class="stat-item"><span class="stat-val" id="stat-min">$0</span><span class="stat-lab">Total Min Due</span></div>
            <div class="stat-item"><span class="stat-val" id="stat-apr">0%</span><span class="stat-lab">Avg APR</span></div>
        </div>
    </div>
    <div id="card-list" style="margin-top:20px;"></div>
    <button onclick="addCard()" style="background:var(--primary); color:white; padding:16px; border-radius:14px; width:100%; margin-top:10px; font-weight: 800; border:none; cursor:pointer;">+ ADD NEW DEBT</button>
</div>

<div class="footer">
    <span onclick="exportCSV()" style="color:var(--accent); font-weight: 800; cursor:pointer;">EXPORT CSV</span>
    <span style="opacity: 0.4;">v2.5.1</span>
    <span onclick="nuke()" style="color:var(--danger); font-weight: 800; cursor:pointer;">WIPE ALL</span>
</div>

<script>
const KEY = 'debt_v125';
const PREV_KEY = 'debt_prev_total';
const COLORS = ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#1abc9c', '#e74c3c'];
let cards = [];

function loadData() {
    try {
        const raw = localStorage.getItem(KEY);
        cards = raw ? JSON.parse(raw) : [];
        renderUI();
    } catch (e) { cards = []; }
}

function renderUI() {
    const list = document.getElementById('card-list');
    list.innerHTML = '';
    const curMonthKey = (new Date().getMonth() + 1) + '-' + new Date().getFullYear();
    
    cards.sort((a, b) => {
        const balA = parseFloat(a.bal) || 0;
        const balB = parseFloat(b.bal) || 0;
        if (balA > 0 && balB <= 0) return -1;
        if (balA <= 0 && balB > 0) return 1;
        return (parseFloat(b.apr) || 0) - (parseFloat(a.apr) || 0);
    });

    const targetIdx = cards.findIndex(c => parseFloat(c.bal) > 0);

    cards.forEach((c, i) => {
        const bal = parseFloat(c.bal) || 0;
        const isTarget = (i === targetIdx && bal > 0);
        const highest = parseFloat(c.highestBal) || bal;
        const progPercent = highest > bal ? Math.round(((highest - bal) / highest) * 100) : (bal === 0 ? 100 : 0);
        const offset = 151 - (151 * (progPercent / 100));
        const isPaid = c.lastPaidMonth === curMonthKey;
        const syncColor = COLORS[i % COLORS.length];

        list.innerHTML += `
            <div class="card-container ${isTarget ? 'card-target' : ''}" style="opacity: ${bal === 0 ? 0.3 : (isPaid ? 0.6 : 1)}; border-left: 6px solid ${syncColor};">
                <div class="card-header">
                    <div style="flex:1">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                            ${isTarget ? '<span class="target-tag">AVALANCHE TARGET</span>' : (bal === 0 ? '<span style="font-size:8px; font-weight:900; color:var(--primary);">COMPLETED ✓</span>' : '<span></span>')}
                            ${bal > 0 ? `<button class="paid-btn ${isPaid ? 'active' : ''}" onclick="markPaid(${i})">${isPaid ? 'PAID ✓' : 'MARK PAID'}</button>` : ''}
                        </div>
                        <input type="text" value="${c.name || ''}" placeholder="Debt Name" onchange="update(${i}, 'name', this.value)" style="font-weight:800; border:none; background:none; font-size:16px; width:100%; color:#fff; padding:0;">
                    </div>
                    <div class="progress-ring">
                        <svg width="54" height="54">
                            <circle class="ring-circle ring-bg" cx="27" cy="27" r="24"></circle>
                            <circle class="ring-circle ring-bar" cx="27" cy="27" r="24" style="stroke-dashoffset: ${offset}; stroke: ${syncColor};"></circle>
                        </svg>
                        <div class="prog-text">${progPercent}%</div>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <div><label>Balance</label><input type="number" step="0.01" value="${bal}" onchange="update(${i}, 'bal', this.value)"></div>
                    <div><label>APR %</label><input type="number" step="0.1" value="${c.apr || 0}" onchange="update(${i}, 'apr', this.value)"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <div><label>Min Pay</label><input type="number" value="${c.min || 0}" onchange="update(${i}, 'min', this.value)"></div>
                    <div><label>Due Date</label><input type="date" value="${c.due || ''}" onchange="update(${i}, 'due', this.value)"></div>
                </div>
                <span class="reset-link" onclick="resetHighest(${i})">RESET BASELINE</span>
            </div>`;
    });
    calculate();
}

function update(i, field, val) {
    cards[i][field] = (field === 'name' || field === 'due') ? val : parseFloat(val) || 0;
    if (field === 'bal' && cards[i].bal > (cards[i].highestBal || 0)) cards[i].highestBal = cards[i].bal;
    localStorage.setItem(KEY, JSON.stringify(cards));
    renderUI();
}

function markPaid(i) {
    const key = (new Date().getMonth() + 1) + '-' + new Date().getFullYear();
    cards[i].lastPaidMonth = (cards[i].lastPaidMonth === key) ? "" : key;
    localStorage.setItem(KEY, JSON.stringify(cards));
    renderUI();
}

function resetHighest(i) {
    cards[i].highestBal = parseFloat(cards[i].bal) || 0;
    localStorage.setItem(KEY, JSON.stringify(cards));
    renderUI();
}

function calculate() {
    let currentTotal = 0, totalMin = 0, aprSum = 0, count = 0;
    cards.forEach(c => {
        let b = parseFloat(c.bal) || 0;
        currentTotal += b;
        if (b > 0) {
            totalMin += (parseFloat(c.min) || 0);
            aprSum += (parseFloat(c.apr) || 0);
            count++;
        }
    });
    
    document.getElementById('main-debt').innerText = '$' + currentTotal.toLocaleString(undefined, {minimumFractionDigits:2});
    
    // Delta Logic
    const prevTotal = parseFloat(localStorage.getItem(PREV_KEY)) || currentTotal;
    const delta = currentTotal - prevTotal;
    const deltaEl = document.getElementById('delta-badge');
    
    if (Math.abs(delta) > 0.01) {
        deltaEl.innerText = (delta > 0 ? '+' : '-') + '$' + Math.abs(delta).toFixed(2);
        deltaEl.className = 'delta-badge ' + (delta > 0 ? 'delta-up' : 'delta-down');
    } else {
        deltaEl.innerText = '';
    }
    
    // Save current as previous for the NEXT session
    localStorage.setItem(PREV_KEY, currentTotal);

    document.getElementById('stat-min').innerText = '$' + Math.round(totalMin);
    document.getElementById('stat-apr').innerText = count > 0 ? Math.round(aprSum / count) + '%' : '0%';
    
    const freedomEl = document.getElementById('main-freedom');
    const months = projectTimeline(cards);
    if (months > 0) {
        let d = new Date(); d.setMonth(d.getMonth() + months);
        freedomEl.innerText = "Freedom: " + d.toLocaleDateString('en-US', {month:'short', year:'numeric'});
    } else {
        freedomEl.innerText = currentTotal > 0 ? "Add Min Payments" : "Debt Free!";
    }

    const stack = document.getElementById('stack-chart');
    stack.innerHTML = '';
    cards.forEach((c, i) => {
        const bal = parseFloat(c.bal) || 0;
        if (bal > 0) {
            const width = (bal / currentTotal) * 100;
            stack.innerHTML += `<div class="stack-segment" style="width: ${width}%; background: ${COLORS[i % COLORS.length]}"></div>`;
        }
    });
}

function projectTimeline(cards) {
    let temp = cards.filter(c => (parseFloat(c.bal) || 0) > 0).map(c => ({
        bal: parseFloat(c.bal) || 0, apr: parseFloat(c.apr) || 0, min: parseFloat(c.min) || 0
    }));
    let totalMin = temp.reduce((s, c) => s + c.min, 0);
    if (temp.length === 0 || totalMin <= 0) return 0;
    let months = 0;
    while (months < 360) {
        months++; let pool = totalMin;
        temp.forEach(c => {
            c.bal = (c.bal + (c.bal * ((c.apr / 100) / 12))) - c.min;
            pool -= c.min;
        });
        if (temp[0]) { temp[0].bal -= pool; if (temp[0].bal <= 0) temp.shift(); }
        if (temp.length === 0) break;
    }
    return months;
}

function addCard() {
    cards.push({name: "New Debt", bal: 0, apr: 0, min: 0, highestBal: 0, due: "", lastPaidMonth: ""});
    renderUI();
}

function nuke() { if(confirm("Wipe data?")) { localStorage.clear(); location.reload(); } }
function exportCSV() { alert(JSON.stringify(cards)); }

loadData();
</script>
</body>
</html>
