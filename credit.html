<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Dashboard v1.2.3</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2ecc71; --accent: #3498db; --danger: #e74c3c; --text: #1a1a1a; --gray: #95a5a6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; overscroll-behavior-y: contain; }
        .dashboard { background: linear-gradient(135deg, #2c3e50, #000); color: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .card-entry { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 12px; border: 1px solid #e0e0e0; }
        .input-row { display: grid; grid-template-columns: 1.5fr 1fr 1.2fr; gap: 8px; margin-bottom: 10px; }
        input { border: 1px solid #ddd; padding: 10px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        label { font-size: 10px; font-weight: 700; color: var(--gray); display: block; margin-bottom: 4px; }
        .update-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: bold; width: 100%; cursor: pointer; }
        .interest-badge { background: #f1f2f6; color: #7f8c8d; padding: 5px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .version-footer { text-align: center; padding: 20px; font-size: 10px; color: var(--gray); }
        #debug-msg { color: red; font-size: 12px; text-align: center; display: none; padding: 10px; }
    </style>
</head>
<body>

<div id="debug-msg">Error detected in script execution. Check console.</div>

<div class="dashboard">
    <div style="font-size: 11px; text-transform: uppercase; opacity: 0.7;">Total Debt</div>
    <div id="total-debt" style="font-size: 36px; font-weight: 800;">$0.00</div>
    <div id="freedom-date" style="font-size: 13px; color: var(--primary); margin-top: 5px; font-weight: 600;">LOADING...</div>
    <div class="stat-grid">
        <div class="stat-item">
            <span id="total-interest" style="font-weight: bold; display: block;">$0</span>
            <span style="font-size: 10px; opacity: 0.7;">INTEREST</span>
        </div>
        <div class="stat-item">
            <span id="avg-apr" style="font-weight: bold; display: block;">0%</span>
            <span style="font-size: 10px; opacity: 0.7;">AVG APR</span>
        </div>
    </div>
</div>

<div id="cards-container"></div>

<div class="version-footer">
    DEBT DESTROYER • v1.2.3 • <span onclick="resetApp()" style="text-decoration: underline;">Reset App</span>
</div>

<script>
    // 1. Error Handling Wrapper
    window.onerror = function(msg) {
        document.getElementById('debug-msg').style.display = 'block';
        document.getElementById('debug-msg').innerText = "System Error: " + msg;
    };

    const DB_KEY = 'debt_v123';
    
    // 2. Data Initialization
    let cards = [];
    try {
        const saved = localStorage.getItem(DB_KEY);
        if (saved) {
            cards = JSON.parse(saved);
        } else {
            cards = [
                { name: "Card 1", balance: 0, apr: 24, payment: 0 },
                { name: "Card 2", balance: 0, apr: 18, payment: 0 },
                { name: "Card 3", balance: 0, apr: 22, payment: 0 },
                { name: "Card 4", balance: 0, apr: 27, payment: 0 }
            ];
        }
    } catch (e) {
        console.error("Storage error", e);
    }

    // 3. Render Cards Function
    function renderCards() {
        const container = document.getElementById('cards-container');
        if (!container) return;
        
        container.innerHTML = '';
        cards.forEach((card, index) => {
            container.innerHTML += `
                <div class="card-entry">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <input type="text" id="name-${index}" value="${card.name}" style="border:none; font-weight:bold; font-size:18px; width:60%; background:none;">
                        <span id="int-${index}" class="interest-badge">$0 Int.</span>
                    </div>
                    <div class="input-row">
                        <div><label>BALANCE</label><input type="number" id="bal-${index}" value="${card.balance || ''}" step="0.01"></div>
                        <div><label>APR %</label><input type="number" id="apr-${index}" value="${card.apr || ''}" step="0.1"></div>
                        <div><label>PAYMENT</label><input type="number" id="pay-${index}" value="${card.payment || ''}" placeholder="Opt."></div>
                    </div>
                    <button class="update-btn" onclick="updateCard(${index})">SAVE CHANGES</button>
                    <div id="msg-${index}" style="font-size:11px; color:#7f8c8d; text-align:right; margin-top:8px;">Ready</div>
                </div>`;
        });
    }

    // 4.
