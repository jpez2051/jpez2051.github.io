<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Debt Destroyer v1.7.8</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #f4f7f6; --card: #ffffff; --primary: #2ecc71; --accent: #3498db; 
            --danger: #ff4757; --text: #2f3542; 
        }
        
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            padding: 10px; padding-bottom: 100px; color: var(--text); overflow-x: hidden; 
        }

        #splash-screen {
            position: fixed; inset: 0; background: #1e272e; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .splash-hidden { opacity: 0; visibility: hidden; }

        .dashboard { 
            background: linear-gradient(135deg, #1e272e, #000); color: white; 
            border-radius: 18px; padding: 15px; margin-bottom: 12px; text-align: center; 
        }
        .main-total { font-size: 32px; font-weight: 800; }
        .prog-bg { width: 100%; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; margin: 8px 0; overflow: hidden; }
        .prog-fill { width: 0%; height: 100%; background: var(--primary); transition: width 0.5s; }

        .card-container { margin-bottom: 12px; perspective: 1000px; position: relative; }
        .card-inner { 
            position: relative; width: 100%; min-height: 200px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; 
        }
        .card-container.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 18px; padding: 15px;
            border: 1px solid #e1e8ed; background: var(--card); box-sizing: border-box; 
        }
        
        .card-back { transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: space-between; }

        .target-tag {
            position: absolute; top: 10px; right: 15px; background: var(--danger); 
            color: white; font-size: 9px; font-weight: 900; padding: 3px 8px; 
            border-radius: 6px; text-transform: uppercase; z-index: 10;
        }

        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
        label { font-size: 8px; font-weight: 800; color: #a4b0be; text-transform: uppercase; margin-bottom: 2px; display: block; }
        input { width: 100%; padding: 8px; border: 1px solid #eceff1; border-radius: 8px; font-size: 12px; background: #fbfcfc; box-sizing: border-box; }
        
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; width: 100%; }
        .paid-btn { background: #ced6e0; color: #2f3542; font-size: 10px; padding: 5px 10px; border-radius: 6px; width: auto; font-weight: 800; }
        .paid-btn.active { background: var(--primary); color: white; }

        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: white; text-align: center; padding: 15px 0; font-size: 10px; border-top: 1px solid #eee; display: flex; justify-content: space-around; z-index: 100; }
        .chart-card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #e1e8ed; height: 160px; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div style="color:white; font-size:40px; font-weight:900; border:4px solid var(--primary); padding:12px; border-radius:18px;">$</div>
</div>

<div class="dashboard">
    <div class="main-total" id="main-debt">$0.00</div>
    <div class="prog-bg"><div id="progress-bar" class="prog-fill"></div></div>
    <div id="main-freedom" style="font-size: 10px; color: var(--primary); font-weight: 800; letter-spacing: 1px;">AVALANCHE MODE</div>
    <div style="display: flex; justify-content: space-around; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
        <div style="text-align: center;"><span id="stat-min" style="font-size: 18px; font-weight: 800;">$0</span><br><span style="font-size: 8px; opacity: 0.6;">MIN DUE</span></div>
        <div style="text-align: center;"><span id="stat-apr" style="font-size: 18px; font-weight: 800;">0%</span><br><span style="font-size: 8px; opacity: 0.6;">AVG APR</span></div>
    </div>
</div>

<div class="chart-card"><canvas id="debtChart"></canvas></div>

<div id="card-list"></div>
<button onclick="addCard()" style="background:#2f3542; color:white; padding:15px; border-radius:12px; width:100%; margin-bottom:20px;">+ ADD NEW CARD</button>

<div class="footer">
    <span onclick="exportCSV()" style="color:var(--accent); font-weight:bold;">Backup CSV</span>
    <span>v1.7.8</span>
    <span onclick="nuke()" style="color:var(--danger)">Reset</span>
</div>

<script>
const KEY = 'debt_v125';
const COLORS = ['#2ecc71', '#3498db', '#9b59b6', '#f1c40f', '#e67e22', '#1abc9c', '#e74c3c'];
let debtChart;
let cards = JSON.parse(localStorage.getItem(KEY)) || [];

function toggleFlip(el) { el.closest('.card-container').classList.toggle('flipped'); }

function initUI() {
    const list = document.getElementById('card-list');
    list.innerHTML = '';
    const now = new Date();
    const curMonthKey = `${now.getMonth()}-${now.getFullYear()}`;

    // Avalanche Sort
    cards.sort((a, b) => (a.bal <= 0) - (b.bal <= 0) || b.apr - a.apr);
    const targetIdx = cards.findIndex(c => c.bal > 0);

    cards.forEach((c, i) => {
        const color = COLORS[i % COLORS.length];
        const isTarget = (i === targetIdx && c.bal > 0);
        const isPaidThisMonth = c.lastPaidMonth === curMonthKey;

        list.innerHTML += `
            <div class="card-container">
                <div class="card-inner">
                    <div class="card-front" onclick="toggleFlip(this)" style="border-left: 6px solid ${color}; opacity: ${c.bal <= 0 ? 0.6 : 1}">
                        ${isTarget ? '<div class="target-tag">Target</div>' : ''}
                        <div style="display:flex; justify-content:space-between; align-items:center;" onclick="event.stopPropagation()">
                            <input type="text" oninput="updateData(${i}, 'name', this.value)" value="${c.name}" style="border:none; font-weight:800; background:none; font-size:16px; width:60%;">
                            <button class="paid-btn ${isPaidThisMonth ? 'active' : ''}" onclick="markPaid(${i})">
                                ${isPaidThisMonth ? 'PAID ✓' : 'MARK PAID'}
                            </button>
                        </div>
                        <div class="input-row" onclick="event.stopPropagation()">
                            <div><label>Balance</label><input type="number" oninput="updateData(${i}, 'bal', this.value)" value="${c.bal}"></div>
                            <div><label>Min $</label><input type="number" oninput="updateData(${i}, 'min', this.value)" value="${c.min}"></div>
                            <div><label>Due Date</label><input type="date" onblur="updateData(${i}, 'due', this.value)" value="${c.due || ''}"></div>
                        </div>
                        <div style="display:flex; gap:8px;" onclick="event.stopPropagation()">
                            <input type="number" id="p-${i}" placeholder="Pay $">
                            <button onclick="applyPayment(${i})">Apply</button>
                        </div>
                    </div>
                    <div class="card-back" onclick="toggleFlip(this)" style="border-left: 6px solid ${color}">
                        <div style="text-align:center; padding:10px;">
                            <label>Card Stats</label>
                            <div style="font-size:22px; font-weight:800; color:${color}">$${(c.bal || 0).toLocaleString()}</div>
                        </div>
                        <div style="padding:15px; background:#f8fafb; border-radius:12px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                                <span style="font-size:10px; font-weight:700; color:#a4b0be;">APR RATE</span>
                                <input type="number" oninput="updateData(${i}, 'apr', this.value)" value="${c.apr}" style="width:60px; text-align:right; font-weight:800; border:none; background:none; padding:0;" onclick="event.stopPropagation()">
                            </div>
                            <div style="font-size:10px; color:#2f3542; font-weight:700;">PAYOFF PRIORITY: ${i + 1}</div>
                        </div>
                        <div style="font-size:9px; text-align:center; color:#a4b0be; margin-top:10px;">Click card to flip</div>
                    </div>
                </div>
            </div>`;
    });
    calculate();
}

function markPaid(i) {
    const now = new Date();
    cards[i].lastPaidMonth = `${now.getMonth()}-${now.getFullYear()}`;
    save();
}

function applyPayment(i) {
    const input = document.getElementById(`p-${i}`);
    const amt = parseFloat(input.value) || 0;
    if (amt > 0) {
        cards[i].bal = Math.max(0, cards[i].bal - amt);
        input.value = '';
        save();
    }
}

function updateData(i, f, v) {
    cards[i][f] = (f === 'name' || f === 'due') ? v : parseFloat(v) || 0;
    save();
}

function save() {
    localStorage.setItem(KEY, JSON.stringify(cards));
    initUI();
}

function calculate() {
    let total = 0, totalMin = 0, aprSum = 0, maxMonths = 0;
    let bData = [], labels = [];

    cards.forEach(c => {
        total += c.bal;
        totalMin += (c.min || 0);
        aprSum += (c.apr || 0);
        if (c.bal > 0) {
            let mRate = (c.apr / 100) / 12;
            let pay = c.min || 1;
            if (pay > (c.bal * mRate)) {
                let m = Math.log(pay / (pay - c.bal * mRate)) / Math.log(1 + mRate);
                if (m > maxMonths) maxMonths = m;
            }
            bData.push(c.bal); labels.push(c.name);
        }
    });

    document.getElementById('main-debt').innerText = '$' + total.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById('stat-min').innerText = '$' + Math.round(totalMin);
    document.getElementById('stat-apr').innerText = cards.length ? Math.round(aprSum / cards.length) + '%' : '0%';
    
    if (maxMonths > 0) {
        let d = new Date(); d.setMonth(d.getMonth() + Math.ceil(maxMonths));
        document.getElementById('main-freedom').innerText = "FREEDOM: " + d.toLocaleDateString('en-US', {month:'short', year:'numeric'}).toUpperCase();
    } else {
        document.getElementById('main-freedom').innerText = total > 0 ? "ADD MIN PAYMENTS" : "DEBT FREE";
    }

    renderChart(labels, bData);
}

function renderChart(labels, data) {
    const ctx = document.getElementById('debtChart');
    if (!ctx) return;
    if (debtChart) debtChart.destroy();
    debtChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: COLORS, borderWidth: 0 }] },
        options: { cutout: '75%', maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function addCard() { cards.push({name: "New Debt", bal: 0, min: 0, apr: 0, due: ""}); save(); }
function nuke() { if(confirm("Clear data?")) { localStorage.clear(); location.reload(); } }
function exportCSV() { 
    let csv = "Name,Balance,Min,APR,Due\n" + cards.map(c => `${c.name},${c.bal},${c.min},${c.apr},${c.due}`).join('\n');
    window.open('data:text/csv;charset=utf-8,' + encodeURI(csv));
}

setTimeout(() => document.getElementById('splash-screen').classList.add('splash-hidden'), 1000);
initUI();
</script>
</body>
</html>
