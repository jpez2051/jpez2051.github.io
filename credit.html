<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Debt Dashboard v1.2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2ecc71; --accent: #3498db; --danger: #e74c3c; --text: #1a1a1a; --gray: #95a5a6; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            padding-bottom: 80px;
            /* CRITICAL: Disables pull-to-refresh bounce */
            overscroll-behavior-y: contain;
            overflow-x: hidden;
        }
        
        /* Dashboard Header */
        .dashboard { 
            background: linear-gradient(135deg, #2c3e50, #000); 
            color: white; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            margin-top: env(safe-area-inset-top); /* Supports Dynamic Island */
        }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-lbl { font-size: 11px; opacity: 0.7; text-transform: uppercase; }
