<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Recovery v2.2.8</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #1e272e; --primary: #2ecc71; --accent: #3498db; --text: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); }
        .dashboard { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main-total { font-size: 32px; font-weight: 800; }
        .card-container { background: #2f3640; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--accent); }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 10px; text-align: center; font-size: 10px; }
        input { background: rgba(0,0,0,0.2); border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; width: 80%; }
        button { background: var(--accent); color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="main-total" id="main-debt">$0.00</div>
    <div style="font-size: 10px; color: var(--primary); margin-top: 5px;">RECOVERY MODE ACTIVE</div>
</div>

<div id="card-list" style="margin-top: 20px; padding-bottom: 60px;"></div>

<div class="footer">
    <span>v2.2.8 (Recovery Build)</span>
</div>

<script>
// We are checking EVERY known key used in previous versions
const CURRENT_KEY = 'debt_v125';
const LEGACY_KEYS = ['debt_v125', 'debt_v124', 'debt_data', 'v1.4.18'];

let cards = [];

function attemptRecovery() {
    console.log("Checking for legacy data...");
    for (let key of LEGACY_KEYS) {
        let foundData = localStorage.getItem(key);
        if (foundData) {
            console.log("Found data in key:", key);
            cards = JSON.parse(foundData);
            // Save it to the current key to bridge the gap
            localStorage.setItem(CURRENT_KEY, JSON.stringify(cards));
            break; 
        }
    }
    renderUI();
}

function renderUI() {
    const list = document.getElementById('card-list');
    list.innerHTML = '';
    let total = 0;

    if (cards.length === 0) {
        list.innerHTML = '<div style="text-align:center; opacity:0.5;">No data found. Try adding a test card.</div>';
    }

    cards.forEach((c, i) => {
        total += (parseFloat(c.bal) || 0);
        list.innerHTML += `
            <div class="card-container">
                <div style="font-weight:bold; margin-bottom:10px;">${c.name}</div>
                <div style="display:flex; justify-content:space-between;">
                    <span>Balance: $${(parseFloat(c.bal) || 0).toLocaleString()}</span>
                    <span>APR: ${c.apr}%</span>
                </div>
            </div>`;
    });

    document.getElementById('main-debt').innerText = '$' + total.toLocaleString();
}

function addCard() {
    cards.push({name: "Test Recovery Card", bal: 100, apr: 0});
    localStorage.setItem(CURRENT_KEY, JSON.stringify(cards));
    renderUI();
}

// RUN RECOVERY IMMEDIATELY
attemptRecovery();
</script>

<div style="position:fixed; bottom: 40px; width: 100%; text-align:center;">
    <button onclick="addCard()">+ ADD TEST CARD</button>
</div>

</body>
</html>
