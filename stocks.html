<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Mobile Terminal v2.4</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --card: #151921; --accent: #00d2ff;
            --text: #e1e1e1; --up: #00ff88; --down: #ff4d4d; --border: #2a2f3a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; min-height: 100vh;
        }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { font-size: 1.2rem; margin: 0; letter-spacing: 1px; }

        /* Mobile Container Stack */
        .grid { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }

        /* Input Form - Optimized for Mobile */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            background: #0b0e14; border: 1px solid var(--border); color: white; 
            padding: 12px; border-radius: 10px; flex: 1; font-size: 16px; /* 16px prevents iOS auto-zoom */
        }
        .btn-add { background: var(--accent); border: none; color: #0b0e14; font-weight: bold; padding: 0 20px; border-radius: 10px; font-size: 0.9rem; }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #707a8a; font-size: 0.7rem; padding-bottom: 8px; text-transform: uppercase; }
        td { padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        .signal-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; }
        .buy { background: rgba(0, 255, 136, 0.1); color: var(--up); }
        .sell { background: rgba(255, 77, 77, 0.1); color: var(--down); }
        .hold { background: rgba(112, 122, 138, 0.1); color: #707a8a; }

        /* Chart Area - Scaled for 14 Pro Max */
        #chart { height: 280px; margin-top: 10px; width: 100%; }
        .advice-box { margin-top: 15px; padding: 12px; border-left: 3px solid var(--accent); background: rgba(0, 210, 255, 0.05); border-radius: 4px; }

        footer { 
            margin-top: auto; padding: 25px 0 10px; 
            display: flex; justify-content: space-between; 
            color: #444; font-size: 0.65rem; font-family: monospace; 
        }
    </style>
</head>
<body>

<header>
    <h2>ALPHA_MOBILE <span style="color:var(--accent); font-weight:200;">[v2.4]</span></h2>
    <div id="clock" style="font-family: monospace; font-size: 0.8rem;"></div>
</header>

<div class="grid">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div>
                <h1 id="active-ticker" style="margin:0; font-size: 2rem;">---</h1>
                <p id="active-info" style="color:#707a8a; margin: 2px 0 0 0; font-size: 0.8rem;">Ready for input</p>
            </div>
            <div id="active-price" style="font-size:1.5rem; font-weight:bold; color:var(--up);">$0.00</div>
        </div>
        <div id="chart"></div>
        <div class="advice-box">
            <p id="logic-text" style="font-size:0.85rem; line-height:1.4; margin:0; color:#aaa;">Add a ticker below to begin analysis.</p>
        </div>
    </div>

    <div class="card">
        <h4 style="margin:0 0 12px 0; color:var(--accent)">Add Holding</h4>
        <div class="input-group">
            <input type="text" id="ticker-in" placeholder="Ticker" autocomplete="off">
            <input type="number" id="shares-in" placeholder="Qty" step="any">
            <button class="btn-add" onclick="addStock()">ADD</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Equity</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="portfolio-list"></tbody>
        </table>
        <div id="total-equity" style="margin-top:15px; font-size:1rem; color:var(--accent); font-weight:bold; text-align: center;"></div>
    </div>
</div>

<footer>
    <div>MOBILE_OPTIMIZED</div>
    <div>v2.4.0-PRO_MAX // 2026</div>
</footer>

<script>
    let portfolio = JSON.parse(localStorage.getItem('alpha_portfolio')) || [];

    // Chart init
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout: { background: { color: '#151921' }, textColor: '#707a8a', fontSize: 10 },
        grid: { vertLines: { color: '#1f242d' }, horzLines: { color: '#1f242d' } },
        timeScale: { borderColor: '#2a2f3a' },
        rightPriceScale: { borderColor: '#2a2f3a' },
        handleScroll: { mouseWheel: true, pressedMouseMove: true },
        handleScale: { pinch: true, mouseWheel: true }
    });
    const areaSeries = chart.addAreaSeries({
        lineColor: '#00d2ff', topColor: 'rgba(0, 210, 255, 0.3)', bottomColor: 'rgba(0, 210, 255, 0)', lineWidth: 2
    });

    function addStock() {
        const t = document.getElementById('ticker-in').value.toUpperCase();
        const s = parseFloat(document.getElementById('shares-in').value);
        if (t && !isNaN(s)) {
            portfolio.push({
                ticker: t, shares: s, 
                price: (Math.random() * 80 + 10).toFixed(2), 
                rsi: Math.floor(Math.random() * 60 + 20)
            });
            saveAndRefresh();
            document.getElementById('ticker-in').value = '';
            document.getElementById('shares-in').value = '';
            updateView(portfolio.length - 1);
        }
    }

    function deleteStock(index, event) {
        event.stopPropagation();
        portfolio.splice(index, 1);
        saveAndRefresh();
        if (portfolio.length === 0) location.reload();
        else updateView(0);
    }

    function saveAndRefresh() {
        localStorage.setItem('alpha_portfolio', JSON.stringify(portfolio));
        renderList();
    }

    function renderList() {
        const tbody = document.getElementById('portfolio-list');
        let total = 0;
        if (portfolio.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; color:#444">Empty Portfolio</td></tr>';
            return;
        }
        tbody.innerHTML = portfolio.map((s, index) => {
            const equity = (s.shares * s.price).toFixed(2);
            total += parseFloat(equity);
            const sig = s.rsi < 35 ? 'buy' : (s.rsi > 65 ? 'sell' : 'hold');
            return `
                <tr onclick="updateView(${index})">
                    <td><strong>${s.ticker}</strong></td>
                    <td>$${equity}</td>
                    <td><span class="signal-badge ${sig}">${sig}</span></td>
                    <td style="text-align:right" onclick="deleteStock(${index}, event)"><span style="color:#444">×</span></td>
                </tr>
            `;
        }).join('');
        document.getElementById('total-equity').innerText = `TOTAL: $${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }

    function updateView(index) {
        if (!portfolio[index]) return;
        const s = portfolio[index];
        document.getElementById('active-ticker').innerText = s.ticker;
        document.getElementById('active-price').innerText = `$${s.price}`;
        document.getElementById('active-info').innerText = `${s.shares.toFixed(2)} units held`;
        
        const sigText = s.rsi < 35 ? `BUY SIGNAL: RSI at ${s.rsi} is oversold.` : (s.rsi > 65 ? `SELL SIGNAL: RSI at ${s.rsi} is overbought.` : `HOLD: Price stable at RSI ${s.rsi}.`);
        document.getElementById('logic-text').innerText = sigText;

        const data = [];
        let p = parseFloat(s.price);
        for(let i=0; i<60; i++) {
            p += (Math.random() - 0.5) * (s.price * 0.04);
            data.push({ time: 1712531200 + (i * 86400), value: p });
        }
        areaSeries.setData(data);
        chart.timeScale().fitContent();
    }

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour12: true });
    }

    setInterval(updateClock, 1000);
    renderList();
    if (portfolio.length > 0) updateView(0);
    updateClock();

    // Auto-resize chart for mobile rotation
    window.addEventListener('resize', () => {
        chart.applyOptions({ width: document.getElementById('chart').offsetWidth });
    });
</script>

</body>
</html>
