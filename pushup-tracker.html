<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pushup Pro</title>

    <style>
        :root {
            --bg: #0b1220;
            --card: #1e293b;
            --muted: #94a3b8;
            --accent: #22c55e;
            --primary: #3b82f6;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }
        h1 { text-align: center; margin-bottom: 20px; font-weight: 800; letter-spacing: -1px; }

        .card {
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group { display: flex; gap: 8px; margin-top: 8px; }
        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            background: var(--accent);
            color: #052e16;
        }

        button.secondary { background: #334155; color: white; }
        button:active { transform: scale(0.96); }

        .row { display: flex; gap: 12px; }
        .stat {
            flex: 1;
            background: #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }
        .stat h2 { margin: 4px 0 0 0; font-size: 28px; color: var(--accent); }

        /* Session Tracker Styles */
        .session-tracker {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--primary);
            text-align: center;
        }
        .sets-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .set-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #334155;
            transition: 0.3s;
        }
        .set-dot.done {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .small { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }

        canvas {
            width: 100%;
            height: 120px;
            background: #0f172a;
            border-radius: 12px;
            margin-top: 10px;
        }

        #plan {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .badge {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .badge.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
            color: white;
        }

        .footer { text-align: center; font-size: 11px; margin-top: 20px; color: var(--muted); }
    </style>
</head>

<body>

<div class="container">
    <h1>💪 Pushup Pro</h1>

    <div id="sessionCard" class="card session-tracker" style="display:none;">
        <div class="small" id="sessionTitle">Current Session</div>
        <h2 id="setsCountdown" style="margin:10px 0;">0 Sets Left</h2>
        <div class="sets-grid" id="setsDots"></div>
        <div id="sessionStatus" class="small" style="color:var(--accent)">Keep going!</div>
    </div>

    <div class="card">
        <div class="small">Log Reps</div>
        <div class="input-group">
            <input id="pushups" type="number" inputmode="numeric" placeholder="Enter reps..." />
            <button onclick="app.addSet()">Add Set</button>
        </div>
    </div>

    <div class="card row">
        <div class="stat">
            <div class="small">Today</div>
            <h2 id="todayTotal">0</h2>
        </div>
        <div class="stat">
            <div class="small">Streak</div>
            <h2 id="streak">0</h2>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="small">Weekly Plan</div>
            <button class="secondary" style="padding:4px 8px; font-size:11px;" onclick="app.nextDay()">Next Day →</button>
        </div>
        <div id="plan"></div>
    </div>

    <div class="card">
        <div class="small">Weekly Volume</div>
        <canvas id="chart"></canvas>
    </div>

    <div class="row">
        <button style="flex:1" class="secondary" onclick="app.enableNotifications()">🔔 Reminders</button>
        <button style="flex:1; background:var(--danger); color:white" onclick="app.resetToday()">Reset Today</button>
    </div>

    <div class="footer">Pushup Pro • <span id="version"></span></div>
</div>

<script>
const APP_VERSION = "v1.5.0";
const STORAGE_KEY = "pushup_pro_session_v1";
const PLAN = [
    { name: "Day 1: 8x8 + max", targetSets: 8 },
    { name: "Day 2: 8x9 + max", targetSets: 8 },
    { name: "Day 3: 9x8 + max", targetSets: 9 },
    { name: "Day 4: Recovery", targetSets: 0 },
    { name: "Day 5: 9x10 + max", targetSets: 9 },
    { name: "Day 6: 12 Sets", targetSets: 12 },
    { name: "Day 7: Max Test", targetSets: 1 }
];

const app = {
    state: {
        days: {},
        streak: 0,
        lastDate: null,
        currentPlanIndex: 0
    },

    init() {
        this.load();
        this.checkStreakReset();
        this.render();
        document.getElementById("version").innerText = APP_VERSION;
    },

    todayKey() { return new Date().toISOString().split("T")[0]; },

    save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); },

    load() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) this.state = {...this.state, ...JSON.parse(saved)};
    },

    setDay(index) {
        this.state.currentPlanIndex = index;
        this.save();
        this.render();
    },

    nextDay() {
        this.state.currentPlanIndex = (this.state.currentPlanIndex + 1) % PLAN.length;
        this.save();
        this.render();
    },

    addSet() {
        const input = document.getElementById("pushups");
        const val = parseInt(input.value);
        if (!val || val <= 0) return;
        
        const t = this.todayKey();
        if (!this.state.days[t]) this.state.days[t] = [];
        this.state.days[t].push(val);
        
        if (this.state.lastDate !== t) this.updateStreakLogic();

        input.value = "";
        this.save();
        this.render();
    },

    updateStreakLogic() {
        const today = new Date(this.todayKey());
        if (this.state.lastDate) {
            const last = new Date(this.state.lastDate);
            const diff = Math.floor((today - last) / 86400000);
            if (diff === 1) this.state.streak++;
            else if (diff > 1) this.state.streak = 1;
        } else { this.state.streak = 1; }
        this.state.lastDate = this.todayKey();
    },

    checkStreakReset() {
        if (!this.state.lastDate) return;
        const diff = Math.floor((new Date(this.todayKey()) - new Date(this.state.lastDate)) / 86400000);
        if (diff > 1) { this.state.streak = 0; this.save(); }
    },

    drawChart() {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const data = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const k = d.toISOString().split("T")[0];
            data.push((this.state.days[k] || []).reduce((a, b) => a + b, 0));
        }
        const max = Math.max(...data, 50);
        data.forEach((v, i) => {
            const h = (v / max) * (canvas.height - 20);
            const x = 10 + i * ((canvas.width - 20) / 7);
            ctx.fillStyle = v > 0 ? "#22c55e" : "#334155";
            ctx.fillRect(x, canvas.height - h, 20, h);
        });
    },

    render() {
        const todaySets = (this.state.days[this.todayKey()] || []).length;
        const currentPlan = PLAN[this.state.currentPlanIndex];
        
        // Update Stats
        document.getElementById("todayTotal").innerText = (this.state.days[this.todayKey()] || []).reduce((a,b)=>a+b,0);
        document.getElementById("streak").innerText = this.state.streak;

        // Session Tracker Logic
        const sessionCard = document.getElementById("sessionCard");
        if (currentPlan.targetSets > 0) {
            sessionCard.style.display = "block";
            const remaining = Math.max(0, currentPlan.targetSets - todaySets);
            document.getElementById("sessionTitle").innerText = currentPlan.name;
            document.getElementById("setsCountdown").innerText = remaining > 0 ? `${remaining} Sets Left` : "Goal Reached!";
            document.getElementById("sessionStatus").innerText = remaining > 0 ? "Keep pushing!" : "Required sets done! Go for MAX! 🔥";
            
            // Draw Dots
            let dotsHtml = "";
            for(let i=0; i<currentPlan.targetSets; i++) {
                dotsHtml += `<div class="set-dot ${i < todaySets ? 'done' : ''}"></div>`;
            }
            document.getElementById("setsDots").innerHTML = dotsHtml;
        } else {
            sessionCard.style.display = "none";
        }

        // Render Plan
        document.getElementById("plan").innerHTML = PLAN.map((p, i) => 
            `<div class="badge ${i === this.state.currentPlanIndex ? 'active' : ''}" onclick="app.setDay(${i})">${p.name}</div>`
        ).join("");

        this.drawChart();
    },

    resetToday() { if(confirm("Reset today?")) { this.state.days[this.todayKey()] = []; this.save(); this.render(); } },
    enableNotifications() { Notification.requestPermission(); }
};

app.init();
</script>

</body>
</html>
