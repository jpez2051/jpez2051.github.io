<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pushup Pro</title>
    <style>
        :root { --bg: #0b1220; --card: #1e293b; --muted: #94a3b8; --accent: #22c55e; --primary: #3b82f6; --danger: #ef4444; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: white; padding: 16px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        h1 { text-align: center; margin-bottom: 20px; font-weight: 800; letter-spacing: -1px; }
        .card { background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 8px; margin-top: 8px; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 14px; border-radius: 10px; font-size: 18px; outline: none; }
        button { padding: 12px 20px; border-radius: 10px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; background: var(--accent); color: #052e16; }
        button.secondary { background: #334155; color: white; }
        .row { display: flex; gap: 12px; }
        .stat { flex: 1; background: #334155; padding: 14px; border-radius: 12px; text-align: center; cursor: pointer; }
        .stat h2 { margin: 4px 0 0 0; font-size: 28px; color: var(--accent); }
        .session-tracker { border: 1px solid var(--primary); text-align: center; }
        .sets-grid { display: flex; justify-content: center; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        .set-dot { width: 14px; height: 14px; border-radius: 50%; background: #334155; }
        .set-dot.done { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .history-list { font-size: 13px; color: var(--muted); margin-top: 10px; min-height: 1.2em; }
        .small { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }
        canvas { width: 100%; height: 100px; background: #0f172a; border-radius: 12px; margin-top: 10px; }
        #plan { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .badge { background: #334155; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; text-align: center; border: 1px solid transparent; }
        .badge.active { background: rgba(59, 130, 246, 0.1); border-color: var(--primary); color: white; }
        .footer { text-align: center; font-size: 11px; margin-top: 20px; color: var(--muted); opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>💪 Pushup Pro</h1>

    <div id="sessionCard" class="card session-tracker">
        <div class="small" id="sessionTitle">Current Session</div>
        <h2 id="setsCountdown" style="margin:8px 0;">0 Sets Left</h2>
        <div class="sets-grid" id="setsDots"></div>
        <div id="history" class="history-list"></div>
        <button style="background:none; color:var(--muted); font-size:10px; border:none; text-decoration:underline; cursor:pointer;" onclick="app.resetCurrentDots()">Clear Day Dots</button>
    </div>

    <div class="card">
        <div class="small">Add Set</div>
        <div class="input-group">
            <input id="pushups" type="number" inputmode="numeric" placeholder="Reps..." />
            <button onclick="app.addSet()">Add</button>
        </div>
        <button style="width:100%; margin-top:8px; background:transparent; color:var(--muted); border:1px solid #334155; font-size:12px; padding:8px;" onclick="app.undo()">↺ Undo Last Set</button>
    </div>

    <div class="card row">
        <div class="stat" onclick="app.editToday()">
            <div class="small">Today Total</div>
            <h2 id="todayTotal">0</h2>
        </div>
        <div class="stat" onclick="app.editStreak()">
            <div class="small">Streak</div>
            <h2 id="streak">0</h2>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="small">Program</div>
            <button class="secondary" style="padding:4px 8px; font-size:11px;" onclick="app.nextDay()">Next Day →</button>
        </div>
        <div id="plan"></div>
    </div>

    <div class="card">
        <div class="small">Weekly Volume</div>
        <canvas id="chart"></canvas>
    </div>

    <div class="footer">Pushup Pro • v2.3 • Independent Days</div>
</div>

<script>
const PLAN = [
    { id: 0, name: "Day 1: 8x8", target: 8 }, { id: 1, name: "Day 2: 8x9", target: 8 },
    { id: 2, name: "Day 3: 9x8", target: 9 }, { id: 3, name: "Day 4: Rest", target: 0 },
    { id: 4, name: "Day 5: 9x10", target: 9 }, { id: 5, name: "Day 6: 12 Sets", target: 12 },
    { id: 6, name: "Day 7: Max Test", target: 1 }
];

const app = {
    state: { 
        days: {}, 
        streak: 0, 
        lastDate: null, 
        planIdx: 0, 
        sessions: {} // Object to store dots for each plan ID: { "0": [8,8], "1": [9] }
    },

    init() {
        const saved = localStorage.getItem("pushup_pro_master");
        if (saved) {
            const parsed = JSON.parse(saved);
            // Compatibility check for old 'session' array
            if (parsed.session && !parsed.sessions) parsed.sessions = {};
            this.state = {...this.state, ...parsed};
        }
        this.render();
    },

    save() { localStorage.setItem("pushup_pro_master", JSON.stringify(this.state)); },

    todayKey() { return new Date().toISOString().split("T")[0]; },

    addSet() {
        const val = parseInt(document.getElementById("pushups").value);
        if (!val || val <= 0) return;
        const t = this.todayKey();
        const pId = PLAN[this.state.planIdx].id;
        
        // 1. Permanent History
        if (!this.state.days[t]) this.state.days[t] = [];
        this.state.days[t].push(val);
        
        // 2. Specific Session Dots
        if (!this.state.sessions[pId]) this.state.sessions[pId] = [];
        this.state.sessions[pId].push(val);
        
        if (this.state.lastDate !== t) {
            this.state.streak++;
            this.state.lastDate = t;
        }
        document.getElementById("pushups").value = "";
        this.save(); this.render();
    },

    undo() {
        const t = this.todayKey();
        const pId = PLAN[this.state.planIdx].id;
        if (this.state.sessions[pId] && this.state.sessions[pId].length > 0) {
            this.state.sessions[pId].pop();
            if (this.state.days[t]) this.state.days[t].pop();
            this.save(); this.render();
        }
    },

    editToday() {
        const t = this.todayKey();
        const current = (this.state.days[t] || []).reduce((a,b)=>a+b,0);
        const val = prompt("Edit Today's Total:", current);
        if (val !== null) {
            this.state.days[t] = [parseInt(val) || 0];
            this.save(); this.render();
        }
    },

    editStreak() {
        const val = prompt("Edit Streak:", this.state.streak);
        if (val !== null) { this.state.streak = parseInt(val) || 0; this.save(); this.render(); }
    },

    resetCurrentDots() {
        const pId = PLAN[this.state.planIdx].id;
        if(confirm("Clear the dots for this specific day?")) {
            this.state.sessions[pId] = [];
            this.save(); this.render();
        }
    },

    nextDay() {
        this.state.planIdx = (this.state.planIdx + 1) % PLAN.length;
        this.save(); this.render();
    },

    setDay(i) { this.state.planIdx = i; this.save(); this.render(); },

    render() {
        const t = this.todayKey();
        const todayReps = (this.state.days[t] || []).reduce((a,b)=>a+b,0);
        const p = PLAN[this.state.planIdx];
        const sessionHistory = this.state.sessions[p.id] || [];

        document.getElementById("todayTotal").innerText = todayReps;
        document.getElementById("streak").innerText = this.state.streak;
        
        const done = sessionHistory.length;
        document.getElementById("sessionCard").style.display = p.target > 0 ? "block" : "none";
        document.getElementById("sessionTitle").innerText = p.name;
        document.getElementById("setsCountdown").innerText = p.target - done > 0 ? `${p.target - done} Sets Left` : "Goal Reached!";
        document.getElementById("history").innerText = done > 0 ? `Sets: ${sessionHistory.join(", ")}` : "No sets recorded";
        
        let dots = "";
        for(let i=0; i<p.target; i++) dots += `<div class="set-dot ${i < done ? 'done' : ''}"></div>`;
        document.getElementById("setsDots").innerHTML = dots;

        document.getElementById("plan").innerHTML = PLAN.map((day, i) => 
            `<div class="badge ${i === this.state.planIdx ? 'active' : ''}" onclick="app.setDay(${i})">${day.name}</div>`
        ).join("");

        this.drawChart();
    },

    drawChart() {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const data = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const k = d.toISOString().split("T")[0];
            data.push((this.state.days[k] || []).reduce((a, b) => a + b, 0));
        }
        const max = Math.max(...data, 50);
        data.forEach((v, i) => {
            const h = (v / max) * (canvas.height - 20);
            const x = 10 + i * ((canvas.width - 20) / 7);
            ctx.fillStyle = v > 0 ? "#22c55e" : "#334155";
            ctx.fillRect(x, canvas.height - h, 20, h);
        });
    }
};
app.init();
</script>
</body>
</html>
