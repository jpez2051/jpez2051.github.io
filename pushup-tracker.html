<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pushup Pro</title>

<style>
:root {
    --bg:#0b1220;
    --card:#1e293b;
    --muted:#94a3b8;
    --accent:#22c55e;
    --danger:#ef4444;
}

body {
    margin:0;
    font-family: system-ui, -apple-system, Arial;
    background:var(--bg);
    color:white;
    padding:16px;
}

h1 { text-align:center; margin-bottom:8px; }

.card {
    background:var(--card);
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

button {
    background:var(--accent);
    font-weight:600;
    cursor:pointer;
}

button:active { transform:scale(0.98); }

.row {
    display:flex;
    gap:10px;
}

.stat {
    flex:1;
    background:#334155;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.small { font-size:12px; color:var(--muted); }

canvas {
    width:100%;
    background:#0f172a;
    border-radius:10px;
}

.badge {
    display:inline-block;
    background:#334155;
    padding:6px 10px;
    margin:4px;
    border-radius:8px;
    font-size:12px;
}

.footer {
    text-align:center;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<h1>💪 Pushup Pro</h1>

<div class="card">
    <div class="small">Add Set</div>
    <input id="pushups" type="number" placeholder="Enter reps..." />
    <button onclick="app.addSet()">Add Set</button>
</div>

<div class="card row">
    <div class="stat">
        Today<br><h2 id="todayTotal">0</h2>
    </div>
    <div class="stat">
        Streak<br><h2 id="streak">0</h2>
    </div>
</div>

<div class="card">
    <div class="small">7-Day Plan</div>
    <div id="plan"></div>
</div>

<div class="card">
    <div class="small">Progress</div>
    <canvas id="chart" height="120"></canvas>
</div>

<div class="card">
    <div class="small">Badges</div>
    <div id="badges"></div>
</div>

<div class="card">
    <button onclick="app.enableNotifications()">🔔 Enable Reminders</button>
</div>

<div class="card">
    <button style="background:var(--danger)" onclick="app.resetToday()">Reset Today</button>
</div>

<div class="footer">
    Pushup Pro Tracker • <span id="version"></span>
</div>

<script>
/* =========================
   APP CORE (Best Practice)
========================= */

const APP_VERSION = "v1.2.0";

const PLAN = [
"Day 1: 8x8 + max",
"Day 2: 8x9 + max",
"Day 3: 9x8 + max",
"Day 4: recovery",
"Day 5: 9x10 + max",
"Day 6: 10–12 sets",
"Day 7: max test"
];

const STORAGE_KEY = "pushup_pro_v1";

const app = {
    state: {
        days: {},
        streak: 0,
        lastDate: null
    },

    init() {
        this.load();
        this.render();
        this.startReminderLoop();
    },

    todayKey() {
        return new Date().toISOString().split("T")[0];
    },

    save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state));
    },

    load() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) this.state = JSON.parse(saved);
    },

    addSet() {
        const input = document.getElementById("pushups");
        const value = parseInt(input.value);

        if (!value || value <= 0) return;

        const t = this.todayKey();
        if (!this.state.days[t]) this.state.days[t] = [];

        this.state.days[t].push(value);
        input.value = "";

        this.updateStreak();
        this.save();
        this.render();
    },

    todayTotal() {
        return (this.state.days[this.todayKey()] || [])
            .reduce((a,b)=>a+b,0);
    },

    updateStreak() {
        const t = this.todayKey();

        if (this.state.lastDate !== t) {
            this.state.streak += 1;
            this.state.lastDate = t;
        }
    },

    resetToday() {
        this.state.days[this.todayKey()] = [];
        this.save();
        this.render();
    },

    badges(total) {
        const list = [];
        if (total >= 50) list.push("🔥 50");
        if (total >= 100) list.push("💪 100");
        if (total >= 250) list.push("🏆 250");
        if (total >= 500) list.push("👑 500");
        return list;
    },

    drawChart() {
        const ctx = document.getElementById("chart").getContext("2d");
        const keys = Object.keys(this.state.days).slice(-7);

        ctx.clearRect(0,0,400,200);

        const vals = keys.map(k =>
            (this.state.days[k] || []).reduce((a,b)=>a+b,0)
        );

        const max = Math.max(...vals, 1);

        vals.forEach((v,i)=>{
            const h = (v/max)*100;
            ctx.fillStyle = "#22c55e";
            ctx.fillRect(i*40, 100-h, 20, h);
        });
    },

    enableNotifications() {
        Notification.requestPermission().then(p=>{
            if (p === "granted") {
                new Notification("Pushup Pro enabled 💪");
            }
        });
    },

    startReminderLoop() {
        setInterval(()=>{
            if (Notification.permission === "granted") {
                new Notification("Time for your next pushup set 💪");
            }
        }, 1000 * 60 * 120);
    },

    render() {
        document.getElementById("todayTotal").innerText = this.todayTotal();
        document.getElementById("streak").innerText = this.state.streak;

        document.getElementById("version").innerText = APP_VERSION;

        document.getElementById("plan").innerHTML =
            PLAN.map(x=>`<div class="badge">${x}</div>`).join("");

        const total = this.todayTotal();
        document.getElementById("badges").innerHTML =
            this.badges(total).map(b=>`<div class="badge">${b}</div>`).join("");

        this.drawChart();
    }
};

/* =========================
   UPDATE DETECTION (simple)
========================= */

function checkVersion() {
    const last = localStorage.getItem("pushup_pro_version");
    if (last && last !== APP_VERSION) {
        alert("New version loaded 💪 Refresh recommended!");
    }
    localStorage.setItem("pushup_pro_version", APP_VERSION);
}

/* =========================
   START APP
========================= */

checkVersion();
app.init();
</script>

</body>
</html>
