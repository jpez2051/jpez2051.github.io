<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pushup Pro</title>

    <style>
        :root {
            --bg: #0b1220;
            --card: #1e293b;
            --muted: #94a3b8;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }
        h1 { text-align: center; margin-bottom: 20px; font-weight: 800; letter-spacing: -1px; }

        .card {
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group { display: flex; gap: 8px; margin-top: 8px; }
        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--accent);
            color: #052e16;
        }

        button.secondary { background: #334155; color: white; }
        button:active { transform: scale(0.96); }

        .row { display: flex; gap: 12px; }
        .stat {
            flex: 1;
            background: #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }
        .stat h2 { margin: 4px 0 0 0; font-size: 28px; color: var(--accent); }

        .small { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }

        canvas {
            width: 100%;
            height: 120px;
            background: #0f172a;
            border-radius: 12px;
            margin-top: 10px;
        }

        #plan {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .badge {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            border: 2px solid transparent;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .badge.active {
            background: rgba(34, 197, 94, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        #badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .unlocked-badge {
            background: #475569;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            margin-top: 20px;
            color: var(--muted);
        }

        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>💪 Pushup Pro</h1>

    <div class="card">
        <div class="small">Add New Set</div>
        <div class="input-group">
            <input id="pushups" type="number" inputmode="numeric" placeholder="Reps..." />
            <button onclick="app.addSet()">Add</button>
        </div>
    </div>

    <div class="card row">
        <div class="stat">
            <div class="small">Today</div>
            <h2 id="todayTotal">0</h2>
        </div>
        <div class="stat">
            <div class="small">Streak</div>
            <h2 id="streak">0</h2>
        </div>
    </div>

    <div class="card">
        <div class="plan-header">
            <div class="small">Current Program</div>
            <button class="secondary" style="padding: 4px 10px; font-size: 12px;" onclick="app.nextDay()">Next Day →</button>
        </div>
        <div id="plan"></div>
    </div>

    <div class="card">
        <div class="small">Last 7 Days</div>
        <canvas id="chart"></canvas>
    </div>

    <div class="card">
        <div class="small">Milestones</div>
        <div id="badges"></div>
    </div>

    <div class="row">
        <button style="flex:2;" class="secondary" onclick="app.enableNotifications()">🔔 Reminders</button>
        <button style="flex:1; background:var(--danger); color:white;" onclick="app.resetToday()">Reset</button>
    </div>

    <div class="footer">
        Pushup Pro Tracker • <span id="version"></span>
    </div>
</div>
