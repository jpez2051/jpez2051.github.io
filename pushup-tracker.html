<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pushup Pro</title>

    <style>
        :root {
            --bg: #0b1220;
            --card: #1e293b;
            --muted: #94a3b8;
            --accent: #22c55e;
            --primary: #3b82f6;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }
        h1 { text-align: center; margin-bottom: 20px; font-weight: 800; letter-spacing: -1px; }

        .card {
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-group { display: flex; gap: 8px; margin-top: 8px; }
        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 18px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: var(--accent);
            color: #052e16;
        }

        button.secondary { background: #334155; color: white; }
        button.undo { background: transparent; color: var(--muted); border: 1px solid #334155; padding: 8px; font-size: 12px; margin-top: 8px; width: 100%; }

        .row { display: flex; gap: 12px; }
        .stat {
            flex: 1;
            background: #334155;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }
        .stat h2 { margin: 4px 0 0 0; font-size: 28px; color: var(--accent); }

        .session-tracker { border: 1px solid var(--primary); text-align: center; }
        .sets-grid { display: flex; justify-content: center; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        .set-dot { width: 14px; height: 14px; border-radius: 50%; background: #334155; }
        .set-dot.done { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .history-list { font-size: 13px; color: var(--muted); margin-top: 10px; }

        .small { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }

        canvas { width: 100%; height: 100px; background: #0f172a; border-radius: 12px; margin-top: 10px; }

        #plan { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .badge { background: #334155; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; text-align: center; }
        .badge.active { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--primary); color: white; }

        .footer { text-align: center; font-size: 11px; margin-top: 20px; color: var(--muted); opacity: 0.5; }
    </style>
</head>

<body>

<div class="container">
    <h1>💪 Pushup Pro</h1>

    <div id="sessionCard" class="card session-tracker" style="display:none;">
        <div class="small" id="sessionTitle">Current Session</div>
        <h2 id="setsCountdown" style="margin:8px 0;">0 Sets Left</h2>
        <div class="sets-grid" id="setsDots"></div>
        <div id="history" class="history-list"></div>
    </div>

    <div class="card">
        <div class="small">Add Set</div>
        <div class="input-group">
            <input id="pushups" type="number" inputmode="numeric" placeholder="Reps..." />
            <button onclick="app.addSet()">Add</button>
        </div>
        <button class="undo" onclick="app.undoLast()">↺ Undo Last Set</button>
    </div>

    <div class="card row">
        <div class="stat">
            <div class="small">Today</div>
            <h2 id="todayTotal">0</h2>
        </div>
        <div class="stat">
            <div class="small">Streak</div>
            <h2 id="streak">0</h2>
        </div>
    </div>

    <div class="card">
        <div class="small">Program Plan</div>
        <div id="plan"></div>
    </div>

    <div class="card">
        <div class="small">Weekly Volume</div>
        <canvas id="chart"></canvas>
    </div>

    <div class="footer">Pushup Pro • Reverted Version • <span id="version"></span></div>
</div>
