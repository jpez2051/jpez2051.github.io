<!DOCTYPE html>
<html lang="haw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>‘Ōlelo Hiwa v1.2.0</title>
    <style>
        :root {
            --primary: #c0392b; --gold: #f1c40f; --bg: #0f1418;
            --card-bg: #1c252c; --text: #f5f6fa; --link: #3498db;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); margin: 0; padding: 15px; color: var(--text);
            overflow-x: hidden; padding-bottom: 100px;
        }

        #splash {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .splash-hidden { opacity: 0; pointer-events: none; }

        header { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 18px; color: var(--primary); letter-spacing: 1px; }
        
        /* Research Tray */
        .tray { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tray-btn { 
            background: #2f3942; color: var(--gold); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 15px; border-radius: 20px; font-size: 10px; font-weight: 800; white-space: nowrap; text-decoration: none;
        }

        /* SRS Card Engine */
        .card {
            background: var(--card-bg); border-radius: 24px; padding: 30px 20px;
            min-height: 280px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); margin-bottom: 15px;
        }
        .haw-word { font-size: 36px; font-weight: 800; margin-bottom: 10px; }
        .eng-word { font-size: 18px; color: #a4b0be; }
        .mana-o { margin-top: 20px; font-size: 13px; line-height: 1.5; color: #ced6e0; display: none; }
        .revealed .mana-o { display: block; }

        /* SRS Difficulty Buttons */
        .srs-btns { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; width: 100%; }
        .revealed .srs-btns { display: grid; }
        .srs-btn { font-size: 10px; padding: 10px; border-radius: 10px; border: none; font-weight: 800; color: white; }
        .easy { background: #27ae60; } .mid { background: #f39c12; } .hard { background: #e74c3c; }

        .main-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        button { background: #2f3942; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 14px; }
        .btn-next { background: var(--primary); grid-column: span 2; margin-top: 10px; }

        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40px;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 700; color: #57606f; border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="splash">
    <div style="font-size:40px; color:var(--primary); font-weight:900;">‘O</div>
</div>

<header>
    <h1>‘ŌLELO HIWA</h1>
    <div style="font-size: 10px; color: var(--gold);">4,000 FT CAMPUS</div>
</header>

<div class="tray">
    <a href="https://wehewehe.org" target="_blank" class="tray-btn">📖 WEHEWEHE (DICT)</a>
    <a href="https://ulukau.org" target="_blank" class="tray-btn">🏛️ ULUKAU (ARCHIVE)</a>
    <a href="https://www.youtube.com/results?search_query=kulaiwi+hawaiian" target="_blank" class="tray-btn">📺 KULĀIWI (LESSONS)</a>
</div>

<div class="card" id="mainCard" onclick="this.classList.toggle('revealed')">
    <div id="cat" style="font-size:9px; color:var(--gold); font-weight:800; margin-bottom:10px;">...</div>
    <div class="haw-word" id="haw">...</div>
    <div class="eng-word" id="eng">...</div>
    <div class="mana-o" id="note">...</div>
    
    <div class="srs-btns" onclick="event.stopPropagation()">
        <button class="srs-btn hard" onclick="next('hard')">HARD</button>
        <button class="srs-btn mid" onclick="next('mid')">MID</button>
        <button class="srs-btn easy" onclick="next('easy')">EASY</button>
    </div>
</div>

<div class="main-controls">
    <button onclick="speak()">HELUHELU (READ)</button>
    <button onclick="save()">MĀLAMA (SAVE)</button>
    <button class="btn-next" onclick="next()">HULI (NEXT WORD)</button>
</div>

<div id="log" style="margin-top: 20px; font-size: 12px; color: #747d8c;"></div>

<div class="footer">
    ‘ŌLELO HIWA — VERSION 1.2.0 — RESEARCH & SRS ENGINE
</div>

<script>
    const dictionary = [
        {h: "‘Io", e: "Hawaiian Hawk", c: "NA MANU", m: "The endemic hawk. Symbol of royalty and clear vision."},
        {h: "‘Ōhi‘a Lehua", e: "Native Tree", c: "NA LĀ‘AU", m: "Sacred tree of Pele. The foundation of the native ecosystem."},
        {h: "Mauka", e: "Mountainward", c: "WAIHO‘INA", m: "A critical direction on the islands. Towards the mountain peak."},
        {h: "Mālama", e: "To Care For", c: "PILI", m: "To preserve, protect, or maintain. A core cultural value."},
        {h: "Kuleana", e: "Responsibility", c: "PILI", m: "A privilege that carries a weight of duty."},
        {h: "Ua Kanilehua", e: "Lehua-Rustling Rain", c: "ANILA‘I", m: "Famous rain of Hilo that makes a unique sound on the lehua leaves."},
        {h: "Aia I Hea...", e: "Where is...", c: "HA‘INA", m: "Common phrase starter for locating objects or people."}
    ];

    let current = {};

    function next(difficulty) {
        // SRS Logic simulation: If 'easy', we could pop it from the current session array
        const card = document.getElementById('mainCard');
        card.classList.remove('revealed');
        
        setTimeout(() => {
            current = dictionary[Math.floor(Math.random() * dictionary.length)];
            document.getElementById('haw').innerText = current.h;
            document.getElementById('eng').innerText = current.e;
            document.getElementById('cat').innerText = current.c;
            document.getElementById('note').innerText = current.m;
        }, 200);
    }

    function speak() {
        const msg = new SpeechSynthesisUtterance(current.h);
        msg.rate = 0.6;
        window.speechSynthesis.speak(msg);
    }

    function save() {
        const log = document.getElementById('log');
        log.innerHTML = `<div style="padding:10px; background:rgba(255,255,255,0.03); border-radius:10px; margin-bottom:5px;">⭐ Saved: ${current.h}</div>` + log.innerHTML;
    }

    setTimeout(() => document.getElementById('splash').classList.add('splash-hidden'), 1000);
    next();
</script>

</body>
</html>
