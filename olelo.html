<!DOCTYPE html>
<html lang="haw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>‘Ōlelo Hiwa v1.4.0</title>
    <style>
        :root { --primary: #e74c3c; --gold: #f1c40f; --bg: #0a0e12; --card: #1c252c; --text: #f5f6fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 70px; }
        
        /* Header & Tray */
        header { text-align: center; padding: 10px; border-bottom: 1px solid #2c3e50; }
        .tray { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; }
        .tray-btn { background: #2f3942; color: var(--gold); padding: 8px 12px; border-radius: 15px; font-size: 10px; text-decoration: none; font-weight: 800; white-space: nowrap; border: 1px solid rgba(255,255,255,0.1); }

        /* The Learning Card */
        .card { background: var(--card); border-radius: 25px; padding: 30px 20px; min-height: 280px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .haw-display { font-size: 40px; font-weight: 800; margin-bottom: 5px; }
        .syllables { color: var(--gold); letter-spacing: 3px; font-size: 14px; margin-bottom: 15px; text-transform: uppercase; }
        .eng-display { font-size: 18px; color: #a4b0be; margin-bottom: 20px; font-style: italic; }
        
        .mana-o { font-size: 13px; line-height: 1.6; color: #ced6e0; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; text-align: left; display: none; }
        .revealed .mana-o { display: block; }

        /* New Audio Strategy */
        .audio-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { background: #34495e; border: none; color: white; padding: 15px; border-radius: 12px; font-weight: 700; font-size: 13px; }
        .btn-ref { background: var(--primary); grid-column: span 2; margin-top: 5px; }
        
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 45px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #57606f; font-weight: 700; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 18px; letter-spacing: 2px;">‘ŌLELO HIWA</h1>
</header>

<div class="tray">
    <a href="https://wehewehe.org" target="_blank" class="tray-btn">📙 DICTIONARY</a>
    <a href="https://oleloonline.com/tag/audio-2/" target="_blank" class="tray-btn">🔊 NATIVE AUDIO</a>
    <a href="https://ulukau.org" target="_blank" class="tray-btn">🏛️ ARCHIVES</a>
</div>

<div class="card" id="card" onclick="this.classList.toggle('revealed')">
    <div id="cat" style="font-size:9px; color:var(--gold); font-weight:800; margin-bottom:10px;">...</div>
    <div class="haw-display" id="haw">...</div>
    <div class="syllables" id="syl">...</div>
    <div class="eng-display" id="eng">...</div>
    <div class="mana-o" id="note">...</div>
</div>

<div class="audio-controls">
    <button class="btn" onclick="event.stopPropagation(); next()">HULI (NEXT)</button>
    <button class="btn" onclick="event.stopPropagation(); save()">MĀLAMA (SAVE)</button>
    <a id="audio-ref" href="#" target="_blank" class="btn btn-ref" style="text-align: center; line-height: 1;">HEAR NATIVE PRONUNCIATION</a>
</div>

<div class="footer">‘ŌLELO HIWA — v1.4.0 — HAKALAMA & NATIVE REFERENCE</div>

<script>
    const dictionary = [
        {h: "‘Ōhi‘a Lehua", s: "‘Ō-hi-‘a Le-hu-a", e: "Endemic Canopy Tree", c: "LĀ‘AU", m: "Break it down: 'Ō (long) - hi (short) - 'a (stop). The 'a' is a crisp breath at the back of the throat.", ref: "https://wehewehe.org/gsdl2.85/cgi-bin/optsid?a=d&d=d14603"},
        {h: "‘Io", s: "‘I-o", e: "Hawaiian Hawk", c: "MANU", m: "Two clear sounds. The 'I' is like the 'ee' in 'see'. The 'o' is like 'oh'. Don't blend them; let the 'okina separate them.", ref: "https://wehewehe.org/gsdl2.85/cgi-bin/optsid?a=d&d=d4957"},
        {h: "Kama‘āina", s: "Ka-ma-‘āi-na", e: "Child of the Land", c: "PILI", m: "The 'āi' is a diphthong. It sounds like 'eye' but elongated because of the kahakō over the 'ā'.", ref: "https://wehewehe.org/gsdl2.85/cgi-bin/optsid?a=d&d=d6538"},
        {h: "Mālama", s: "Mā-la-ma", e: "To Care For", c: "PILI", m: "Mā (long) - la (short) - ma (short). Hold that first 'Mā' for two beats. It changes the word from 'light' to 'care'.", ref: "https://wehewehe.org/gsdl2.85/cgi-bin/optsid?a=d&d=d11743"}
    ];

    function next() {
        document.getElementById('card').classList.remove('revealed');
        const item = dictionary[Math.floor(Math.random() * dictionary.length)];
        document.getElementById('haw').innerText = item.h;
        document.getElementById('syl').innerText = item.s;
        document.getElementById('eng').innerText = item.e;
        document.getElementById('cat').innerText = item.c;
        document.getElementById('note').innerText = item.m;
        document.getElementById('audio-ref').href = item.ref;
    }

    function save() { alert("Saved to your personal collection!"); }

    next();
</script>

</body>
</html>
