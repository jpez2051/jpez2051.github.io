<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Kitten Feeding Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:linear-gradient(135deg,#fef3e8 0%,#fde8d8 50%,#fce4d6 100%);font-family:Georgia,serif;}

  /* Login */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  #login-card{background:#fff;border-radius:24px;padding:40px 32px;max-width:340px;width:100%;text-align:center;box-shadow:0 4px 32px rgba(193,90,53,.15);border:1px solid #fde8d8;}
  #login-card .logo{font-size:48px;margin-bottom:12px;}
  #login-card h1{color:#7a3520;font-size:24px;margin-bottom:6px;}
  #login-card p{color:#a0522d;font-size:14px;margin-bottom:28px;}
  #google-signin-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 16px;border:2px solid #fde8d8;border-radius:12px;background:#fff;cursor:pointer;font-family:Georgia,serif;font-size:15px;color:#7a3520;}
  #google-signin-btn img{width:20px;height:20px;}
  #login-error{margin-top:12px;color:#e65100;font-size:13px;display:none;}

  #app-screen{display:none;}

  /* Header */
  header{background:linear-gradient(135deg,#d4704a,#c15a35);padding:16px 16px 0;box-shadow:0 4px 20px rgba(193,90,53,.3);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .header-top h1{color:#fff;font-size:20px;letter-spacing:.5px;}
  .header-top .version{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}
  .header-btns{display:flex;gap:8px;align-items:center;}
  .header-btns button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;padding:6px 11px;font-size:12px;cursor:pointer;font-family:Georgia,serif;}
  .header-btns button:hover{background:rgba(255,255,255,.25);}
  #user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.5);cursor:pointer;object-fit:cover;}

  /* Kitten banner */
  #kitten-banner{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;align-items:flex-end;scrollbar-width:none;}
  #kitten-banner::-webkit-scrollbar{display:none;}
  .kitten-card{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px 10px;border-radius:12px 12px 0 0;transition:background .15s;}
  .kitten-card.active{background:rgba(255,255,255,.2);}
  .kitten-card:hover:not(.active){background:rgba(255,255,255,.1);}
  .kitten-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.4);}
  .kitten-avatar-placeholder{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);border:3px dashed rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:22px;}
  .kitten-card-name{font-size:11px;color:#fff;font-weight:bold;white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis;}
  .kitten-card.active .kitten-card-name{color:#ffe0d0;}
  #add-kitten-btn{flex-shrink:0;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);border:3px dashed rgba(255,255,255,.5);color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}

  /* Tabs */
  #tabs{display:flex;overflow-x:auto;background:#c15a35;padding:0 12px;gap:4px;align-items:flex-end;}
  .tab-btn{padding:10px 14px;border:none;border-radius:8px 8px 0 0;background:transparent;color:#ffddd0;font-family:Georgia,serif;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;position:relative;}
  .tab-btn.active{background:#fef3e8;color:#c15a35;font-weight:bold;}
  #add-day-wrap{display:flex;align-items:center;padding:6px 8px;flex-shrink:0;}
  #add-day-btn{background:#ffddd0;color:#c15a35;border:none;border-radius:6px;padding:6px 12px;font-weight:bold;cursor:pointer;font-size:13px;}

  /* Main */
  #main{padding:20px 16px;max-width:480px;margin:0 auto;}
  .card{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:16px;box-shadow:0 2px 16px rgba(193,90,53,.1);border:1px solid #fde8d8;}
  .card-title{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .card-title h2{font-size:16px;color:#7a3520;font-weight:bold;}

  /* Profile */
  #profile-card{display:flex;gap:16px;align-items:flex-start;}
  #photo-wrap{flex-shrink:0;position:relative;width:80px;height:80px;cursor:pointer;}
  #photo-wrap img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #f4b896;}
  #photo-placeholder{width:80px;height:80px;border-radius:50%;background:#fef3e8;border:3px dashed #f4b896;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;color:#c15a35;}
  #photo-placeholder span{font-size:10px;color:#a0522d;margin-top:2px;}
  #photo-edit-badge{position:absolute;bottom:2px;right:2px;background:#c15a35;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;}
  #photo-input{display:none;}
  #profile-fields{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;}
  #profile-fields label{font-size:11px;color:#a0522d;text-transform:uppercase;letter-spacing:.5px;}
  #kitten-name-input{display:block;width:100%;border:none;border-bottom:2px solid #fde8d8;background:transparent;font-family:Georgia,serif;font-size:20px;font-weight:bold;color:#7a3520;outline:none;padding:4px 0;}
  #kitten-name-input::placeholder{color:#d4a898;font-weight:normal;}
  .profile-row{display:flex;flex-direction:column;gap:3px;}
  .profile-input{width:100%;border:none;border-bottom:2px solid #fde8d8;background:transparent;font-family:Georgia,serif;font-size:14px;color:#7a3520;outline:none;padding:4px 0;}
  #age-display{font-size:12px;color:#c15a35;margin-top:2px;min-height:16px;}

  /* Weight */
  #weight-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
  #weight-row label{display:block;font-size:11px;color:#a0522d;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
  #weight-input{width:100%;border:2px solid #fde8d8;border-radius:10px;padding:10px 12px;font-size:18px;font-family:Georgia,serif;color:#7a3520;background:#fffaf8;outline:none;}
  #goal-box{background:#fef3e8;border-radius:10px;padding:10px 16px;text-align:center;min-width:110px;flex-shrink:0;}
  #goal-box .label{font-size:11px;color:#a0522d;text-transform:uppercase;letter-spacing:.5px;}
  #goal-box .value{font-size:22px;font-weight:bold;color:#c15a35;}
  #goal-box .sublabel{font-size:10px;color:#a0522d;margin-top:2px;}
  #weight-status{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:14px;font-weight:bold;display:none;align-items:center;gap:8px;}
  #weight-status.good{background:#e8f5e9;color:#2e7d32;display:flex;}
  #weight-status.warn{background:#fff3e0;color:#e65100;display:flex;}

  /* Feedings */
  #feedings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  #feedings-header .left{display:flex;align-items:center;gap:8px;}
  #feedings-header h2{font-size:16px;color:#7a3520;}
  #feed-count{background:#fef3e8;border-radius:20px;padding:4px 12px;font-size:12px;color:#c15a35;font-weight:bold;}
