<!-- Version: 4.1.3 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Kitten Feeding Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
  body{min-height:100vh;background:linear-gradient(135deg,#fef3e8 0%,#fde8d8 50%,#fce4d6 100%);font-family:Georgia,serif;}

  /* Login */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  #login-card{background:#fff;border-radius:24px;padding:40px 32px;max-width:340px;width:100%;text-align:center;box-shadow:0 4px 32px rgba(193,90,53,.15);border:1px solid #fde8d8;}
  #login-card .logo{font-size:48px;margin-bottom:12px;}
  #login-card h1{color:#7a3520;font-size:24px;margin-bottom:6px;}
  #login-card p{color:#a0522d;font-size:14px;margin-bottom:28px;}
  #google-signin-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 16px;border:2px solid #fde8d8;border-radius:12px;background:#fff;cursor:pointer;font-family:Georgia,serif;font-size:15px;color:#7a3520;}
  #google-signin-btn img{width:20px;height:20px;}
  #login-error{margin-top:12px;color:#e65100;font-size:13px;display:none;}

  #app-screen{display:none;}

  /* Header */
  header{background:linear-gradient(135deg,#d4704a,#c15a35);padding:16px 16px 0;box-shadow:0 4px 20px rgba(193,90,53,.3);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .header-top h1{color:#fff;font-size:20px;letter-spacing:.5px;}
  .header-top .version{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}
  .header-btns{display:flex;gap:8px;align-items:center;}
  .header-btns button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;padding:6px 11px;font-size:12px;cursor:pointer;font-family:Georgia,serif;}
  #user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.5);cursor:pointer;object-fit:cover;}

  /* Kitten banner */
  #kitten-banner{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;align-items:flex-end;scrollbar-width:none;}
  #kitten-banner::-webkit-scrollbar{display:none;}
  .kitten-card{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px 10px;border-radius:12px 12px 0 0;transition:background .15s;}
  .kitten-card.active{background:rgba(255,255,255,.2);}
  .kitten-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.4);}
  .kitten-avatar-placeholder{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);border:3px dashed rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:22px;}
  .kitten-card-name{font-size:11px;color:#fff;font-weight:bold;white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis;}
  #add-kitten-btn{flex-shrink:0;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);border:3px dashed rgba(255,255,255,.5);color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}

  /* Tabs */
  #tabs{display:flex;overflow-x:auto;background:#c15a35;padding:0 12px;gap:4px;align-items:flex-end;}
  .tab-btn{padding:10px 14px;border:none;border-radius:8px 8px 0 0;background:transparent;color:#ffddd0;font-family:Georgia,serif;font-size:13px;cursor:pointer;white-space:nowrap;}
  .tab-btn.active{background:#fef3e8;color:#c15a35;font-weight:bold;}
  #add-day-wrap{display:flex;align-items:center;padding:6px 8px;flex-shrink:0;}
  #add-day-btn{background:#ffddd0;color:#c15a35;border:none;border-radius:6px;padding:6px 12px;font-weight:bold;cursor:pointer;font-size:13px;}

  /* Main */
  #main{padding:20px 16px;max-width:480px;margin:0 auto;}
  .card{background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:16px;box-shadow:0 2px 16px rgba(193,90,53,.1);border:1px solid #fde8d8;}
  .card-title{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .card-title h2{font-size:16px;color:#7a3520;font-weight:bold;}

  /* Profile */
  #profile-card{display:flex;gap:16px;align-items:flex-start;}
  #photo-wrap{flex-shrink:0;position:relative;width:80px;height:80px;cursor:pointer;}
  #photo-wrap img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #f4b896;}
  #photo-placeholder{width:80px;height:80px;border-radius:50%;background:#fef3e8;border:3px dashed #f4b896;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;color:#c15a35;}
  #photo-placeholder span{font-size:10px;color:#a0522d;margin-top:2px;}
  #photo-edit-badge{position:absolute;bottom:2px;right:2px;background:#c15a35;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;}
  #photo-input{display:none;}
  #profile-fields{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px;}
  #profile-fields label{font-size:11px;color:#a0522d;text-transform:uppercase;letter-spacing:.5px;}
  #kitten-name-input{display:block;width:100%;border:none;border-bottom:2px solid #fde8d8;background:transparent;font-family:Georgia,serif;font-size:20px;font-weight:bold;color:#7a3520;outline:none;padding:4px 0;}
  .profile-input{width:100%;border:none;border-bottom:2px solid #fde8d8;background:transparent;font-family:Georgia,serif;font-size:14px;color:#7a3520;outline:none;padding:4px 0;}
  #age-display{font-size:12px;color:#c15a35;margin-top:2px;min-height:16px;}

  /* Weight */
  #weight-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}
  #weight-input{width:100%;border:2px solid #fde8d8;border-radius:10px;padding:10px 12px;font-size:18px;font-family:Georgia,serif;color:#7a3520;background:#fffaf8;outline:none;}
  #goal-box{background:#fef3e8;border-radius:10px;padding:10px 16px;text-align:center;min-width:110px;flex-shrink:0;}
  #goal-box .label{font-size:11px;color:#a0522d;text-transform:uppercase;letter-spacing:.5px;}
  #goal-box .value{font-size:22px;font-weight:bold;color:#c15a35;}
  #weight-status{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:14px;font-weight:bold;display:none;align-items:center;gap:8px;}

  /* Feedings */
  #feedings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  #feed-count{background:#fef3e8;border-radius:20px;padding:4px 12px;font-size:12px;color:#c15a35;font-weight:bold;}
  .feeding-row{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-radius:12px;background:#fffaf8;border:2px solid #fde8d8;margin-bottom:10px;}
  .feeding-row.done{background:#fef3e8;border-color:#f4b896;}
  .feeding-time{width:70px;flex-shrink:0;font-size:12px;font-weight:bold;color:#c15a35;padding-top:2px;}
  .feeding-input{flex:1;border:none;background:transparent;font-size:13px;font-family:Georgia,serif;color:#7a3520;outline:none;width:100%;resize:none;overflow:hidden;}
  
  /* Crop modal */
  #crop-modal{display:none;position:fixed;inset:0;background:#000;z-index:999;flex-direction:column;touch-action:none;}
  #crop-modal.show{display:flex;}
  #crop-header{padding:16px;color:#fff;font-family:Georgia,serif;font-size:14px;text-align:center;background:rgba(0,0,0,.6);}
  #crop-viewport{flex:1;position:relative;display:flex;align-items:center;justify-content:center;}
  #crop-canvas{touch-action:none;max-width:100%;max-height:100%;}
  #crop-footer{display:flex;gap:12px;padding:16px;background:rgba(0,0,0,.6);}
  #crop-footer button{flex:1;padding:12px;border-radius:10px;border:none;font-weight:bold;cursor:pointer;}
  #crop-confirm-btn{background:#c15a35;color:#fff;}

  /* Modals */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:100;}
  .modal-box{background:#fff;border-radius:18px;padding:28px;max-width:340px;width:90%;text-align:center;}
  .btn-row{display:flex;gap:10px;margin-top:20px;}
  .btn-row button{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;}
  .modal-input{width:100%;border:2px solid #fde8d8;padding:10px;border-radius:10px;margin-bottom:10px;}
</style>
</head>
<body>

<div id="loading-overlay" style="position:fixed;inset:0;background:#fff;z-index:2000;display:flex;align-items:center;justify-content:center;">Loading...</div>

<div id="app-screen">
  <header>
    <div class="header-top"><h1>🍼 Kitten Tracker</h1></div>
    <div id="kitten-banner"><button id="add-kitten-btn">+</button></div>
  </header>
  <div id="tabs"></div>
  <div id="main">
    <div id="profile-card" class="card">
      <div id="photo-wrap">
        <div id="photo-placeholder">🐱</div>
        <img id="photo-img" style="display:none"/>
        <input type="file" id="photo-input" accept="image/*"/>
      </div>
      <div id="profile-fields">
        <input type="text" id="kitten-name-input" placeholder="Kitten Name"/>
        <input type="date" id="kitten-dob-input" class="profile-input"/>
        <div id="age-display"></div>
      </div>
    </div>
    <div class="card">
        <div id="feedings-header"><h2>Feedings</h2><div id="feed-count">0/5</div></div>
        <div id="feedings-list"></div>
    </div>
  </div>
</div>

<div id="crop-modal">
  <div id="crop-header">Pinch to zoom, Drag to crop</div>
  <div id="crop-viewport"><canvas id="crop-canvas"></canvas></div>
  <div id="crop-footer">
    <button id="crop-cancel-btn">Cancel</button>
    <button id="crop-confirm-btn">Use Crop</button>
  </div>
</div>

<script type="module">
// Basic App logic with improved Crop logic
let cropCallback = null;
let cropState = { img:null, scale:1, panX:0, panY:0, selX:0, selY:0, selW:0, selH:0, dragging:false };
const canvas = document.getElementById("crop-canvas");
const ctx = canvas.getContext("2d");

function draw() {
    const {img, scale, panX, panY, selX, selY, selW, selH} = cropState;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.drawImage(img, panX, panY, img.width*scale, img.height*scale);
    
    // Draw semi-transparent overlay
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.clearRect(selX, selY, selW, selH);
    ctx.drawImage(img, panX, panY, img.width*scale, img.height*scale);
    ctx.strokeRect(selX, selY, selW, selH);
    requestAnimationFrame(draw);
}

function openCropper(src, cb) {
    cropCallback = cb;
    const img = new Image();
    img.onload = () => {
        document.getElementById("crop-modal").classList.add("show");
        const vp = document.getElementById("crop-viewport");
        canvas.width = vp.clientWidth;
        canvas.height = vp.clientHeight;
        const scale = Math.min(canvas.width/img.width, canvas.height/img.height);
        cropState = { img, scale, panX:(canvas.width-img.width*scale)/2, panY:(canvas.height-img.height*scale)/2, selX:50, selY:50, selW:200, selH:200, dragging:false };
        draw();
    };
    img.src = src;
}

canvas.addEventListener("touchstart", e => {
    cropState.dragging = true;
});

canvas.addEventListener("touchmove", e => {
    if(!cropState.dragging) return;
    e.preventDefault();
    // Simplified: move viewport pan on drag
    cropState.panX += e.touches[0].clientX - (cropState.lastX || e.touches[0].clientX);
    cropState.panY += e.touches[0].clientY - (cropState.lastY || e.touches[0].clientY);
    cropState.lastX = e.touches[0].clientX;
    cropState.lastY = e.touches[0].clientY;
}, {passive:false});

canvas.addEventListener("touchend", () => {
    cropState.dragging = false;
    cropState.lastX = null;
    cropState.lastY = null;
});

document.getElementById("crop-confirm-btn").addEventListener("click", () => {
    const {img, scale, panX, panY, selX, selY, selW, selH} = cropState;
    const out = document.createElement("canvas");
    out.width = selW; out.height = selH;
    out.getContext("2d").drawImage(img, (selX-panX)/scale, (selY-panY)/scale, selW/scale, selH/scale, 0, 0, selW, selH);
    document.getElementById("crop-modal").classList.remove("show");
    cropCallback(out.toDataURL());
});

document.getElementById("photo-input").addEventListener("change", e => {
    const reader = new FileReader();
    reader.onload = ev => openCropper(ev.target.result, res => {
        document.getElementById("photo-img").src = res;
        document.getElementById("photo-img").style.display = "block";
        document.getElementById("photo-placeholder").style.display = "none";
    });
    reader.readAsDataURL(e.target.files[0]);
});

// Initial boot
window.onload = () => document.getElementById("loading-overlay").style.display = "none";
document.getElementById("app-screen").style.display = "block";
</script>
</body>
</html>
