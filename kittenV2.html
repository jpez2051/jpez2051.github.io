<title>Kitten Feeding Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:linear-gradient(135deg,#fef3e8 0%,#fde8d8 50%,#fce4d6 100%);font-family:Georgia,serif;}

  /* Login */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  #login-card{background:#fff;border-radius:24px;padding:40px 32px;max-width:340px;width:100%;text-align:center;box-shadow:0 4px 32px rgba(193,90,53,.15);border:1px solid #fde8d8;}
  #login-card .logo{font-size:48px;margin-bottom:12px;}
  #login-card h1{color:#7a3520;font-size:24px;margin-bottom:6px;}
  #login-card p{color:#a0522d;font-size:14px;margin-bottom:28px;}
  #google-signin-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 16px;border:2px solid #fde8d8;border-radius:12px;background:#fff;cursor:pointer;font-family:Georgia,serif;font-size:15px;color:#7a3520;}
  #google-signin-btn img{width:20px;height:20px;}
  #login-error{margin-top:12px;color:#e65100;font-size:13px;display:none;}

  #app-screen{display:none;}

  /* Header */
  header{background:linear-gradient(135deg,#d4704a,#c15a35);padding:16px 16px 0;box-shadow:0 4px 20px rgba(193,90,53,.3);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .header-top h1{color:#fff;font-size:20px;letter-spacing:.5px;}
  .header-top .version{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}
  .header-btns{display:flex;gap:8px;align-items:center;}
  .header-btns button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:#fff;padding:6px 11px;font-size:12px;cursor:pointer;font-family:Georgia,serif;}
  .header-btns button:hover{background:rgba(255,255,255,.25);}
  #user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.5);cursor:pointer;object-fit:cover;}

  /* Kitten banner */
  #kitten-banner{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;align-items:flex-end;scrollbar-width:none;}
  #kitten-banner::-webkit-scrollbar{display:none;}

  .kitten-card.active{background:rgba(255,255,255,.2);}
  .kitten-card:hover:not(.active){background:rgba(255,255,255,.1);}
