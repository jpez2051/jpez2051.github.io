<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financial Audit Dashboard</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-green: #00ff41;
            --warning-red: #ff4b2b;
            --muted-gray: #444;
            --text-main: #e0e0e0;
            --info-blue: #00c2ff;
            --gold: #ffd700;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #refresh-status {
            height: 0;
            overflow: hidden;
            color: var(--accent-green);
            font-size: 0.8rem;
            font-family: monospace;
            transition: height 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .audit-container {
            width: 100%;
            max-width: 500px;
            padding-bottom: 80px;
        }

        h2 { border-bottom: 2px solid var(--accent-green); padding-bottom: 10px; }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        input {
            flex-grow: 1;
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            -webkit-appearance: none;
        }

        .info-btn {
            background: #222;
            color: var(--info-blue);
            border: 1px solid var(--info-blue);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        .run-btn { background: var(--accent-green); color: black; }
        .reset-btn { background: var(--muted-gray); color: white; }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #222;
        }

        .score-card { grid-column: span 2; position: relative; }
        .card-header-flex { display: flex; justify-content: center; align-items: center; gap: 8px; }
        #health-score { font-size: 3rem; margin: 10px 0; color: var(--accent-green); }

        .meter-container { background: #333; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        #meter-fill { height: 100%; background: var(--accent-green); width: 0%; transition: width 0.5s ease-out; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--info-blue);
            padding: 25px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
            text-align: left;
        }

        .modal-header { color: var(--info-blue); font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .close-modal { color: #888; cursor: pointer; font-size: 1.5rem; line-height: 1; }

        .app-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            padding: 15px 0;
            text-align: center;
            border-top: 1px solid #333;
        }

        .version-tag { color: var(--accent-green); font-family: monospace; font-size: 0.75rem; display: block; margin-top: 5px; }
        .tier { margin-bottom: 10px; padding-left: 10px; border-left: 3px solid #444; }
        .tier b { display: block; margin-bottom: 2px; }
    </style>
</head>
<body onload="loadSavedData()">

    <div id="refresh-status">>>> UPDATING DATA <<<</div>

    <div class="audit-container">
        <h2>Financial Audit Dashboard</h2>
        
        <section class="inputs">
            <div class="input-wrapper">
                <input type="number" id="income" placeholder="Monthly Take-Home ($)">
                <div class="info-btn" onclick="showInfo('income')">i</div>
            </div>

            <div class="input-wrapper">
                <input type="number" id="needs" placeholder="Needs (Rent/Bills) ($)">
                <div class="info-btn" onclick="showInfo('needs')">i</div>
            </div>

            <div class="input-wrapper">
                <input type="number" id="wants" placeholder="The 'Bullshit' (Wants) ($)">
                <div class="info-btn" onclick="showInfo('wants')">i</div>
            </div>

            <div class="input-wrapper">
                <input type="number" id="debt" placeholder="Total Min Debt Payments ($)">
                <div class="info-btn" onclick="showInfo('debt')">i</div>
            </div>

            <div class="btn-group">
                <button class="run-btn" onclick="calculateAudit()">Run Audit</button>
                <button class="reset-btn" onclick="resetAudit()">Reset</button>
            </div>
        </section>

        <div class="results-grid">
            <div class="card score-card">
                <div class="card-header-flex">
                    <h3>Hammer Score</h3>
                    <div class="info-btn" onclick="showInfo('hammerScore')">i</div>
                </div>
                <h1 id="health-score">--</h1>
                <p id="score-msg">Enter data to audit yourself.</p>
            </div>
            <div class="card">
                <h3>Monthly Surplus</h3>
                <p id="surplus-val">$0.00</p>
            </div>
            <div class="card">
                <h3>Bullshit %</h3>
                <div class="meter-container"><div id="meter-fill"></div></div>
                <p id="meter-text">0%</p>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="modalTitle">Info</span>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody" style="line-height: 1.6; color: #ccc; font-size: 0.95rem;"></div>
        </div>
    </div>

    <footer class="app-footer">
        <div>© 2026 Audit Dashboard</div>
        <span class="version-tag">v1.1.6 (Data Persistence Active)</span>
    </footer>

    <script>
        const infoData = {
            income: "<b>Monthly Take-Home:</b> The actual amount that hits your bank account after taxes and insurance. Include side hustles, but only if they are consistent.",
            needs: "<b>Needs:</b> Survival costs only. Rent/Mortgage, utilities, car insurance, and basic groceries. If you can live without it for a month, it's not a need.",
            wants: "<b>The Bullshit:</b> Dining out, hobbies, streaming services, coffee, and anything from Amazon that isn't a life necessity.",
            debt: "<b>Minimum Debt:</b> Sum of the <i>minimum</i> payments for all credit cards and loans. Do not include extra snowball payments here.",
            hammerScore: `
                <div class="tier" style="border-color: var(--accent-green)">
                    <b style="color: var(--accent-green)">8 - 10: Financial Warrior</b>
                    Minimal bullshit spending.
                </div>
                <div class="tier" style="border-color: var(--gold)">
                    <b style="color: var(--gold)">5 - 7: The Slippery Slope</b>
                    Too much convenience spending.
                </div>
                <div class="tier" style="border-color: var(--warning-red)">
                    <b style="color: var(--warning-red)">0 - 4: FINANCIAL EMERGENCY</b>
                    Spending more than you make. Cut all wants immediately.
                </div>
            `
        };

        function showInfo(type) {
            document.getElementById('modalTitle').innerText = type === 'hammerScore' ? "SCORE GUIDE" : type.toUpperCase();
            document.getElementById('modalBody').innerHTML = infoData[type];
            document.getElementById('infoModal').style.display = 'flex';
            if (navigator.vibrate) navigator.vibrate(5);
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        // --- SAVING & LOADING LOGIC ---
        function loadSavedData() {
            const fields = ['income', 'needs', 'wants', 'debt'];
            fields.forEach(field => {
                const savedValue = localStorage.getItem('audit_' + field);
                if (savedValue) document.getElementById(field).value = savedValue;
            });
            // Auto-run audit if data exists
            if (localStorage.getItem('audit_income')) calculateAudit();
        }

        function saveData() {
            const fields = ['income', 'needs', 'wants', 'debt'];
            fields.forEach(field => {
                localStorage.setItem('audit_' + field, document.getElementById(field).value);
            });
        }

        function calculateAudit() {
            const income = parseFloat(document.getElementById('income').value) || 0;
            const needs = parseFloat(document.getElementById('needs').value) || 0;
            const wants = parseFloat(document.getElementById('wants').value) || 0;
            const debt = parseFloat(document.getElementById('debt').value) || 0;

            saveData(); // Save every time we run the audit

            const surplus = income - (needs + wants + debt);
            const wantsRatio = income > 0 ? (wants / income) * 100 : 0;

            let score = 10;
            if (wantsRatio > 15) score -= 3;
            if (wantsRatio > 30) score -= 4;
            if (surplus < 0) score = 0;
            if (debt > (income * 0.4)) score -= 2;

            document.getElementById('surplus-val').innerText = `$${surplus.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('health-score').innerText = Math.max(0, score);
            document.getElementById('meter-text').innerText = `${wantsRatio.toFixed(1)}%`;
            document.getElementById('meter-fill').style.width = `${Math.min(wantsRatio, 100)}%`;
            
            const msg = document.getElementById('score-msg');
            const display = document.getElementById('health-score');
            const fill = document.getElementById('meter-fill');

            if (score <= 4) {
                msg.innerText = "FINANCIAL EMERGENCY!";
                msg.style.color = display.style.color = fill.style.backgroundColor = "var(--warning-red)";
            } else if (score <= 7) {
                msg.innerText = "Stop the bleeding. Cut the wants.";
                msg.style.color = display.style.color = fill.style.backgroundColor = "var(--gold)";
            } else {
                msg.innerText = "Keep attacking that debt.";
                msg.style.color = "var(--text-main)";
                display.style.color = fill.style.backgroundColor = "var(--accent-green)";
            }
        }

        function resetAudit() {
            localStorage.clear(); // Wipe the saved data
            document.querySelectorAll('input').forEach(input => input.value = '');
            document.getElementById('health-score').innerText = '--';
            document.getElementById('health-score').style.color = 'var(--accent-green)';
            document.getElementById('surplus-val').innerText = '$0.00';
            document.getElementById('meter-text').innerText = '0%';
            document.getElementById('meter-fill').style.width = '0%';
            document.getElementById('score-msg').innerText = 'Enter data to audit yourself.';
            document.getElementById('score-msg').style.color = 'var(--text-main)';
        }

        // Pull-to-Refresh
        let startY = 0;
        window.addEventListener('touchstart', (e) => { startY = e.touches[0].pageY; }, { passive: true });
        window.addEventListener('touchmove', (e) => {
            const diff = e.touches[0].pageY - startY;
            if (window.scrollY === 0 && diff > 0 && diff < 120) document.getElementById('refresh-status').style.height = diff + 'px';
        }, { passive: true });
        window.addEventListener('touchend', (e) => {
            if (window.scrollY === 0 && (e.changedTouches[0].pageY - startY) > 100) {
                document.getElementById('refresh-status').style.height = '40px';
                setTimeout(() => { calculateAudit(); document.getElementById('refresh-status').style.height = '0px'; }, 600);
            } else document.getElementById('refresh-status').style.height = '0px';
        }, { passive: true });
    </script>
</body>
</html>
