<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financial Audit Dashboard</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-green: #00ff41;
            --warning-red: #ff4b2b;
            --muted-gray: #444;
            --text-main: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Fixed the Refresh Status Header */
        #refresh-status {
            height: 0;
            overflow: hidden;
            color: var(--accent-green);
            font-size: 0.8rem;
            font-family: monospace;
            transition: height 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .audit-container {
            width: 100%;
            max-width: 500px;
            padding-bottom: 80px;
        }

        h2 { border-bottom: 2px solid var(--accent-green); padding-bottom: 10px; }

        .inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            -webkit-appearance: none;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }

        .run-btn { background: var(--accent-green); color: black; }
        .reset-btn { background: var(--muted-gray); color: white; }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #222;
        }

        .score-card { grid-column: span 2; }
        
        #health-score { font-size: 3rem; margin: 10px 0; color: var(--accent-green); }

        .meter-container {
            background: #333;
            height: 10px;
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }

        #meter-fill {
            height: 100%;
            background: var(--accent-green);
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .app-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            padding: 15px 0;
            text-align: center;
            border-top: 1px solid #333;
        }

        .version-tag {
            color: var(--accent-green);
            font-family: monospace;
            font-size: 0.75rem;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="refresh-status">>>> UPDATING DATA <<<</div>

    <div class="audit-container">
        <h2>Financial Audit Dashboard</h2>
        
        <section class="inputs">
            <input type="number" id="income" placeholder="Monthly Take-Home ($)">
            <input type="number" id="needs" placeholder="Needs (Rent/Bills) ($)">
            <input type="number" id="wants" placeholder="The 'Bullshit' (Wants) ($)">
            <input type="number" id="debt" placeholder="Total Min Debt Payments ($)">
            <div class="btn-group">
                <button class="run-btn" onclick="calculateAudit()">Run Audit</button>
                <button class="reset-btn" onclick="resetAudit()">Reset</button>
            </div>
        </section>

        <div class="results-grid">
            <div class="card score-card">
                <h3>Hammer Score</h3>
                <h1 id="health-score">--</h1>
                <p id="score-msg">Enter data to audit yourself.</p>
            </div>
            
            <div class="card">
                <h3>Monthly Surplus</h3>
                <p id="surplus-val">$0.00</p>
            </div>

            <div class="card">
                <h3>Bullshit %</h3>
                <div class="meter-container"><div id="meter-fill"></div></div>
                <p id="meter-text">0%</p>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div>© 2026 Audit Dashboard</div>
        <span class="version-tag">v1.1.3 (Pull-to-Refresh Fixed)</span>
    </footer>

    <script>
        function calculateAudit() {
            const income = parseFloat(document.getElementById('income').value) || 0;
            const needs = parseFloat(document.getElementById('needs').value) || 0;
            const wants = parseFloat(document.getElementById('wants').value) || 0;
            const debt = parseFloat(document.getElementById('debt').value) || 0;

            const totalOut = needs + wants + debt;
            const surplus = income - totalOut;
            const wantsRatio = income > 0 ? (wants / income) * 100 : 0;

            let score = 10;
            if (wantsRatio > 15) score -= 3;
            if (wantsRatio > 30) score -= 4;
            if (surplus < 0) score = 0;
            if (debt > (income * 0.4)) score -= 2;

            // UI Refresh
            document.getElementById('surplus-val').innerText = `$${surplus.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('health-score').innerText = Math.max(0, score);
            document.getElementById('meter-text').innerText = `${wantsRatio.toFixed(1)}%`;
            document.getElementById('meter-fill').style.width = `${Math.min(wantsRatio, 100)}%`;
            
            const scoreMsg = document.getElementById('score-msg');
            const scoreDisplay = document.getElementById('health-score');

            if (score <= 3) {
                scoreMsg.innerText = "FINANCIAL EMERGENCY!";
                scoreMsg.style.color = "var(--warning-red)";
                scoreDisplay.style.color = "var(--warning-red)";
                document.getElementById('meter-fill').style.backgroundColor = "var(--warning-red)";
            } else {
                scoreMsg.innerText = "Keep attacking that debt.";
                scoreMsg.style.color = "var(--text-main)";
                scoreDisplay.style.color = "var(--accent-green)";
                document.getElementById('meter-fill').style.backgroundColor = "var(--accent-green)";
            }
        }

        function resetAudit() {
            document.querySelectorAll('input').forEach(input => input.value = '');
            document.getElementById('health-score').innerText = '--';
            document.getElementById('health-score').style.color = 'var(--accent-green)';
            document.getElementById('surplus-val').innerText = '$0.00';
            document.getElementById('meter-text').innerText = '0%';
            document.getElementById('meter-fill').style.width = '0%';
            document.getElementById('score-msg').innerText = 'Enter data to audit yourself.';
            document.getElementById('score-msg').style.color = 'var(--text-main)';
            if (navigator.vibrate) navigator.v
